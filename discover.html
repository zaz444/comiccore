<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ComicCore — Discover</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Inter', sans-serif; background: #0f0f11; color: #f5f5f7; min-height: 100dvh; padding-bottom: 20px; }

/* ── Header ── */
.header {
position: sticky; top: 0; z-index: 200;
background: linear-gradient(to bottom, rgba(0,0,0,.98) 70%, transparent);
padding: 16px 16px 12px; backdrop-filter: blur(20px);
}
.header-row { display: flex; align-items: center; gap: 10px; }
.logo { font-size: 20px; font-weight: 900; color: #ff7a00; letter-spacing: 1px; flex: 1; }
.search-box {
flex: 1; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
color: #f5f5f7; padding: 8px 14px; border-radius: 24px;
font-family: inherit; font-size: 13px; outline: none; transition: .2s;
}
.search-box:focus { border-color: #ff7a00; background: rgba(255,255,255,.1); }
.search-box::placeholder { color: #444; }

/* ── Nav tabs ── */
.nav-tabs { display: flex; gap: 4px; margin-top: 10px; overflow-x: auto; overflow-y: visible; padding-bottom: 2px; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
flex-shrink: 0; padding: 6px 16px; border-radius: 20px;
font-size: 12px; font-weight: 700; cursor: pointer;
border: 1.5px solid #222; background: none; color: #555;
transition: .15s; white-space: nowrap;
}
.nav-tab.active { background: white; color: #000; border-color: white; }

/* ── Sort dropdown ── */
.sort-dropdown-wrap { position: relative; flex-shrink: 0; }
#sort-dropdown-btn {
  background: #ff7a00 !important; color: #000 !important; border-color: #ff7a00 !important;
  display: flex; align-items: center; gap: 4px;
}
.sort-dropdown-menu {
  display: none; position: fixed;
  z-index: 9999;
  background: #141416; border: 1.5px solid #2a2a2c;
  border-radius: 14px; overflow: hidden; min-width: 160px;
  box-shadow: 0 10px 32px rgba(0,0,0,.85);
}
.sort-dropdown-menu.open { display: block; }
.sort-dropdown-menu button {
  display: block; width: 100%; background: none; border: none;
  color: #888; font-family: inherit; font-size: 12px; font-weight: 800;
  text-align: left; padding: 11px 16px; cursor: pointer; transition: .15s;
}
.sort-dropdown-menu button:hover { background: rgba(255,122,0,.1); color: #ff7a00; }
.sort-dropdown-menu button.sort-active { color: #ff7a00; }
.sort-dropdown-menu button + button { border-top: 1px solid #1e1e20; }

/* ── Comics page grid ── */
.grid-header-row {
  display: flex; align-items: center;
  justify-content: space-between; padding: 10px 16px 6px;
}
.grid-section-label {
  font-size: 14px; font-weight: 900; color: #f5f5f7; letter-spacing: .3px;
}
.random-btn {
  background: #111; border: 1.5px solid #222; color: #666;
  font-size: 11px; font-weight: 900; padding: 6px 12px;
  border-radius: 20px; cursor: pointer; transition: .15s;
  font-family: inherit; letter-spacing: .3px; flex-shrink: 0;
}
.random-btn:hover { border-color: #ff7a00; color: #ff7a00; }
.random-btn:active { transform: scale(.95); }

/* ── Home grid: header row with label + arrows ── */
.home-grid-wrap {
  position: relative;
}
.home-grid-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px 8px;
}
.home-arrow {
  height: 26px; padding: 0 10px; border-radius: 13px;
  background: #1a1a1c; border: 1.5px solid #2a2a2c;
  color: rgba(255,255,255,.8); font-size: 16px; font-weight: 900;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: .15s; line-height: 1;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.home-arrow:not(:disabled):hover { background: #2a2a2c; color: #fff; }
.home-arrow:not(:disabled):active { transform: scale(.92); }
.home-arrow:disabled { color: rgba(255,255,255,.18); cursor: default; }

.comics-page-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px; padding: 4px 12px 8px;
}

.comics-page-grid .comic-card {
  width: auto; flex-shrink: unset;
}

/* ── Pagination ── */
.pagination-row {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; padding: 14px 16px 22px; flex-wrap: wrap;
}
.page-btn {
  min-width: 34px; height: 34px; padding: 0 8px;
  background: #111; border: 1.5px solid #1e1e20;
  color: #555; font-size: 12px; font-weight: 900;
  border-radius: 10px; cursor: pointer; transition: .15s;
  font-family: inherit; display: flex; align-items: center; justify-content: center;
}
.page-btn:hover:not(:disabled) { border-color: #ff7a00; color: #ff7a00; }
.page-btn.pg-active { background: #ff7a00; color: #000; border-color: #ff7a00; }
.page-btn.pg-arrow { font-size: 17px; min-width: 38px; }
.page-btn:disabled { opacity: .18; pointer-events: none; }
.page-ellipsis { color: #333; font-size: 12px; font-weight: 900; padding: 0 2px; line-height: 34px; }

/* ── Filter row (keep for stories/projects fallback, hide for home) ── */
.filter-row { display: flex; gap: 6px; padding: 10px 16px 0; overflow-x: auto; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
font-size: 11px; font-weight: 800; cursor: pointer;
border: 1.5px solid #1e1e1e; background: #111; color: #444;
transition: .15s; letter-spacing: .3px; white-space: nowrap;
}
.filter-chip.on { border-color: #ff7a00; color: #ff7a00; background: rgba(255,122,0,.08); }

/* ── Top Creators Section ── */
.top-creators-section {
  padding: 16px 16px 0;
}
.section-title-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.section-title-row h2 {
  font-size: 13px; font-weight: 900; color: #f5f5f7; margin: 0; letter-spacing: .5px; text-transform: uppercase;
}
.creator-rank-tabs {
  display: flex; gap: 4px;
}
.creator-rank-tab {
  padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 800;
  border: 1.5px solid #222; background: none; color: #444; cursor: pointer; transition: .15s;
}
.creator-rank-tab.active { background: #ff7a00; color: #000; border-color: #ff7a00; }

.top-creators-scroll {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 14px;
}
.top-creators-scroll::-webkit-scrollbar { display: none; }

.creator-rank-card {
  flex-shrink: 0; width: 100px; background: #111; border: 1.5px solid #1e1e20;
  border-radius: 16px; padding: 12px 8px; display: flex; flex-direction: column;
  align-items: center; gap: 6px; cursor: pointer; transition: .2s; position: relative;
  text-decoration: none;
}
.creator-rank-card:hover { border-color: #ff7a00; transform: translateY(-2px); }
.creator-rank-card.gold   { border-color: #ffd700; background: rgba(255,215,0,.05); }
.creator-rank-card.silver { border-color: #aaa;    background: rgba(170,170,170,.04); }
.creator-rank-card.bronze { border-color: #cd7f32; background: rgba(205,127,50,.04); }

.rank-badge {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  font-size: 16px; line-height: 1;
}
.creator-rank-avatar {
  width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
  background: #222; border: 2px solid #333;
}
.creator-rank-name { font-size: 11px; font-weight: 800; color: #f5f5f7; text-align: center; max-width: 84px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.creator-rank-handle { font-size: 9px; color: #555; font-weight: 700; }
.creator-rank-stat { font-size: 11px; font-weight: 900; color: #ff7a00; }
.creator-rank-stat-label { font-size: 8px; color: #444; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

/* ── Follow button improved ── */
.tile-follow-btn {
  font-size: 8px; font-weight: 900; color: #000;
  background: #ff7a00; border: none; padding: 3px 8px;
  border-radius: 8px; cursor: pointer; white-space: nowrap;
  transition: .15s;
}
.tile-follow-btn.following { background: rgba(255,255,255,.12); color: #aaa; border: 1px solid #333; }
.tile-follow-btn.loading { opacity: .5; pointer-events: none; }
.tile-follow-btn:hover { opacity: .85; }

/* ── Creator search result cards ── */
.creator-card {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  gap: 5px; cursor: pointer; transition: .2s;
  padding: 6px 4px; border-radius: 12px;
}
.creator-card:hover { background: rgba(255,255,255,.05); }
.creator-card img {
  width: 46px; height: 46px; border-radius: 50%; object-fit: cover;
  background: #222; border: 2px solid #2a2a2a;
}
.creator-card div {
  font-size: 10px; font-weight: 800; color: #aaa;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 72px; text-align: center;
}

/* ── Divider ── */
.feed-divider {
  height: 1px; background: linear-gradient(to right, transparent, #222, transparent);
  margin: 14px 16px;
}


/* ── Section labels ── */
.section-label { font-size: 14px; font-weight: 900; color: #f5f5f7; padding: 16px 16px 8px; letter-spacing: .3px; }

/* ── Comics carousel ── */
.comics-carousel-wrap {
  position: relative; padding: 0 16px;
}
.carousel-nav-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(20,20,22,.92); border: 1.5px solid #2a2a2c;
  color: white; font-size: 16px; cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  transition: .15s; backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
}
.carousel-nav-btn:hover { background: #ff7a00; border-color: #ff7a00; color: #000; }
.carousel-nav-btn.left  { left: -2px; }
.carousel-nav-btn.right { right: -2px; }
.carousel-nav-btn:disabled { opacity: .2; pointer-events: none; }

.comics-carousel {
  display: flex; gap: 14px; overflow-x: auto; scroll-behavior: smooth;
  padding: 8px 0 16px; scrollbar-width: none;
}
.comics-carousel::-webkit-scrollbar { display: none; }

.comic-card {
  flex-shrink: 0; width: 140px; cursor: pointer;
  transition: transform .2s, border-color .18s, box-shadow .18s;
  position: relative;
  background: #1e1e22;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  display: flex; flex-direction: column;
}
/* In grid, width is auto — override fixed width */
.comics-page-grid .comic-card { width: auto; }
@media (min-width: 500px) { .comic-card { width: 155px; } }
@media (min-width: 768px) { .comic-card { width: 180px; } }

/* ── PC layout: wider grid and centered content ── */
@media (min-width: 900px) {
  body { max-width: 1280px; margin: 0 auto; }
  .header { padding: 16px 32px 12px; }
  .comics-page-grid { grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 4px 24px 8px; }
  .grid-header-row { padding: 10px 24px 6px; }
  .top-creators-section { padding: 16px 24px 0; }
  .section-label { padding: 16px 24px 8px; }
  .comics-carousel-wrap { padding: 0 24px; }
  .feed-divider { margin: 14px 24px; }
}
@media (min-width: 1200px) {
  .comics-page-grid { grid-template-columns: repeat(6, 1fr); }
}

.comic-card:hover { transform: translateY(-3px); border-color: rgba(255,215,0,0.35); box-shadow: 0 8px 28px rgba(255,215,0,0.1); background: #26262c; }
.comic-card:active { transform: scale(.97); }

.comic-card-cover {
  width: 100%; aspect-ratio: 2/3; border-radius: 0; overflow: hidden;
  background: #111; position: relative;
  box-shadow: none;
}
/* Grid cards: portrait but capped so they don't get too tall */
.comics-page-grid .comic-card-cover {
  aspect-ratio: unset;
  height: clamp(150px, 18vw, 260px);
  overflow: hidden;
}
@media (min-width: 900px) {
  .comics-page-grid .comic-card-cover { height: clamp(160px, 14vw, 240px); }
}
.comic-card-cover > div:first-child {
  width: 100%; height: 100%; border-radius: 0; overflow: hidden; position: relative;
}
.comic-card-cover img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.comic-card-cover .no-cover {
  width: 100%; height: 100%; display: flex; align-items: center;
  justify-content: center; font-size: 32px;
  background: linear-gradient(135deg,#0f0f11,#1a1a2e);
}.comic-card .tile-stars {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,.78); color: #ffd700;
  font-size: 9px; font-weight: 900; padding: 3px 7px; border-radius: 8px;
  backdrop-filter: blur(4px); cursor: pointer; transition: .15s;
  user-select: none;
}
.comic-card .tile-stars:hover { background: rgba(0,0,0,.92); }

/* Expanded star rating popover on tile */
.tile-star-expanded {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.82); backdrop-filter: blur(6px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; z-index: 5; border-radius: 0;
  animation: fadeInStar .15s ease;
}
@keyframes fadeInStar { from { opacity:0; } to { opacity:1; } }
.tile-star-expanded .star-expanded-rating { display: flex; align-items: center; gap: 2px; }
.tile-star-expanded .star-expanded-rating .star { width: 16px; height: 16px; }
.tile-star-expanded .star-expanded-rating .star svg { width: 16px; height: 16px; }
.tile-star-expanded .star-expanded-count { font-size: 11px; font-weight: 900; color: #ffd700; margin-top: 2px; }
.tile-star-expanded .star-expanded-close { font-size: 9px; color: rgba(255,255,255,.4); font-weight: 700; margin-top: 2px; }
.comic-card .tile-mine {
  position: absolute; top: 6px; left: 6px;
  background: rgba(255,122,0,.9); color: #000;
  font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 8px;
}
.comic-card .tile-new {
  position: absolute; top: 6px; left: 6px;
  background: rgba(50,215,75,.9); color: #000;
  font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 8px;
}
.comic-card .tile-progress {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(255,255,255,.1); border-radius: 0 0 14px 14px;
}
.comic-card .tile-progress-fill { height: 100%; background: #ff7a00; }

/* PFP in card meta row */
.comic-card-pfp-wrap { display: flex; align-items: center; }
.comic-card-pfp {
  width: 20px; height: 20px; border-radius: 50%; object-fit: cover;
  background: #333; border: 1.5px solid #2a2a2c; display: inline-block;
  cursor: pointer; flex-shrink: 0; vertical-align: middle;
}
.comic-card-pfp.hidden { display: none; }

/* ── Star Rating ── */
.star-rating {
  display: flex; align-items: center; gap: 1px;
  margin: 1px 0 0; line-height: 1;
}
.star-rating .star {
  position: relative; display: inline-block;
  width: 10px; height: 10px; flex-shrink: 0;
}
.star svg { width: 10px; height: 10px; display: block; }
.star-rating .star-count {
  font-size: 9px; font-weight: 800; color: #555;
  margin-left: 2px; white-space: nowrap;
}

.comic-card-info {
  padding: 8px 10px 10px;
  flex: 1; display: flex; flex-direction: column;
}
.comic-card-title {
  font-size: 12px; font-weight: 800; color: #f5f5f7;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px; padding-right: 2px;
}
.comic-card-meta {
  display: flex; align-items: center; gap: 5px; margin-top: 3px;
}
.comic-card-avatar {
  width: 20px; height: 20px; border-radius: 50%; object-fit: cover;
  background: #333; border: 1.5px solid #2a2a2c; flex-shrink: 0; cursor: pointer;
}
.comic-card-handle {
  font-size: 10px; color: #555; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  cursor: pointer;
}
.comic-card-handle:hover { color: #ff7a00; }
.comic-card-follow {
  font-size: 8px; font-weight: 900; color: #000;
  background: #ff7a00; border: none; padding: 2px 6px;
  border-radius: 5px; cursor: pointer; white-space: nowrap;
  transition: .15s; flex-shrink: 0;
}
.comic-card-follow.following { background: rgba(255,255,255,.1); color: #555; border: 1px solid #2a2a2c; }
.comic-card-follow:hover { opacity: .85; }

/* Keep old .comic-tile for teams section */
.comic-tile {
  position: relative; cursor: pointer; border-radius: 10px; overflow: hidden;
  background: #111; aspect-ratio: .67; transition: transform .2s;
}
.comic-tile:active { transform: scale(.96); }
.comic-tile img.cover-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.comic-tile .no-cover { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; background: linear-gradient(135deg,#0f0f11,#1a1a1e); }
.comics-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 0 16px; }
@media (min-width: 480px) { .comics-grid { grid-template-columns: repeat(4,1fr); } }


/* ── Popup overlay ── */
.popup-overlay {
position: fixed; inset: 0; z-index: 1000;
background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
display: none; align-items: flex-end; justify-content: center;
}
.popup-overlay.open { display: flex; }
.popup-sheet {
background: #141416; border-radius: 20px 20px 0 0;
border-top: 1px solid #222; width: 100%; max-width: 560px;
max-height: 88dvh; overflow-y: auto; position: relative;
animation: slideUp .3s cubic-bezier(.4,0,.2,1);
}
.popup-sheet::-webkit-scrollbar { display: none; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.popup-cover { width: 100%; aspect-ratio: 1.6; object-fit: cover; display: block; background: #0a0a0a; border-radius: 20px 20px 0 0; }
.popup-cover-placeholder {
width: 100%; aspect-ratio: 1.6; background: linear-gradient(135deg,#111,#1a1a2e);
display: flex; align-items: center; justify-content: center; font-size: 52px;
border-radius: 20px 20px 0 0;
}
.popup-close {
position: absolute; top: 12px; right: 12px;
background: rgba(0,0,0,.7); border: none; color: white;
width: 32px; height: 32px; border-radius: 50%;
font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
backdrop-filter: blur(8px); z-index: 2;
}
.popup-body { padding: 16px 18px 28px; }
.popup-title { font-size: 20px; font-weight: 900; margin: 0 0 4px; letter-spacing: -.3px; }
.popup-creator { font-size: 12px; color: #555; margin-bottom: 12px; font-weight: 700; }
.popup-creator a { color: #ff7a00; text-decoration: none; }
.popup-meta-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.popup-meta-chip { background: #1e1e20; border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: #888; }
.popup-desc { font-size: 13px; line-height: 1.6; color: #aaa; margin-bottom: 14px; }
.popup-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.popup-tag { background: #1a1a1c; border: 1px solid #2a2a2c; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #666; font-weight: 700; }
.popup-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.read-btn {
flex: 1; background: white; color: #000; border: none;
padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 900;
cursor: pointer; transition: .15s; letter-spacing: .3px; min-width: 120px;
}
.read-btn:hover { background: #e8e8e8; }
.popup-icon-btn {
background: #1e1e20; border: 1.5px solid #2a2a2c; color: #888;
padding: 13px 16px; border-radius: 10px; font-size: 16px; cursor: pointer;
transition: .15s; min-width: 50px; text-align: center;
}
.popup-icon-btn:hover { background: #2a2a2c; }
.popup-icon-btn.starred { background: rgba(255,215,0,.12); border-color: #ffd700; color: #ffd700; }
.popup-edit-btn {
background: #1e1e20; border: 1.5px solid #00d2ff; color: #00d2ff;
padding: 13px 16px; border-radius: 10px; font-size: 12px; font-weight: 900;
cursor: pointer; white-space: nowrap;
}
.popup-delete-btn {
background: #1e1e20; border: 1.5px solid #ff3b30; color: #ff3b30;
padding: 13px 16px; border-radius: 10px; font-size: 12px; font-weight: 900;
cursor: pointer; white-space: nowrap;
}
.popup-progress-wrap { margin: 12px 0 0; }
.popup-progress-bar { height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
.popup-progress-fill { height: 100%; background: #ff7a00; transition: width .3s; }
.popup-progress-label { font-size: 10px; color: #444; font-weight: 700; margin-top: 4px; }

/* ── Comments overlay ── */
.comment-overlay {
position: fixed; inset: 0; z-index: 2000;
background: rgba(0,0,0,.88); backdrop-filter: blur(8px);
display: none; align-items: flex-end; justify-content: center;
}
.comment-overlay.open { display: flex; }
.comment-sheet {
background: #1c1c1e; width: 100%; max-width: 500px;
border-radius: 20px 20px 0 0; padding: 20px 18px 0;
max-height: 75vh; display: flex; flex-direction: column;
border: 1px solid #2c2c2e; animation: slideUp .3s cubic-bezier(.4,0,.2,1);
}
.comment-sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.comment-sheet-header span { font-weight: 900; font-size: 15px; }
.comment-sheet-header button { background: none; border: none; color: #f5f5f7; font-size: 22px; cursor: pointer; }
.comment-list { flex: 1; overflow-y: auto; }
.comment-item { padding: 10px 0; border-bottom: 1px solid #2c2c2e; display: flex; gap: 10px; align-items: flex-start; }
.comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: #333; flex-shrink: 0; border: 1px solid #2a2a2c; cursor: pointer; }
.comment-content { flex: 1; }
.comment-user { font-size: 11px; font-weight: 800; color: #ff7a00; margin-bottom: 3px; cursor: pointer; }
.comment-user:hover { text-decoration: underline; }
.comment-text-body { font-size: 13px; color: #f5f5f7; }
.comment-reaction-img { max-width: 120px; max-height: 120px; border-radius: 8px; margin-top: 6px; display: block; object-fit: contain; }
.comment-empty { text-align: center; padding: 24px; color: #444; font-size: 12px; font-weight: 700; }

/* Comment input area */
.comment-input-area { border-top: 1px solid #2c2c2e; margin-top: auto; }
.comment-input-row { display: flex; gap: 8px; padding: 10px 0 calc(14px + env(safe-area-inset-bottom)); }
.comment-input-row input {
flex: 1; background: #1c1c1e; border: 1px solid #2c2c2e; color: #f5f5f7;
padding: 10px 14px; border-radius: 12px; font-family: inherit; font-size: 13px; outline: none;
}
.comment-input-row input:focus { border-color: #ff7a00; }
.post-btn { background: #ff7a00; border: none; color: #000; padding: 10px 16px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 13px; }
.reaction-toggle-btn {
background: #1e1e20; border: 1px solid #2a2a2c; color: #aaa;
padding: 10px 12px; border-radius: 12px; font-size: 16px; cursor: pointer;
transition: .15s; flex-shrink: 0;
}
.reaction-toggle-btn.active { border-color: #ff7a00; color: #ff7a00; background: rgba(255,122,0,.1); }

/* Reaction image tray */
/* ── Tenor-style reaction picker ── */
.reaction-picker {
  display: none; position: absolute; bottom: 60px; left: 0; right: 0;
  background: #111; border: 1px solid #2a2a2c; border-radius: 16px 16px 0 0;
  z-index: 100; max-height: 340px; display: none; flex-direction: column;
  overflow: hidden;
}
.reaction-picker.open { display: flex; }
.reaction-picker-tabs {
  display: flex; gap: 0; border-bottom: 1px solid #1e1e20; flex-shrink: 0;
}
.reaction-tab {
  flex: 1; padding: 10px 6px; font-size: 12px; font-weight: 800; color: #555;
  text-align: center; cursor: pointer; border-bottom: 2px solid transparent;
  transition: .15s; background: none; border-top: none; border-left: none; border-right: none;
  font-family: inherit;
}
.reaction-tab.active { color: #ff7a00; border-bottom-color: #ff7a00; }
.reaction-search-wrap {
  padding: 8px 12px; border-bottom: 1px solid #1e1e20; flex-shrink: 0;
}
.reaction-search {
  width: 100%; background: #1a1a1c; border: 1px solid #2a2a2c; border-radius: 20px;
  padding: 8px 14px; color: white; font-size: 13px; font-family: inherit; outline: none;
  box-sizing: border-box;
}
.reaction-search:focus { border-color: #ff7a00; }
.reaction-search::placeholder { color: #333; }
.reaction-categories {
  display: flex; gap: 8px; padding: 8px 12px; overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.reaction-categories::-webkit-scrollbar { display: none; }
.reaction-cat-btn {
  padding: 5px 12px; border-radius: 20px; border: 1px solid #2a2a2c;
  background: #1a1a1c; color: #888; font-size: 11px; font-weight: 800;
  cursor: pointer; white-space: nowrap; font-family: inherit; transition: .15s; flex-shrink: 0;
}
.reaction-cat-btn.active { background: rgba(255,122,0,.15); border-color: #ff7a00; color: #ff7a00; }
.reaction-grid-wrap { flex: 1; overflow-y: auto; padding: 8px 12px 12px; }
.reaction-grid-wrap::-webkit-scrollbar { width: 3px; }
.reaction-grid-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.reaction-tray {
display: none; padding: 10px 0 4px;
border-top: 1px solid #2c2c2e;
}
.reaction-tray.open { display: block; }
.reaction-tray-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 8px; padding: 0 2px;
}
.reaction-tray-title { font-size: 10px; font-weight: 900; color: #555; text-transform: uppercase; letter-spacing: 1px; }
.reaction-tray-manage { font-size: 10px; font-weight: 800; color: #ff7a00; cursor: pointer; text-decoration: none; }
.reaction-grid {
display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
max-height: 180px; overflow-y: auto;
}
.reaction-grid::-webkit-scrollbar { width: 3px; }
.reaction-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
.reaction-img-btn {
aspect-ratio: 1; background: #111; border-radius: 8px; overflow: hidden;
border: 1.5px solid transparent; cursor: pointer; transition: .15s; padding: 0;
}
.reaction-img-btn:hover { border-color: #ff7a00; transform: scale(1.05); }
.reaction-img-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
.reaction-tray-empty { color: #444; font-size: 11px; font-weight: 700; text-align: center; padding: 16px; grid-column: 1/-1; }

/* ── Share sheet ── */
.share-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 2000;
display: none; flex-direction: column; align-items: center; justify-content: flex-end;
}
.share-overlay.open { display: flex; }
.share-sheet-inner {
background: #1c1c1e; width: 100%; max-width: 500px;
border-radius: 20px 20px 0 0; padding: 20px;
max-height: 70vh; display: flex; flex-direction: column; border: 1px solid #2c2c2e;
animation: slideUp .3s cubic-bezier(.4,0,.2,1);
}
.friend-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2c2c2e; }
.friend-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #222; }
.friend-name { font-size: 13px; font-weight: 700; }
.friend-handle { font-size: 11px; color: #555; }
.send-btn { background: #ff7a00; border: none; color: #000; padding: 7px 16px; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 12px; }

/* ── Stories ── */
.story-card { display: flex; gap: 14px; padding: 14px 16px; border-bottom: 1px solid #2c2c2e; cursor: pointer; transition: .15s; }
.story-card:hover { background: rgba(255,255,255,.03); }
.story-cover { width: 70px; height: 90px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.story-cover-placeholder { width: 70px; height: 90px; background: #111; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.story-title { font-weight: 900; font-size: 14px; margin-bottom: 3px; }
.story-author { font-size: 11px; color: #ff7a00; text-decoration: none; }
.story-desc { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.4; }
.story-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: #444; font-weight: 700; }
.empty-feed { padding: 48px 20px; text-align: center; color: #555; font-size: 13px; line-height: 1.8; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-cover { width:70px;height:90px;border-radius:8px;flex-shrink:0;background:linear-gradient(90deg,#1a1a1a 25%,#2c2c2c 50%,#1a1a1a 75%);background-size:200%;animation:shimmer 1.5s infinite; }
.skel-line  { height:14px;border-radius:4px;background:linear-gradient(90deg,#1a1a1a 25%,#2c2c2c 50%,#1a1a1a 75%);background-size:200%;animation:shimmer 1.5s infinite; }

/* ── Toast ── */
.toast {
position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
background: #1c1c1e; border: 1px solid #3a3a3c; color: #fff;
padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700;
opacity: 0; transition: .25s; z-index: 9999; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── My Squads strip (Amino-style) ── */
.my-squads-section { padding: 14px 0 4px; }
.my-squads-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 10px; }
.my-squads-title { font-size: 13px; font-weight: 900; color: #f5f5f7; letter-spacing: .3px; text-transform: uppercase; }
.my-squads-see-all { font-size: 11px; font-weight: 800; color: #ff7a00; text-decoration: none; cursor: pointer; }
.my-squads-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 10px; scrollbar-width: none; }
.my-squads-scroll::-webkit-scrollbar { display: none; }
.my-squad-chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.my-squad-chip:hover .my-squad-avatar { border-color: #ff7a00; transform: scale(1.06); }
.my-squad-avatar {
  width: 60px; height: 60px; border-radius: 16px; background: #111;
  background-size: cover; background-position: center;
  border: 2.5px solid #222; transition: .15s;
  display: flex; align-items: center; justify-content: center; font-size: 24px;
  overflow: hidden; flex-shrink: 0;
}
.my-squad-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 13px; display: block; }
.my-squad-name { font-size: 10px; font-weight: 800; color: #888; text-align: center; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.my-squad-join-chip {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
}
.my-squad-join-btn {
  width: 60px; height: 60px; border-radius: 16px; background: rgba(255,122,0,.1);
  border: 2.5px dashed #ff7a00; display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #ff7a00; transition: .15s;
}
.my-squad-join-btn:hover { background: rgba(255,122,0,.18); }

/* ── Recommended Squads grid ── */
.rec-squads-section { padding: 4px 0 14px; }
.rec-squads-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 10px; }
.rec-squads-title { font-size: 13px; font-weight: 900; color: #f5f5f7; letter-spacing: .3px; text-transform: uppercase; }
.rec-squads-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
.rec-squad-card {
  background: #111; border: 1.5px solid #1e1e20; border-radius: 16px;
  overflow: hidden; cursor: pointer; transition: .18s; position: relative;
}
.rec-squad-card:hover { border-color: #ff7a00; transform: translateY(-2px); }
.rec-squad-card:active { transform: scale(.97); }
.rec-squad-cover {
  width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg,#111,#1a1a2e);
  background-size: cover; background-position: center;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
  position: relative; overflow: hidden;
}
.rec-squad-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.rec-squad-private-badge {
  position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.75);
  font-size: 9px; font-weight: 900; color: #888; padding: 2px 6px; border-radius: 6px;
  backdrop-filter: blur(4px);
}
.rec-squad-body { padding: 10px 10px 12px; }
.rec-squad-name { font-size: 12px; font-weight: 900; color: #f5f5f7; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-squad-meta { font-size: 10px; color: #444; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.rec-squad-active { color: #32d74b; font-size: 9px; font-weight: 900; }
.rec-squad-join-btn {
  margin-top: 8px; width: 100%; background: #ff7a00; color: #000; border: none;
  border-radius: 8px; padding: 6px 0; font-size: 11px; font-weight: 900;
  cursor: pointer; font-family: inherit; transition: .15s;
}
.rec-squad-join-btn:hover { opacity: .85; }
.rec-squad-join-btn.joined { background: rgba(255,255,255,.07); color: #555; border: 1px solid #1e1e1e; cursor: default; }
.rec-squad-join-btn.pending { background: rgba(255,122,0,.1); color: #ff7a00; border: 1px solid rgba(255,122,0,.25); cursor: default; font-style: italic; }

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(12,12,14,.97);
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
  z-index: 500; backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  text-decoration: none; color: #f5f5f7; cursor: pointer;
  flex: 1; transition: .2s; padding: 4px 0;
  border-radius: 12px;
}
.nav-item .nav-icon { font-size: 22px; transition: transform .2s; line-height: 1; }
.nav-item .nav-label { font-size: 9px; font-weight: 800; letter-spacing: .4px; opacity: 0; transition: .2s; color: #ff7a00; text-transform: uppercase; }
.nav-item.active .nav-icon { transform: scale(1.15); }
.nav-item.active .nav-label { opacity: 1; }
.nav-item:not(.active) { opacity: .35; }
.nav-item:not(.active):hover { opacity: .65; }

/* ── Loading Screen ── */


/* ── Loading screen ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 99999;
  background: #0f0f11;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#loading-screen img { width: 90px; height: 90px; object-fit: contain; }
#loading-screen .loading-text {
  font-size: 12px; font-weight: 800; color: #333;
  letter-spacing: 2px; text-transform: uppercase;
  animation: loadingPulse 1.2s ease-in-out infinite;
}
@keyframes loadingPulse { 0%,100%{opacity:0.25;} 50%{opacity:1;} }
</style>

<script>
const _sb = supabase.createClient(
  'https://mmycqeejhguzhtzkyjaj.supabase.co',
  'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE',
  { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } }
);
const myProfile = JSON.parse(localStorage.getItem('user_profile') || '{"handle":"guest"}');

let allComics       = [];
let activeComicId   = null;
let globalStars     = [];
let globalRatings   = [];
let activePopupComic   = null;
let activePopupStarred = false;
let activePopupRated   = false;
let currentSort     = 'recent';
let currentPage     = 0;
const ITEMS_PER_PAGE = 12;
let storiesLoaded   = false;
let shareComicId    = null;
let shareComicTitle = null;
let toastTimer      = null;

// ── Frame-count cache (comics fetched without data column) ───
const frameCountCache = {};

/** Sync — returns count from in-memory cache or localStorage (written by reader.html). */
function getCachedFrameCount(comicId) {
  if (frameCountCache[comicId] !== undefined) return frameCountCache[comicId];
  const stored = localStorage.getItem('cc-frame-count-' + comicId);
  if (stored !== null) {
    const n = parseInt(stored);
    if (!isNaN(n) && n > 0) { frameCountCache[comicId] = n; return n; }
  }
  return 0;
}

/** Async — checks cache/localStorage first, then fetches from Supabase. */
async function fetchAndCacheFrameCount(comicId) {
  const cached = getCachedFrameCount(comicId);
  if (cached > 0) return cached;
  try {
    const { data } = await _sb.from('comics').select('data').eq('id', comicId).maybeSingle();
    const count = (data?.data || []).length;
    frameCountCache[comicId] = count;
    if (count > 0) localStorage.setItem('cc-frame-count-' + comicId, count);
    return count;
  } catch(e) { return 0; }
}

// ── Profile cache (to avoid re-fetching same profiles) ────
const profileCache = {};
async function getCachedProfile(handle) {
  if (profileCache[handle]) return profileCache[handle];
  const { data } = await _sb.from('profiles').select('pic, name').eq('handle', handle).maybeSingle();
  profileCache[handle] = data || { pic: '', name: handle };
  return profileCache[handle];
}

const DEFAULT_AVATAR = 'https://via.placeholder.com/150';
function getPublicAvatarUrl(pic) {
  if (!pic) return '';
  const raw = String(pic).trim();
  if (raw.startsWith('http')) return raw;
  const path = raw.startsWith('avatars/') ? raw.slice(8) : raw;
  if (!path) return '';
  const { data } = _sb.storage.from('avatars').getPublicUrl(path);
  return data?.publicUrl || '';
}

// ── Follow system (real one-way follows via `follows` table) ──
const followCache = {}; // handle -> bool

async function isFollowing(targetHandle) {
  if (!myProfile.handle || myProfile.handle === 'guest') return false;
  if (targetHandle === myProfile.handle) return false;
  if (followCache[targetHandle] !== undefined) return followCache[targetHandle];
  const { data } = await _sb.from('follows')
    .select('id').eq('follower', myProfile.handle).eq('following', targetHandle).maybeSingle();
  followCache[targetHandle] = !!data;
  return !!data;
}

async function tileFollow(btn, handle) {
  if (!myProfile.handle || myProfile.handle === 'guest') { showToast('Log in to follow!'); return; }
  btn.classList.add('loading');
  const already = await isFollowing(handle);
  if (already) {
    // Unfollow
    await _sb.from('follows').delete().eq('follower', myProfile.handle).eq('following', handle);
    followCache[handle] = false;
    btn.textContent = 'Follow';
    btn.classList.remove('following');
    showToast(`Unfollowed @${handle}`);
  } else {
    // Follow
    const { error } = await _sb.from('follows').insert([{ follower: myProfile.handle, following: handle }]);
    if (error) { showToast('Error — try again'); btn.classList.remove('loading'); return; }
    followCache[handle] = true;
    btn.textContent = 'Following ✓';
    btn.classList.add('following');
    showToast(`✅ Now following @${handle}`);
  }
  btn.classList.remove('loading');
  // Refresh top creators after follow change
  loadTopCreators(currentRankTab);
}

// ── Connection/follow cache (legacy — keep for share sheet) ────────────────────────────────
const connectionCache = {};
async function getConnectionStatus(targetHandle) {
  if (!myProfile.handle || myProfile.handle === 'guest') return 'guest';
  if (targetHandle === myProfile.handle) return 'self';
  const key = targetHandle;
  if (connectionCache[key] !== undefined) return connectionCache[key];
  const { data } = await _sb.from('connections')
    .select('status')
    .or(`and(sender_handle.eq.${myProfile.handle},receiver_handle.eq.${targetHandle}),and(sender_handle.eq.${targetHandle},receiver_handle.eq.${myProfile.handle})`)
    .maybeSingle();
  const status = data?.status || 'none';
  connectionCache[key] = status;
  return status;
}

// ── Helpers ──────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function timeAgo(d) {
  if (!d) return '';
  const sec = Math.floor((Date.now() - new Date(d)) / 1000);
  if (sec < 60) return 'Just now';
  const min = Math.floor(sec/60); if (min < 60) return min+'m ago';
  const hr  = Math.floor(min/60); if (hr  < 24) return hr +'h ago';
  const day = Math.floor(hr /24); if (day <  7) return day+'d ago';
  const wk  = Math.floor(day/7);  if (wk  <  4) return wk +'w ago';
  const mo  = Math.floor(day/30); if (mo  < 12) return mo +'mo ago';
  return Math.floor(day/365)+'y ago';
}

function exactDate(d) {
  if (!d) return 'Unknown';
  return new Date(d).toLocaleString('en-US',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
}

function isNewComic(d) {
  if (!d) return false;
  return (Date.now() - new Date(d)) < 1000 * 60 * 60 * 48;
}

function getProgress(comicId, totalFrames) {
  try {
    const s = localStorage.getItem('cc-progress-' + comicId);
    if (s === null || !totalFrames) return null;
    const f = parseInt(s);
    if (f <= 0 || f >= totalFrames - 1) return null;
    return { frame: f + 1, total: totalFrames, pct: Math.round(((f + 1) / totalFrames) * 100) };
  } catch(e) { return null; }
}

// ── Home arrow buttons are pure page navigation ─────────
// (arrows in header row call goToPage directly)

/** Smart-random: weighted shuffle biasing toward popular but adding variety */
function smartRandomSort(comics, stars) {
  const starMap = {};
  stars.forEach(s => { starMap[s.receiver_hand] = (starMap[s.receiver_hand] || 0) + 1; });
  // Give each comic a score = stars + small random noise
  const maxStars = Math.max(1, ...comics.map(c => starMap[c.id] || 0));
  return [...comics].sort((a, b) => {
    const scoreA = ((starMap[a.id] || 0) / maxStars) * 0.6 + Math.random() * 0.4;
    const scoreB = ((starMap[b.id] || 0) / maxStars) * 0.6 + Math.random() * 0.4;
    return scoreB - scoreA;
  });
}


// ── Sort ─────────────────────────────────────────────────
function setSort(s) {
  currentSort = s;
  currentPage = 0;
  ['recent','popular','oldest'].forEach(k => {
    const el = document.getElementById('chip-'+k);
    if (el) el.classList.toggle('on', k === s);
  });
  const labels = { recent:'Latest', popular:'Top Comics', oldest:'Oldest First' };
  document.getElementById('comics-label').innerText = labels[s] || 'Latest';
  renderComics(allComics, globalStars);
}

function sortedComics(comics, stars) {
  const c = [...comics];
  if (currentSort === 'popular') {
    return c.sort((a,b) =>
      stars.filter(s => s.receiver_hand === b.id).length -
      stars.filter(s => s.receiver_hand === a.id).length
    );
  }
  if (currentSort === 'oldest') return c.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  if (currentSort === 'smart_random') return smartRandomSort(c, stars);
  return c.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
}

// ── Top Creators ──────────────────────────────────────────
let currentRankTab = 'stars';
let topCreatorsData = { stars: [], follows: [] };

function switchRankTab(tab, el) {
  currentRankTab = tab;
  document.querySelectorAll('.creator-rank-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  topCreatorsData[tab] = []; // clear cache so it re-fetches fresh
  loadTopCreators(tab);
}

async function loadTopCreators(tab) {
  const list = document.getElementById('top-creators-list');
  if (!list) return;

  // Only use cache if it has real data
  if (topCreatorsData[tab]?.length) {
    renderTopCreators(topCreatorsData[tab], tab);
    return;
  }

  list.innerHTML = '<div style="color:#333;font-size:12px;font-weight:700;padding:20px;">Loading…</div>';

  try {
    if (tab === 'stars') {
      // Primary: count stars per owner via comic ownership
      const starsByOwner = {};
      globalStars.forEach(s => {
        const comic = allComics.find(c => c.id === s.receiver_hand);
        if (comic?.owner_handle) starsByOwner[comic.owner_handle] = (starsByOwner[comic.owner_handle] || 0) + 1;
      });

      // Always also count comics per owner as a signal
      const comicsByOwner = {};
      allComics.forEach(c => { if (c.owner_handle) comicsByOwner[c.owner_handle] = (comicsByOwner[c.owner_handle] || 0) + 1; });

      // Merge: use star count if available, else comic count
      const allOwners = [...new Set([...Object.keys(starsByOwner), ...Object.keys(comicsByOwner)])];
      const ranked = allOwners
        .map(h => ({ handle: h, count: starsByOwner[h] || comicsByOwner[h] || 0 }))
        .sort((a, b) => b.count - a.count)
        .slice(0, 10);

      if (!ranked.length) { list.innerHTML = '<div style="color:#333;font-size:12px;font-weight:700;padding:20px;">No data yet</div>'; return; }

      const handles = ranked.map(r => r.handle);
      const { data: profiles } = await _sb.from('profiles').select('handle,name,pic').in('handle', handles);
      const profMap = Object.fromEntries((profiles||[]).map(p => [p.handle, p]));
      profiles?.forEach(p => { profileCache[p.handle] = p; });
      topCreatorsData.stars = ranked.map(r => ({ ...r, ...(profMap[r.handle]||{}) }));

    } else if (tab === 'follows') {
      const { data: followCounts } = await _sb.from('follows').select('following').limit(2000);
      const countMap = {};
      (followCounts || []).forEach(r => { countMap[r.following] = (countMap[r.following] || 0) + 1; });

      // Fallback to comic count if no follows data
      if (!Object.keys(countMap).length) {
        allComics.forEach(c => { if (c.owner_handle) countMap[c.owner_handle] = (countMap[c.owner_handle] || 0) + 1; });
      }

      const sorted = Object.entries(countMap).sort((a,b) => b[1]-a[1]).slice(0,10);
      if (!sorted.length) { list.innerHTML = '<div style="color:#333;font-size:12px;font-weight:700;padding:20px;">No data yet</div>'; return; }

      const handles = sorted.map(([h]) => h);
      const { data: profiles } = await _sb.from('profiles').select('handle,name,pic').in('handle', handles);
      const profMap = Object.fromEntries((profiles||[]).map(p => [p.handle, p]));
      profiles?.forEach(p => { profileCache[p.handle] = p; });
      topCreatorsData.follows = sorted.map(([handle, count]) => ({ handle, count, ...(profMap[handle]||{}) }));
    }

    renderTopCreators(topCreatorsData[tab], tab);
  } catch(e) {
    console.error('loadTopCreators error:', e);
    list.innerHTML = '<div style="color:#333;font-size:12px;font-weight:700;padding:20px;">Could not load creators</div>';
  }
}

const RANK_MEDALS = ['🥇','🥈','🥉','4','5','6','7','8','9','10'];
const RANK_CLASSES = ['gold','silver','bronze','','','','','','',''];

function renderTopCreators(creators, tab) {
  const list = document.getElementById('top-creators-list');
  if (!list) return;
  if (!creators.length) {
    list.innerHTML = '<div style="color:#333;font-size:12px;font-weight:700;padding:20px;">No data yet</div>';
    return;
  }
  const statLabel = tab === 'stars' ? '⭐' : '👥';
  list.innerHTML = creators.map((c, i) => {
    const medal = RANK_MEDALS[i] || (i+1);
    const rankClass = RANK_CLASSES[i] || '';
    const isMedal = i < 3;
    const avatarUrl = getPublicAvatarUrl(c.pic);
    const avatarHtml = avatarUrl
      ? `<img class="creator-rank-avatar" data-handle="${esc(c.handle)}" src="${esc(avatarUrl)}" onerror="this.onerror=null;this.src='';this.style.display='none';this.nextElementSibling.style.display='flex';" alt="${esc(c.handle)}"><div class="creator-rank-avatar" style="display:none;align-items:center;justify-content:center;font-size:22px;background:#222;border:2px solid #333;">👤</div>`
      : `<div class="creator-rank-avatar" style="display:flex;align-items:center;justify-content:center;font-size:22px;background:#222;border:2px solid #333;">👤</div>`;
    return `
      <a class="creator-rank-card ${rankClass}" href="profile.html?u=${esc(c.handle)}">
        ${isMedal ? `<div class="rank-badge">${medal}</div>` : `<div style="position:absolute;top:6px;left:8px;font-size:9px;color:#444;font-weight:900;">#${i+1}</div>`}
        ${avatarHtml}
        <div class="creator-rank-name">${esc(c.name||c.handle)}</div>
        <div class="creator-rank-handle">@${esc(c.handle)}</div>
        <div class="creator-rank-stat">${statLabel} ${c.count}</div>
      </a>`;
  }).join('');

  // Re-hydrate any avatars that were missing from the initial data
  list.querySelectorAll('img.creator-rank-avatar[src=""]').forEach(async img => {
    const handle = img.dataset.handle;
    if (!handle) return;
    const p = await getCachedProfile(handle);
    const nextSrc = getPublicAvatarUrl(p?.pic);
    if (nextSrc) { img.src = nextSrc; img.style.display = ''; }
  });
}

// ── Load ─────────────────────────────────────────────────
function init() {
  // Clear any broken cache from old base64-era data
  try {
    const cached = localStorage.getItem('cc-comics-cache');
    if (cached) {
      const arr = JSON.parse(cached);
      // Old cache had cover as base64 — if first item's cover starts with data: nuke it
      if (arr?.[0]?.cover?.startsWith('data:')) {
        localStorage.removeItem('cc-comics-cache');
        localStorage.removeItem('cc-stars-cache');
        localStorage.removeItem('cc-feeds-ts');
      }
    }
  } catch(e) {
    localStorage.removeItem('cc-comics-cache');
    localStorage.removeItem('cc-feeds-ts');
  }

  loadFeeds().then(() => {
    const loader = document.getElementById('loading-screen');
    if (loader) loader.classList.add('hidden');
  });
  setTimeout(() => {
    const loader = document.getElementById('loading-screen');
    if (loader) loader.classList.add('hidden');
  }, 1800);
  setupRealtime();
}

function setupRealtime() {
  _sb.channel('discover_realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'messages' }, () => {
      // Only reload comments if reading a comic — don't re-fetch entire feed
      if (activeComicId) fetchComments();
    })
    .subscribe();
}

async function loadFeeds() {
  // ── 1. Paint from cache INSTANTLY ──────────────────────
  const CACHE_TTL = 120000; // 2 min
  const cachedComics  = localStorage.getItem('cc-comics-cache');
  const cachedStars   = localStorage.getItem('cc-stars-cache');
  const cachedTs      = parseInt(localStorage.getItem('cc-feeds-ts') || '0');
  const cacheIsValid  = Date.now() - cachedTs < CACHE_TTL;

  if (cachedComics && cachedStars && cacheIsValid) {
    allComics   = JSON.parse(cachedComics);
    globalStars = JSON.parse(cachedStars);
    renderComics(allComics, globalStars);
    updateContinueBadge();
    loadTopCreators(currentRankTab);
    loadDiscoverSquads();
    return;
  }

  // ── 2. Stale cache? Paint immediately, refresh silently ─
  if (cachedComics && cachedStars) {
    allComics   = JSON.parse(cachedComics);
    globalStars = JSON.parse(cachedStars);
    renderComics(allComics, globalStars);
    updateContinueBadge();
    loadTopCreators(currentRankTab);
  }

  // ── 3. Fetch only what's needed — no full data blobs ────
  const [{ data: comics }, { data: ratings }] = await Promise.all([
    _sb.from('comics')
      .select('id,title,cover,owner_handle,owner_name,created_at,tags,swipe_dir')
      .order('created_at', { ascending: false })
      .limit(80),
    _sb.from('messages').select('receiver_hand,content').eq('reaction','rating').limit(2000),
  ]);

  allComics = (comics || []).filter(c => c.title && c.owner_handle);
  globalStars = []; // ratings replaced stars; kept for compatibility
  globalRatings = ratings || [];

  // Reset top creators cache so it re-renders with fresh data
  topCreatorsData = { stars: [], follows: [] };

  // Save to cache
  try {
    localStorage.setItem('cc-comics-cache', JSON.stringify(allComics));
    localStorage.setItem('cc-stars-cache',  JSON.stringify(globalStars));
    localStorage.setItem('cc-feeds-ts',     String(Date.now()));
  } catch(e) {
    localStorage.removeItem('cc-comics-cache');
    localStorage.removeItem('cc-stars-cache');
    localStorage.removeItem('cc-stories-cache');
  }

  renderComics(allComics, globalStars);
  loadTopCreators(currentRankTab);
  loadDiscoverSquads();
  updateContinueBadge();
  return Promise.resolve();
}

function updateContinueBadge() {
  const inProgressCount = allComics.filter(c => {
    const frames = getCachedFrameCount(c.id);
    if (frames < 2) return false;
    return getProgress(c.id, frames) !== null;
  }).length;
  const contTab = document.getElementById('tab-continue');
  if (contTab) {
    contTab.innerHTML = inProgressCount > 0
      ? `▶ Continue <span style="background:#ff7a00;color:#000;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:900;margin-left:2px;">${inProgressCount}</span>`
      : '▶ Continue';
  }
}

// ── Render comics grid ────────────────────────────────────
function renderComics(comics, stars) {
  const sorted    = sortedComics(comics, stars);
  const container = document.getElementById('recentFeed');
  const totalPages = Math.max(1, Math.ceil(sorted.length / ITEMS_PER_PAGE));
  if (currentPage >= totalPages) currentPage = 0;

  if (!sorted.length) {
    container.innerHTML = '<div class="empty-feed" style="padding:40px 20px;grid-column:1/-1;">No comics yet.<br>Be the first to publish!</div>';
    renderPagination(0);
    return;
  }

  const slice = sorted.slice(currentPage * ITEMS_PER_PAGE, (currentPage + 1) * ITEMS_PER_PAGE);

  container.innerHTML = slice.map(c => {
    const starCount  = globalRatings.filter(r => r.receiver_hand === c.id).length;
    const avgRating = starCount > 0 ?
      globalRatings.filter(r => r.receiver_hand === c.id)
        .reduce((sum, r) => sum + (parseInt(r.content) || 0), 0) / starCount : 0;
    const isMine     = c.owner_handle === myProfile.handle;
    const isNew      = isNewComic(c.created_at) && !isMine;
    const prog       = getProgress(c.id, getCachedFrameCount(c.id));
    const coverHtml  = c.cover
      ? `<img src="${esc(c.cover)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-cover>📖</div>'">`
      : `<div class="no-cover">📖</div>`;
    const progressHtml = prog
      ? `<div class="tile-progress"><div class="tile-progress-fill" style="width:${prog.pct}%"></div></div>` : '';
    const badgeHtml  = isMine ? `<div class="tile-mine">MINE</div>`
      : (isNew ? `<div class="tile-new">NEW</div>` : '');
    const starsHtml  = avgRating > 0 ? `<div class="tile-stars" onclick="event.stopPropagation(); toggleStarExpand(this, ${starCount}, ${avgRating.toFixed(1)})">⭐ ${avgRating.toFixed(1)} (${starCount})</div>` : '';
    const ownerHandle = esc(c.owner_handle || 'unknown');
    const followBtn = (!isMine && myProfile.handle !== 'guest')
      ? `<button class="comic-card-follow" data-follow-handle="${ownerHandle}" onclick="event.stopPropagation(); tileFollow(this, '${ownerHandle}')">Follow</button>` : '';

    return `<div class="comic-card" data-id="${esc(c.id)}">
      <div class="comic-card-cover">
        <div style="width:100%;height:100%;border-radius:14px;overflow:hidden;position:relative;">
          ${coverHtml}${badgeHtml}${starsHtml}${progressHtml}
        </div>
      </div>
      <div class="comic-card-info">
        <div class="comic-card-title">${esc(c.title || 'Untitled')}</div>
        <div class="comic-card-meta">
          <img class="comic-card-avatar comic-card-pfp" data-handle="${ownerHandle}" src="" alt=""
            onclick="event.stopPropagation(); location.href='profile.html?u=${ownerHandle}'"
            onerror="this.style.display='none'">
          <span class="comic-card-handle" onclick="event.stopPropagation(); location.href='profile.html?u=${ownerHandle}'">@${ownerHandle}</span>
          ${followBtn}
        </div>
      </div>
    </div>`;
  }).join('');

  container.querySelectorAll('.comic-card').forEach(card => {
    card.addEventListener('click', () => openPopup(card.dataset.id));
  });

  hydrateCardAvatars(container);
  hydrateFollowButtons(container);

}

function renderPagination(totalPages) {
  const prev = document.getElementById('home-prev-btn');
  const next = document.getElementById('home-next-btn');
  if (prev) prev.disabled = (currentPage === 0);
  if (next) next.disabled = (currentPage >= totalPages - 1);
}

function goToPage(n) {
  const sorted = sortedComics(allComics, globalStars);
  const totalPages = Math.ceil(sorted.length / ITEMS_PER_PAGE);
  currentPage = Math.max(0, Math.min(n, totalPages - 1));
  renderComics(allComics, globalStars);
  document.getElementById('section-recents')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openRandomComic() {
  if (!allComics.length) return;
  const r = allComics[Math.floor(Math.random() * allComics.length)];
  openPopup(r.id);
}

function toggleSortDropdown(e) {

  const isOpen = menu.classList.contains('open');

  const rect = btn.getBoundingClientRect();
  menu.style.top  = (rect.bottom + 6) + 'px';
  menu.style.left = rect.left + 'px';
  menu.classList.add('open');
}

function setSortFromDropdown(sort) {
  document.getElementById('sort-dropdown-menu').classList.remove('open');
  // Highlight active option
  ['recent','popular','oldest','favorites'].forEach(s => {
    document.getElementById('sort-opt-' + s)?.classList.toggle('sort-active', s === sort);
  });
  // Update dropdown button label
  const labels = { recent: 'Recent ▾', popular: 'Top ▾', oldest: 'Oldest ▾', favorites: '⭐ Favs ▾' };
  const btn = document.getElementById('sort-dropdown-btn');
  if (btn) btn.textContent = labels[sort] || 'All ▾';

  if (sort === 'favorites') {
    switchTab('favorites');
  } else {

      switchTab('all');
    }
    setSort(sort);

// Close dropdown when clicking outside (but not on the menu itself)
document.addEventListener('click', (e) => {
  const menu = document.getElementById('sort-dropdown-menu');
  const btn  = document.getElementById('sort-dropdown-btn');
  if (menu && !menu.contains(e.target) && e.target !== btn) {
    menu.classList.remove('open');
  }
});

function hydrateCardAvatars(container) {
  // Hydrate both old .comic-card-avatar and new overlapping .comic-card-pfp
  const avatars = container.querySelectorAll('[data-handle].comic-card-avatar, [data-handle].comic-card-pfp');
  const handles = [...new Set([...avatars].map(a => a.dataset.handle))];
  handles.forEach(async handle => {
    const p = await getCachedProfile(handle);
    const avatarUrl = getPublicAvatarUrl(p?.pic) || DEFAULT_AVATAR;
    container.querySelectorAll(`[data-handle="${handle}"].comic-card-avatar, [data-handle="${handle}"].comic-card-pfp`).forEach(img => {
      img.src = avatarUrl;
      img.classList.remove('hidden');
    });
  });

async function hydrateAvatars(container) {
  const avatars = container.querySelectorAll('.tile-creator-avatar[data-handle]');
  // Batch by unique handles
  const handles = [...new Set([...avatars].map(a => a.dataset.handle))];
  await Promise.all(handles.map(async handle => {
    const p = await getCachedProfile(handle);
    const avatarUrl = getPublicAvatarUrl(p?.pic) || DEFAULT_AVATAR;
    container.querySelectorAll(`.tile-creator-avatar[data-handle="${handle}"]`).forEach(img => {

async function hydrateFollowButtons(container) {
  if (!myProfile.handle || myProfile.handle === 'guest') return;
  const btns = container.querySelectorAll('[data-follow-handle]');
  const handles = [...new Set([...btns].map(b => b.dataset.followHandle))];
  await Promise.all(handles.map(async handle => {
    const following = await isFollowing(handle);
    container.querySelectorAll(`[data-follow-handle="${handle}"]`).forEach(btn => {
      if (following) { btn.textContent = 'Following ✓'; btn.classList.add('following'); }

// ── Popup ─────────────────────────────────────────────────
async function openPopup(id) {
  const c = allComics.find(c => c.id === id);
  if (!c) return;
  activePopupComic = c;

  // Cover
  const coverWrap = document.getElementById('popup-cover-wrap');
  coverWrap.innerHTML = c.cover
    ? `<img class="popup-cover" src="${esc(c.cover)}" onerror="this.parentNode.innerHTML='<div class=popup-cover-placeholder>📖</div>'">`
    : `<div class="popup-cover-placeholder">📖</div>`;

  // Title & creator
  document.getElementById('popup-title').innerText   = c.title || 'Untitled';
  const ownerHandle = c.owner_handle || 'unknown';
  document.getElementById('popup-creator').innerHTML =
    `by <a href="profile.html?u=${esc(ownerHandle)}" onclick="event.stopPropagation()">@${esc(ownerHandle)}</a> · ${timeAgo(c.created_at)}`;

  // Meta — show sync cache first, then update from Supabase fetch
  let frameCount = getCachedFrameCount(c.id);
  const starCount  = globalRatings.filter(r => r.receiver_hand === c.id).length;
  const avgRating = starCount > 0 ?
    globalRatings.filter(r => r.receiver_hand === c.id)
      .reduce((sum, r) => sum + (parseInt(r.content) || 0), 0) / starCount : 0;
  document.getElementById('popup-meta').innerHTML = `
    <span class="popup-meta-chip" id="popup-frame-chip">🎞 ${frameCount > 0 ? frameCount + ' frame' + (frameCount !== 1 ? 's' : '') : '…'}</span>
    <span class="popup-meta-chip">⭐ ${starCount}</span>
    ${c.swipe_dir ? `<span class="popup-meta-chip">${c.swipe_dir==='vertical'?'↕ Vertical':'↔ Horizontal'}</span>` : ''}
    <span class="popup-meta-chip">📅 ${exactDate(c.created_at).split(',')[0]}</span>`;

  // Description
  const descEl = document.getElementById('popup-desc');
  descEl.innerText = c.description || '';
  descEl.style.display = c.description ? 'block' : 'none';

  // Tags
  const tags = c.tags || [];
  document.getElementById('popup-tags').innerHTML =
    tags.map(t => `<span class="popup-tag">#${esc(t)}</span>`).join('');

  // Progress (sync path — works immediately if reader has been opened before)
  function applyProgressUI(total) {
    const prog = total > 0 ? getProgress(c.id, total) : null;
    const progWrap = document.getElementById('popup-progress-wrap');
    if (prog) {
      progWrap.style.display = 'block';
      document.getElementById('popup-progress-fill').style.width  = prog.pct + '%';
      document.getElementById('popup-progress-label').innerText   =
        `Reading progress: frame ${prog.frame} of ${prog.total} (${prog.pct}%)`;
    } else {
      progWrap.style.display = 'none';
    }
    return prog;
  }
  let prog = applyProgressUI(frameCount);

  // Lazy-fetch real frame count from Supabase if not yet cached
  if (!frameCount) {
    fetchAndCacheFrameCount(c.id).then(count => {
      if (!count || count === frameCount) return; // no change
      frameCount = count;
      const chip = document.getElementById('popup-frame-chip');
      if (chip) chip.textContent = `🎞 ${count} frame${count !== 1 ? 's' : ''}`;
      prog = applyProgressUI(count);
      // Also update Continue button state
      const readBtn = document.getElementById('popup-read-btn');
      if (readBtn) readBtn.innerHTML = prog ? '▶ Continue' : '▶ Read Now';
    });
  }

  // Rating state
  const isMine = c.owner_handle === myProfile.handle;
  activePopupRated = false;
  if (myProfile.handle !== 'guest' && !isMine) {
    const { data: msg } = await _sb
      .from('messages').select('content')
      .eq('sender_handle', myProfile.handle)
      .eq('receiver_hand', c.id)
      .eq('reaction','rating')
      .maybeSingle();
    activePopupRated = !!(msg && parseInt(msg.content) > 0);
  }

  // Build buttons
  const btns = document.getElementById('popup-btns');
  btns.innerHTML = '';

  const readBtn = document.createElement('button');
  readBtn.className = 'read-btn';
  readBtn.id        = 'popup-read-btn';
  readBtn.innerHTML = prog ? '▶ Continue' : '▶ Read Now';
  readBtn.onclick = () => {
    closePopup();
    const ratioParam = c.canvas_ratio?.w && c.canvas_ratio?.h
      ? `&ratio=${c.canvas_ratio.w}:${c.canvas_ratio.h}` : '';
    location.href = 'reader.html?id=' + encodeURIComponent(c.id) + ratioParam;
  };
  btns.appendChild(readBtn);

  if (!isMine && myProfile.handle !== 'guest') {
    const rateBtn = document.createElement('button');
    rateBtn.className = 'popup-icon-btn' + (activePopupRated ? ' rated' : '');
    rateBtn.id        = 'popup-rate-btn';
    rateBtn.innerHTML = activePopupRated ? '⭐' : '☆';
    rateBtn.title     = activePopupRated ? 'Change rating' : 'Rate this comic';
    rateBtn.onclick   = () => openRatingModal(c.id);
    btns.appendChild(rateBtn);
  }

  const hideCommentsInDiscover = myProfile.settings?.hide_discover_comments === true;
  if (!hideCommentsInDiscover) {
    const commentBtn = document.createElement('button');
    commentBtn.className = 'popup-icon-btn';
    commentBtn.innerHTML = '💬';
    commentBtn.title     = 'Comments';
    commentBtn.onclick   = () => openCommentSheet(c.id);
    btns.appendChild(commentBtn);
  }

  const shareBtn = document.createElement('button');
  shareBtn.className = 'popup-icon-btn';
  shareBtn.innerHTML = '↗';
  shareBtn.title     = 'Share';
  shareBtn.onclick   = () => openShareSheet(c.id, c.title);
  btns.appendChild(shareBtn);

  if (isMine) {
    const editBtn = document.createElement('button');
    editBtn.className = 'popup-edit-btn';
    editBtn.innerHTML = '✏️ Edit';
    editBtn.onclick   = () => {
      closePopup();
      localStorage.setItem('edit_comic_id', c.id);
      location.href = 'create.html';
    };
    btns.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'popup-delete-btn';
    delBtn.innerHTML = '🗑';
    delBtn.title     = 'Delete comic';
    delBtn.onclick   = () => deleteComic(c.id, c.title);
    btns.appendChild(delBtn);
  }

  document.getElementById('popup-overlay').classList.add('open');
}

  document.getElementById('popup-overlay').classList.remove('open');
  activePopupComic = null;
}

async function fetchComments() {
  const listEl = document.getElementById('commentList');
  listEl.innerHTML = '<div class="comment-empty">Loading…</div>';

  const { data: comments, error } = await _sb
    .from('messages')
    .select('*')
    .eq('receiver_hand', activeComicId)
    .is('reaction', null)
    .order('created_at', { ascending: false });

  if (error) {
    listEl.innerHTML = '<div class="comment-empty">Could not load comments.</div>';
    return;
  }
  if (!comments || !comments.length) {
    listEl.innerHTML = '<div class="comment-empty">No comments yet. Be first!</div>';
    return;
  }

  // Batch-fetch all unique profiles in ONE query instead of N sequential calls
  const handles = [...new Set(comments.map(m => m.sender_handle).filter(Boolean))];
  const { data: profiles } = await _sb.from('profiles').select('handle,pic,name').in('handle', handles);
  const profMap = {};
  (profiles || []).forEach(p => { profMap[p.handle] = p; profileCache[p.handle] = p; });

  listEl.innerHTML = '';
  for (const m of comments) {
    const p = profMap[m.sender_handle] || { pic: '', name: m.sender_handle };
    const isImgReaction = m.content && m.content.startsWith('[IMG_REACTION]:');
    let bodyHtml = '';
    if (isImgReaction) {
      const src = m.content.replace('[IMG_REACTION]:', '').trim();
      bodyHtml = '<img src="' + esc(src) + '" class="comment-reaction-img" loading="lazy">';
      if (m.comment_text) bodyHtml += '<div style="margin-top:4px;">' + esc(m.comment_text) + '</div>';
    } else {
      bodyHtml = '<div>' + esc(m.content) + '</div>';
    }

    const item = document.createElement('div');
    item.className = 'comment-item';
    const profileUrl = 'profile.html?u=' + esc(m.sender_handle);
    const commentAvatar = getPublicAvatarUrl(p?.pic) || DEFAULT_AVATAR;
    item.innerHTML = '<img src="' + esc(commentAvatar) + '" class="comment-avatar" onclick="location.href=&quot;' + profileUrl + '&quot;" onerror="this.onerror=null;this.src=\"' + DEFAULT_AVATAR + '\";"><div class="comment-content"><div class="comment-user" onclick="location.href=&quot;' + profileUrl + '&quot;">@' + esc(m.sender_handle) + '</div>' + bodyHtml + '</div>';
    listEl.appendChild(item);
  }
}

async function postComment() {
  const input = document.getElementById('commentInput');
  const text  = input.value.trim();
  if (!text && !pendingReactionImg) return;
  if (!myProfile.handle || myProfile.handle === 'guest') {
    showToast('Log in to comment!'); return;
  }

  let content = text;
  let extraFields = {};

  if (pendingReactionImg) {
    // Store the image src as a special comment type
    content = `[IMG_REACTION]:${pendingReactionImg.src}`;
    if (text) extraFields.comment_text = text;
  }

  const { error } = await _sb.from('messages').insert([{
    sender_handle: myProfile.handle,
    receiver_hand: activeComicId,
    content,
    ...extraFields
  }]);

  if (error) { showToast('Error posting comment'); return; }
  input.value = '';
  input.placeholder = 'Add a comment…';
  pendingReactionImg = null;
  fetchComments();
}

function switchTab(type) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const activeTabEl = document.getElementById('tab-'+type);
  if (activeTabEl) activeTabEl.classList.add('active');
  // If favorites is picked from dropdown, highlight the dropdown btn
  if (type === 'favorites') {
    document.getElementById('sort-dropdown-btn')?.classList.add('active');
  }
  document.getElementById('section-recents').style.display   = type === 'all'       ? 'block' : 'none';
  document.getElementById('section-continue').style.display  = type === 'continue'  ? 'block' : 'none';
  document.getElementById('section-stories').style.display   = type === 'stories'   ? 'block' : 'none';
  document.getElementById('section-projects').style.display  = type === 'projects'  ? 'block' : 'none';
  document.getElementById('section-favorites').style.display = type === 'favorites' ? 'block' : 'none';
  // Top creators only on home
  const tcSection = document.getElementById('top-creators-section');
  if (tcSection) tcSection.style.display = type === 'all' ? '' : 'none';
  if (type === 'stories') { if (!storiesLoaded) loadStories(); }
  if (type === 'continue') renderContinueReading();
  if (type === 'favorites') loadFavoritesSection();
  if (type === 'projects') loadSquadsTab();
}

function renderSkeletons(n) {
  return Array.from({length: n}, () => `
    <div class="story-card story-skeleton" style="pointer-events:none">
      <div class="skel-cover"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding:4px 0">
        <div class="skel-line" style="width:62%"></div>
        <div class="skel-line" style="width:30%;height:10px"></div>
        <div class="skel-line" style="width:80%;height:10px"></div>
        <div class="skel-line" style="width:40%;height:9px"></div>
      </div>
    </div>`).join('');
}

function renderStories(stories) {
  const feed = document.getElementById('storiesFeed');
  if (!stories || !stories.length) {
    feed.innerHTML = '<div class="empty-feed">No stories yet.<br>Be the first to publish one! ✍️</div>';
    return;
  }
  feed.innerHTML = stories.map(s => {
    const pages = s.page_count || Math.max(1, Math.ceil((s.word_count||0)/350));
    const coverHtml = s.cover
      ? '<img src="' + esc(s.cover) + '" class="story-cover" loading="lazy">'
      : '<div class="story-cover-placeholder">📖</div>';
    const descHtml = s.description
      ? '<div class="story-desc">' + esc(s.description) + '</div>'
      : '';
    const pageLabel = pages + ' page' + (pages !== 1 ? 's' : '');
    const href = 'reader.html?id=' + esc(s.id);
    return '<div class="story-card" onclick="location.href=&quot;' + href + '&quot;">'
      + coverHtml
      + '<div style="flex:1;min-width:0">'
      + '<div class="story-title">' + esc(s.title) + '</div>'
      + '<a href="profile.html?u=' + esc(s.owner_handle) + '" class="story-author" onclick="event.stopPropagation()">@' + esc(s.owner_handle) + '</a>'
      + descHtml
      + '<div class="story-meta"><span>📄 ' + pageLabel + '</span><span>' + timeAgo(s.created_at) + '</span></div>'
      + '</div></div>';
  }).join('');
}

async function loadStories() {
  const feed = document.getElementById('storiesFeed');
  storiesLoaded = true;

  // ── 1. Instant cache paint ──────────────────────────────
  const cacheKey = 'cc-stories-cache';
  const cacheTs  = 'cc-stories-ts';
  const cached   = localStorage.getItem(cacheKey);
  const ts       = parseInt(localStorage.getItem(cacheTs) || '0');
  const stale    = Date.now() - ts > 90000; // 90 s TTL

  if (cached && !stale) {
    try { renderStories(JSON.parse(cached)); return; } catch(e) {}
  }
  if (cached) {
    try { renderStories(JSON.parse(cached)); } catch(e) { feed.innerHTML = renderSkeletons(4); }
  } else {
    feed.innerHTML = renderSkeletons(4);
  }

  // ── 2. Background fetch ─────────────────────────────────
  const { data: stories, error } = await _sb.from('stories')
    .select('id,title,description,cover,tags,word_count,owner_name,owner_handle,created_at')
    .order('created_at', { ascending: false })
    .limit(40);

  if (error) {
    console.warn('Stories fetch error:', error.message);
    // Always show something — never leave skeletons frozen
    if (cached) {
      try { renderStories(JSON.parse(cached)); } catch(e) {
        feed.innerHTML = '<div class="empty-feed">Could not load stories. Try refreshing.</div>';
      }
    } else {
      feed.innerHTML = '<div class="empty-feed">Could not load stories. Try refreshing.</div>';
    }
    return;
  }

  try {
    localStorage.setItem(cacheKey, JSON.stringify(stories || []));
    localStorage.setItem(cacheTs, String(Date.now()));
  } catch(e) {
    localStorage.removeItem(cacheKey);
  }
  renderStories(stories || []);
}

let squadsTabLoaded = false;

async function loadSquadsTab() {
  if (squadsTabLoaded) return;
  squadsTabLoaded = true;

  const myHandle = myProfile.handle;
  const mySection  = document.getElementById('projects-my-squads-section');
  const myStrip    = document.getElementById('projects-my-squads-scroll');
  const recSection = document.getElementById('projects-rec-squads-section');
  const recGrid    = document.getElementById('projects-rec-squads-grid');

  recGrid.innerHTML = '<div style="color:#333;font-size:12px;font-weight:700;padding:20px;grid-column:1/-1;">Loading squads…</div>';

  const [{ data: squads }, { data: myReqs }, { data: accepted }, { data: lastMsgs }] = await Promise.all([
    _sb.from('team_tickets').select('id,team_name,pfp,owner_handle,is_private,description').order('created_at', { ascending: false }).limit(60),
    myHandle && myHandle !== 'guest'
      ? _sb.from('team_requests').select('ticket_id,status').eq('sender_handle', myHandle)
      : Promise.resolve({ data: [] }),
    _sb.from('team_requests').select('ticket_id').eq('status','accepted'),
    _sb.from('team_messages').select('ticket_id,created_at').order('created_at',{ascending:false}).limit(200)
  ]);

  if (!squads?.length) {
    recGrid.innerHTML = '<div style="color:#555;font-size:13px;font-weight:700;padding:40px 20px;grid-column:1/-1;text-align:center;">No squads yet. <a href="squads.html" style="color:#ff7a00;">Create one!</a></div>';
    return;
  }

  const reqs   = (myReqs  || []).map(r=>({...r, ticket_id:String(r.ticket_id)}));
  const acc    = (accepted|| []).map(r=>({...r, ticket_id:String(r.ticket_id)}));
  const lastMsgMap = {};
  (lastMsgs||[]).forEach(m => { if (!lastMsgMap[String(m.ticket_id)]) lastMsgMap[String(m.ticket_id)] = m; });

  const memberCount = sid => acc.filter(r=>r.ticket_id===sid).length + 1;
  const isOwner     = s   => s.owner_handle === myHandle;
  const myReq       = s   => reqs.find(r=>r.ticket_id===String(s.id));
  const isMember    = s   => isOwner(s) || (myReq(s)?.status === 'accepted');
  const isPending   = s   => !isMember(s) && myReq(s)?.status === 'pending';

  // My Squads strip
  if (myHandle && myHandle !== 'guest') {
    const mine = squads.filter(isMember);
    if (mine.length) {
      myStrip.innerHTML = mine.map(s => {
        const pfpHtml = s.pfp
          ? `<div class="my-squad-avatar" onclick="location.href='squad_chat.html?id=${esc(String(s.id))}'"><img src="${esc(s.pfp)}" onerror="this.parentElement.innerHTML='💬'"></div>`
          : `<div class="my-squad-avatar" onclick="location.href='squad_chat.html?id=${esc(String(s.id))}'">💬</div>`;
        return `<div class="my-squad-chip">${pfpHtml}<div class="my-squad-name">${esc(s.team_name)}</div></div>`;
      }).join('') + `<div class="my-squad-join-chip" onclick="location.href='squads.html'">
        <div class="my-squad-join-btn">＋</div>
        <div class="my-squad-name" style="color:#ff7a00;">Explore</div>
      </div>`;
      mySection.style.display = '';
    }
  }

  // All squads grid
  const visibleSquads = squads.filter(s => !s.is_private || isMember(s));
  recGrid.innerHTML = visibleSquads.map(s => {
    const sid = String(s.id);
    const cnt = memberCount(sid);
    const lastMsg = lastMsgMap[sid];
    const isActive = lastMsg && (Date.now() - new Date(lastMsg.created_at)) < 3600000;
    const member = isMember(s);
    const pending = isPending(s);
    let btnClass = '', btnLabel = 'Join';
    if (member)  { btnClass = 'joined';  btnLabel = '✓ Member'; }
    if (pending) { btnClass = 'pending'; btnLabel = '⏳ Pending'; }

    const coverHtml = s.pfp ? `<img src="${esc(s.pfp)}" onerror="this.parentElement.innerHTML='🏕️'">` : `🏕️`;
    return `<div class="rec-squad-card" onclick="location.href='squad_chat.html?id=${sid}'">
      <div class="rec-squad-cover">${coverHtml}
        ${s.is_private ? '<div class="rec-squad-private-badge">🔒 Private</div>' : ''}
      </div>
      <div class="rec-squad-body">
        <div class="rec-squad-name">${esc(s.team_name)}</div>
        <div class="rec-squad-meta">
          <span>👥 ${cnt}</span>
          ${isActive ? '<span class="rec-squad-active">🟢 Active</span>' : ''}
        </div>
        ${!member ? `<button class="rec-squad-join-btn ${btnClass}" onclick="event.stopPropagation();squadsTabJoin(this,'${sid}',${!!s.is_private})">${btnLabel}</button>` : ''}
      </div>
    </div>`;
  }).join('') || '<div style="color:#555;font-size:13px;font-weight:700;padding:40px 20px;grid-column:1/-1;text-align:center;">No public squads yet.</div>';
}

async function squadsTabJoin(btn, id, isPrivate) {
  const myHandle = myProfile.handle;

  else { btn.className = 'rec-squad-join-btn joined'; btn.innerText = '✓ Joined'; showToast('Joined! 🎉'); }
}
