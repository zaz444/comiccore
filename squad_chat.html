<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicCore | Squad Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/regular/straight.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        :root {
            --accent: #ff7a00;
            --accent-light: #ff9a3c;
            --accent-rgb: 255,122,0;
            --bg: #0f0f11;
            --bg-elevated: #18181b;
            --card: #1e1e22;
            --card-2: #26262c;
            --border: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.16);
            --text: #f4f4f6;
            --text-muted: #888896;
            --text-dim: #55555f;
            --online: #32d74b;
            --away: #ffcc00;
            --dnd: #ff453a;
            --danger: #ff453a;
        }

        html, body {
            height: 100%; height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        #mainUI {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100dvh;
            background: var(--bg);
        }

        /* ══════════════════════════════════════
           HEADER — single clean row, no avatar stack
        ══════════════════════════════════════ */
        .chat-header {
            flex-shrink: 0;
            background: rgba(10,10,13,0.92);
            backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 10px 12px;
            display: flex; align-items: center; gap: 10px;
        }
        .icon-btn {
            width: 34px; height: 34px; border-radius: 11px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: .15s;
            color: var(--text-muted); font-size: 15px; text-decoration: none;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.11); color: var(--text); }

        #chatPic {
            width: 38px; height: 38px; border-radius: 12px;
            background: var(--card-2); background-size: cover; background-position: center;
            border: 1.5px solid var(--border-strong); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; color: var(--text-dim);
        }
        #chatPic i { font-size: 16px; }

        .header-info { flex: 1; min-width: 0; cursor: pointer; display: flex; flex-direction: column; gap: 1px; }
        .header-name-row { display: flex; align-items: center; gap: 3px; }
        .header-name { font-size: 15px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.1px; }
        .header-chevron { color: var(--text-dim); font-size: 11px; flex-shrink: 0; transition: transform .15s; }
        .header-info:hover .header-chevron { transform: translateX(2px); color: var(--text-muted); }
        .header-sub { font-size: 11px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .header-sub-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
        .header-sub-dot.online { background: var(--online); }

        /* ══════════════════════════════════════
           CHAT SCROLL
        ══════════════════════════════════════ */
        #chatContainer {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 14px 12px 10px;
            display: flex; flex-direction: column; gap: 3px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }
        #chatContainer::-webkit-scrollbar { width: 3px; }
        #chatContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .date-divider {
            align-self: center;
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 3px 12px; font-size: 10px; font-weight: 800;
            color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
            margin: 10px 0;
        }

        .load-more-btn {
            align-self: center; background: var(--card);
            border: 1px solid var(--border); color: var(--text-muted);
            font-size: 11px; font-weight: 800; padding: 7px 18px; border-radius: 20px;
            cursor: pointer; font-family: inherit; transition: .15s; margin: 4px 0 8px;
        }
        .load-more-btn:hover { background: var(--card-2); color: var(--text); }

        .chat-empty {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px; text-align: center; padding: 40px 20px;
            color: var(--text-dim);
        }
        .chat-empty-icon { font-size: 34px; color: var(--border-strong); }
        .chat-empty-title { font-size: 15px; font-weight: 800; color: var(--text-muted); }
        .chat-empty-sub { font-size: 12px; }

        /* ══════════════════════════════════════
           MESSAGE ROWS
        ══════════════════════════════════════ */
        .msg-row {
            display: flex; align-items: flex-end; gap: 7px; width: 100%;
            margin-bottom: 2px;
        }
        .mine   { flex-direction: row-reverse; }
        .theirs { flex-direction: row; }

        .msg-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--card-2); object-fit: cover; flex-shrink: 0;
            border: 1.5px solid var(--border); align-self: flex-end;
            cursor: pointer; transition: border-color .12s;
        }
        .msg-avatar:hover { border-color: var(--accent); }
        .mine .msg-avatar { display: none; }
        .avatar-spacer { width: 28px; flex-shrink: 0; }

        .msg-wrapper {
            display: flex; flex-direction: column;
            max-width: min(76%, 340px); position: relative; gap: 2px;
        }
        .mine  .msg-wrapper { align-items: flex-end; }
        .theirs .msg-wrapper { align-items: flex-start; }

        .sender-line { display: flex; align-items: center; gap: 5px; padding: 0 4px; margin-bottom: 2px; }
        .mine .sender-line { display: none; }
        .sender-name { font-size: 11px; font-weight: 800; letter-spacing: .1px; cursor: pointer; }
        .sender-name:hover { text-decoration: underline; text-underline-offset: 2px; }
        .role-badge {
            font-size: 8px; font-weight: 900; letter-spacing: .5px;
            padding: 1px 5px; border-radius: 5px; text-transform: uppercase; flex-shrink: 0;
        }
        .role-owner  { background: rgba(255,122,0,.16); color: var(--accent); border: 1px solid rgba(255,122,0,.3); }
        .role-member { display: none; }
        .role-mod    { background: rgba(50,215,75,.14); color: var(--online); border: 1px solid rgba(50,215,75,.25); }

        .bubble {
            padding: 10px 14px;
            font-size: 14px; line-height: 1.5;
            word-wrap: break-word; white-space: pre-wrap;
            position: relative;
            border: 1px solid var(--border);
        }
        .mine .bubble {
            background: var(--accent); color: #1a1a1a; font-weight: 600;
            border-color: transparent;
            border-radius: 18px 18px 4px 18px;
        }
        .theirs .bubble {
            background: var(--card); color: var(--text);
            border-radius: 18px 18px 18px 4px;
        }
        .bubble-img { padding: 3px; background: transparent !important; border: none !important; box-shadow: none !important; }
        .bubble-img img { width: 200px; max-width: 100%; border-radius: 14px; display: block; cursor: pointer; transition: transform .13s; }
        
        .msg-delete {
            position: absolute; top: -7px;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--danger); border: none; color: white;
            font-size: 9px; cursor: pointer; display: none;
            align-items: center; justify-content: center; z-index: 5;
        }
        .mine  .msg-delete { left: -7px; }
        .theirs .msg-delete { right: -7px; }
        .msg-wrapper:hover .msg-delete { display: flex; }

        .quick-react-btn {
            position: absolute; bottom: -9px;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--card-2); border: 1px solid var(--border-strong);
            font-size: 12px; cursor: pointer; display: none; color: var(--text-muted);
            align-items: center; justify-content: center; z-index: 4; transition: .12s;
        }
        .mine  .quick-react-btn { left: 6px; }
        .theirs .quick-react-btn { right: 6px; }
        .msg-wrapper:hover .quick-react-btn { display: flex; }
        .quick-react-btn:hover { background: rgba(255,122,0,.22); border-color: var(--accent); color: var(--accent); }

        .msg-footer { display: flex; align-items: center; gap: 4px; padding: 0 4px; }
        .mine .msg-footer { flex-direction: row-reverse; }
        .msg-time { font-size: 9px; font-weight: 700; color: var(--text-dim); }
        .mine .msg-time { color: rgba(255,255,255,0.28); }
        .read-receipt { font-size: 10px; color: var(--text-dim); line-height: 1; }
        .read-receipt.delivered { color: rgba(50,215,75,0.7); }

        .msg-reactions { display: flex; flex-wrap: wrap; gap: 3px; padding: 2px 2px 0; }
        .mine  .msg-reactions { justify-content: flex-end; }
        .msg-reaction-chip {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 2px 7px; font-size: 12px; cursor: pointer; transition: .12s;
            display: flex; align-items: center; gap: 3px;
        }
        .msg-reaction-chip:hover { border-color: var(--accent); background: rgba(255,122,0,.12); }
        .msg-reaction-chip span { font-size: 9px; color: var(--text-muted); font-weight: 800; }

        .typing-indicator { display: flex; align-items: center; gap: 8px; padding: 4px 0; margin-top: 2px; }
        .typing-bubble {
            background: var(--card);
            border: 1px solid var(--border); border-radius: 18px 18px 18px 4px;
            padding: 8px 14px; display: flex; align-items: center; gap: 4px;
        }
        .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: typeBounce 1.2s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: .18s; }
        .typing-dot:nth-child(3) { animation-delay: .36s; }
        @keyframes typeBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
        .typing-label { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-left: 4px; }

        /* ══════════════════════════════════════
           INPUT AREA
        ══════════════════════════════════════ */
        .input-wrap {
            flex-shrink: 0; position: relative;
            background: rgba(10,10,13,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        }

        .chat-reaction-picker {
            position: absolute; bottom: 100%; left: 0; right: 0;
            background: var(--bg-elevated); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: none; flex-direction: column; max-height: 250px; z-index: 20;
        }
        .chat-reaction-picker.open { display: flex; }
        .chat-reaction-label { font-size: 9px; font-weight: 900; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 14px 6px; }
        .chat-reaction-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; padding: 0 12px 12px; overflow-y: auto; }
        .chat-reaction-img-btn { aspect-ratio: 1; background: var(--card); border-radius: 10px; overflow: hidden; border: 1.5px solid transparent; cursor: pointer; transition: .14s; padding: 0; }
        .chat-reaction-img-btn:hover { border-color: var(--accent); }
        .chat-reaction-img-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .reaction-preview { display: none; align-items: center; gap: 8px; padding: 0 2px 8px; }
        .reaction-preview.show { display: flex; }
        .reaction-preview img { width: 30px; height: 30px; border-radius: 8px; object-fit: cover; }
        .reaction-preview-label { font-size: 11px; font-weight: 700; color: var(--text-muted); flex: 1; }
        .reaction-preview-cancel { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 0; }

        .input-row { display: flex; align-items: flex-end; gap: 8px; }

        .input-icon-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: .15s;
            color: var(--text-muted); font-size: 16px;
        }
        .input-icon-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
        .input-icon-btn.active { border-color: var(--accent); background: rgba(255,122,0,.14); color: var(--accent); }

        .msg-input {
            flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 20px; padding: 9px 16px; color: var(--text);
            font-size: 14px; font-family: inherit; outline: none;
            transition: border-color .15s, background .15s;
            line-height: 1.45; resize: none; overflow: hidden;
            min-height: 38px; max-height: 120px;
        }
        .msg-input:focus { border-color: rgba(255,122,0,0.45); background: rgba(255,255,255,0.09); }
        .msg-input::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--accent); border: 1.5px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: filter .15s;
        }
        .send-btn:hover { filter: brightness(1.08); }
        .send-btn svg { width: 16px; height: 16px; fill: #1a1a1a; transform: translateX(1px); }

        /* ══════════════════════════════════════
           EMOJI TAPBACK POPOVER
        ══════════════════════════════════════ */
        .emoji-popover {
            position: fixed; z-index: 600;
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong); border-radius: 24px;
            padding: 8px 10px; display: none; gap: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            animation: popIn .13s cubic-bezier(.2,0,.2,1);
        }
        .emoji-popover.open { display: flex; }
        @keyframes popIn { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
        .emoji-opt {
            width: 36px; height: 36px; border-radius: 12px;
            background: transparent; border: none; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .1s;
        }
        .emoji-opt:hover { background: rgba(255,255,255,.1); }

        /* ══════════════════════════════════════
           MEMBER SHEET (replaces avatar stack + old info panel)
        ══════════════════════════════════════ */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 800;
            display: none; align-items: flex-end; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .sheet-overlay.open { display: flex; animation: overlayIn .18s ease both; }
        @keyframes overlayIn { from{opacity:0} to{opacity:1} }

        .member-sheet {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 22px 22px 0 0; width: 100%; max-width: 480px;
            max-height: 88vh; overflow-y: auto;
            animation: sheetUp .24s cubic-bezier(.25,.46,.45,.94) both;
            display: flex; flex-direction: column;
        }
        @keyframes sheetUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

        .sheet-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 12px 0;
        }
        .sheet-topbar-actions { display: flex; gap: 8px; }

        .member-sheet-hero {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding: 6px 24px 20px;
        }
        .member-sheet-avatar {
            width: 72px; height: 72px; border-radius: 20px;
            background: var(--card-2); background-size: cover; background-position: center;
            border: 2px solid var(--border-strong);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dim); font-size: 28px; margin-bottom: 12px;
        }
        .member-sheet-name { font-size: 19px; font-weight: 900; letter-spacing: -.2px; margin-bottom: 3px; }
        .member-sheet-owner { font-size: 12px; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; }
        .member-sheet-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; max-width: 340px; }

        .member-sheet-actions {
            display: flex; gap: 8px; padding: 0 20px 18px;
        }
        .sheet-action-btn {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
            padding: 11px; border-radius: 14px; font-size: 12.5px; font-weight: 800;
            cursor: pointer; font-family: inherit; transition: .15s; border: 1px solid var(--border);
            background: var(--card); color: var(--text-muted);
        }
        .sheet-action-btn:hover { background: var(--card-2); color: var(--text); border-color: var(--border-strong); }
        .sheet-action-btn.primary { background: rgba(255,122,0,.12); border-color: rgba(255,122,0,.3); color: var(--accent); }
        .sheet-action-btn.primary:hover { background: rgba(255,122,0,.2); }
        .sheet-action-btn.danger { background: rgba(255,69,58,.08); border-color: rgba(255,69,58,.22); color: #ff6b5f; }
        .sheet-action-btn.danger:hover { background: rgba(255,69,58,.16); }

        .member-sheet-divider { height: 1px; background: var(--border); margin: 0 20px; }

        .member-section-label {
            font-size: 10px; font-weight: 900; color: var(--text-dim);
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 18px 20px 8px;
        }

        .member-list { padding: 0 12px 20px; display: flex; flex-direction: column; gap: 2px; }
        .member-row {
            display: flex; align-items: center; gap: 12px;
            padding: 9px 8px; border-radius: 12px; cursor: pointer; transition: background .12s;
        }
        .member-row:hover { background: rgba(255,255,255,0.04); }
        .member-row-avatar-wrap { position: relative; flex-shrink: 0; }
        .member-row-avatar {
            width: 42px; height: 42px; border-radius: 50%; object-fit: cover;
            background: var(--card-2); border: 1px solid var(--border);
        }
        .member-row-status-dot {
            position: absolute; bottom: -1px; right: -1px;
            width: 12px; height: 12px; border-radius: 50%;
            border: 2.5px solid var(--bg-elevated); background: var(--text-dim);
        }
        .member-row-status-dot.online { background: var(--online); }
        .member-row-status-dot.afk    { background: var(--away); }
        .member-row-status-dot.dnd    { background: var(--dnd); }
        .member-row-body { flex: 1; min-width: 0; }
        .member-row-name { font-size: 14px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .member-row-status-text { font-size: 11px; color: var(--text-dim); font-weight: 600; margin-top: 1px; }
        .member-row-crown { color: var(--accent); font-size: 12px; flex-shrink: 0; }
        .member-row-mod-badge {
            font-size: 8px; font-weight: 900; letter-spacing: .4px; text-transform: uppercase;
            background: rgba(50,215,75,.14); color: var(--online); border: 1px solid rgba(50,215,75,.25);
            padding: 1px 5px; border-radius: 5px; flex-shrink: 0;
        }

        /* ── Error ── */
        .error-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; text-align: center; gap: 12px; padding: 30px; background: var(--bg); }
        .error-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 22px; margin-bottom: 4px; }
        .error-screen h2 { font-size: 19px; font-weight: 900; }
        .error-screen p { color: var(--text-muted); font-size: 13px; max-width: 280px; line-height: 1.5; }
        .error-btn { margin-top: 8px; padding: 12px 26px; border-radius: 20px; background: var(--accent); color: #1a1a1a; border: none; font-weight: 800; cursor: pointer; font-size: 13px; font-family: inherit; }

        /* ── Lightbox ── */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 94vw; max-height: 88vh; border-radius: 14px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: var(--text-muted); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* ══════════════════════════════════════
           PROFILE PREVIEW CARD
        ══════════════════════════════════════ */
        .profile-preview-backdrop {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: flex-end; justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .profile-preview-backdrop.open { display: flex; animation: ppFadeIn .15s ease both; }
        @keyframes ppFadeIn { from{opacity:0} to{opacity:1} }

        .profile-preview-card {
            width: 100%; max-width: 420px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 26px 26px 0 0;
            overflow: hidden;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
            animation: ppSlideUp .22s cubic-bezier(.25,.46,.45,.94) both;
        }
        @keyframes ppSlideUp { from{transform:translateY(28px);opacity:0} to{transform:translateY(0);opacity:1} }

        .pp-banner {
            width: 100%; height: 72px;
            background: var(--card-2);
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .pp-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .pp-close {
            position: absolute; top: 10px; right: 12px;
            width: 28px; height: 28px; border-radius: 50%;

<script>
    const _sb = supabase.createClient(
        'https://mmycqeejhguzhtzkyjaj.supabase.co',
        'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE',
        { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } }
    );

    window.addEventListener('unhandledrejection', e => {
        // Only log — do NOT call showError() here. Random Supabase/realtime
        // promise rejections would falsely trigger the Access Denied screen.
        console.error('[ComicCore] UNHANDLED PROMISE:', e.reason || e);
    });

    let myProfile = {};
    try {
        myProfile = JSON.parse(localStorage.getItem('user_profile') || '{}');
    } catch (parseErr) {
        console.error('[ComicCore] Invalid user_profile JSON in localStorage:', parseErr);
    }

    let myHandle = myProfile && typeof myProfile === 'object' ? myProfile.handle : null;
    const activeSquadId = new URLSearchParams(window.location.search).get('id');

    // If there's no squad ID in the URL at all, redirect to squads list immediately
    if (!activeSquadId) {
        console.warn('[ComicCore] No squad ID in URL — redirecting to squads.html');
        location.replace('squads.html');
    }

    // If handle wasn't in localStorage, pull it from Supabase Auth session
    async function resolveHandle() {
        if (myHandle) { console.log('[ComicCore] resolveHandle: found in localStorage:', myHandle); return; }
        try {
            const { data: { session } } = await _sb.auth.getSession();
            const user = session?.user;
            if (!user) { console.warn('[ComicCore] resolveHandle: no auth session'); return; }

            console.log('[ComicCore] resolveHandle: user id =', user.id);

            myHandle = user.user_metadata?.handle || null;
            if (myHandle) { console.log('[ComicCore] resolveHandle: got handle from user_metadata:', myHandle); }

            if (!myHandle) {
                const { data: dbp } = await _sb.from('profiles').select('handle').eq('uuid', user.id).maybeSingle()
                    .catch(() => ({ data: null }));
                myHandle = dbp?.handle || null;
                if (myHandle) { console.log('[ComicCore] resolveHandle: got handle from profiles.uuid:', myHandle); }
            }

            if (!myHandle) {
                const { data: dbp } = await _sb.from('profiles').select('handle').eq('permanent_id', user.id).maybeSingle()
                    .catch(() => ({ data: null }));
                myHandle = dbp?.handle || null;
                if (myHandle) { console.log('[ComicCore] resolveHandle: got handle from profiles.permanent_id:', myHandle); }
            }

            if (!myHandle) {
                const { data: dbp } = await _sb.from('profiles').select('handle').eq('id', user.id).maybeSingle()
                    .catch(() => ({ data: null }));
                myHandle = dbp?.handle || null;
                if (myHandle) { console.log('[ComicCore] resolveHandle: got handle from profiles.id:', myHandle); }
            }

            if (myHandle) {
                const merged = { ...(myProfile || {}), handle: myHandle };
                localStorage.setItem('user_profile', JSON.stringify(merged));
            } else {
                console.error('[ComicCore] resolveHandle: could not find handle for user', user.id);
            }
        } catch (e) {
            console.error('[ComicCore] resolveHandle failed:', e);
        }
    }

    const picCache  = {};
    const roleCache = {};

    async function getPic(handle) {
        if (picCache[handle] !== undefined) return picCache[handle];
        try {
            const { data, error } = await sbFetch(
                _sb.from('profiles').select('pic').eq('handle', handle).maybeSingle(),
                8000
            );
            if (error) throw error;
            picCache[handle] = data?.pic || '';
        } catch (err) {
            console.error('[ComicCore] getPic failed for', handle, err);
            picCache[handle] = '';
        }
        return picCache[handle];
    }

    const ROLE_COLORS = { owner: '#ff7a00', mod: '#32d74b', member: '#8e8ea0' };
    const ROLE_LABELS = { owner: 'Owner', mod: 'Mod', member: 'Member' };

    const BASE_URL = 'https://mmycqeejhguzhtzkyjaj.supabase.co/storage/v1/object/public/avatars/reactions/';
    const ALL_REACTIONS = [
        { name: 'nuke the whole generation', src: BASE_URL + 'IMG_1823.webp' },
        { name: 'who is this',               src: BASE_URL + 'IMG_1824.webp' },
        { name: 'sipping lex luthor',        src: BASE_URL + 'IMG_1825.webp' },
        { name: 'read',                      src: BASE_URL + 'IMG_1826.webp' },
        { name: 'sobbing man',               src: BASE_URL + 'IMG_1827.webp' },
        { name: 'thinking',                  src: BASE_URL + 'IMG_1829.webp' },
        { name: 'gem found',                 src: BASE_URL + 'IMG_1831.webp' },
        { name: 'flight interested',         src: BASE_URL + 'IMG_1832.webp' },
        { name: 'spongebob phone',           src: BASE_URL + 'IMG_1833.webp' },
    ];

    // Universal image URL formatter to prevent Frankenstein URLs
    function formatImageUrl(pic) {
        if (!pic) return 'https://via.placeholder.com/62x62?text=Avatar';
        if (pic.startsWith('data:image')) return pic;
        if (pic.startsWith('avatars/')) {
            const cleanPath = pic.replace('avatars/', '');
            const { data } = _sb.storage.from('avatars').getPublicUrl(cleanPath);
            return data.publicUrl;
        }
        return pic;
    }

    function getProfilePicUrl(pic) {
        return formatImageUrl(pic);
    }

    let pendingReactionSrc = null;
    let isSquadOwner       = false;
    let squadData          = null;
    let memberList         = [];
    let msgReactions       = {};
    let activeReactMsgId   = null;

    const PAGE_SIZE = 40;
    let msgOffset   = 0;
    let hasMoreMsgs = false;

    let typingTimeout = null;
    let typingChannel = null;
    const typingUsers = new Set();
    let typingTimers  = {};

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let _toastTimer;
    function toast(msg) {
        const t = document.getElementById('ccToast');
        t.innerText = msg;
        t.classList.add('show');
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
    }

    // ── Init ──────────────────────────────────────────────
    function sbFetch(query, ms = 8000) {
        return Promise.race([
            query,
            new Promise((_, rej) =>
                setTimeout(() => rej(new Error('Supabase request timed out (' + ms + 'ms)')), ms)
            )
        ]);
    }

    async function init() {
        await resolveHandle();
        console.log('[ComicCore] init() started — activeSquadId:', activeSquadId, '| myHandle:', myHandle);

        if (!activeSquadId) {
            console.error('[ComicCore] init() no squad ID — redirecting');
            location.replace('squads.html');
            return;
        }
        if (!myHandle) {
            console.error('[ComicCore] init() no handle resolved — redirecting to profile');
            location.replace('profile.html');
            return;
        }

        try {
            console.log('[ComicCore] init() auth.getSession race start');
            const authSession = await Promise.race([
                _sb.auth.getSession(),
                new Promise(res => setTimeout(res, 5000))
            ]);
            console.log('[ComicCore] init() auth.getSession race complete', authSession);

            console.log('[ComicCore] init() loading squad data', activeSquadId);
            const { data: squad, error: squadErr } = await sbFetch(
                _sb.from('team_tickets').select('*').eq('id', activeSquadId).maybeSingle()
            );
            console.log('[ComicCore] init() squad query done', { squad, squadErr });
            if (squadErr || !squad) return showError();
            squadData    = squad;
            isSquadOwner = squad.owner_handle === myHandle;

            if (!isSquadOwner) {
                console.log('[ComicCore] init() checking team request approval for', myHandle);
                const { data: req, error: reqErr } = await sbFetch(
                    _sb.from('team_requests')
                        .select('status').eq('ticket_id', activeSquadId).eq('sender_handle', myHandle).maybeSingle()
                );
                console.log('[ComicCore] init() team request query done', { req, reqErr });
                if (req && req.status === 'accepted') {
                    // Already a member — all good
                } else if (!squad.is_private && (!req || req.status !== 'accepted')) {
                    console.log('[ComicCore] public squad — auto-accepting membership for', myHandle);
                    if (!req) {
                        await _sb.from('team_requests').insert([{ ticket_id: activeSquadId, sender_handle: myHandle, status: 'accepted' }]);
                    } else {
                        await _sb.from('team_requests').update({ status: 'accepted' }).eq('ticket_id', activeSquadId).eq('sender_handle', myHandle);
                    }
                } else {
                    console.error('[ComicCore] not authorized for squad', { req, reqErr });
                    showError();
                    return;
                }
            }

            // Header
            document.getElementById('headerTitle').innerText = squadData.team_name;
            if (squadData.pfp) { document.getElementById('chatPic').style.backgroundImage = `url(${squadData.pfp})`; document.getElementById('chatPic').innerHTML = ''; }

            console.log('[ComicCore] init() member role load start');
            await loadMemberRoles(squadData);
            console.log('[ComicCore] init() member role load complete');

            // Preload profile data and statuses for all members to avoid per-preview queries
            console.log('[ComicCore] init() preload profiles start');
            const memberHandles = memberList.map(m => m.handle);
            const { data: profilesData, error: profilesErr } = await sbFetch(
                _sb.from('profile_stats').select('*').in('handle', memberHandles),
                10000
            );
            if (profilesErr) console.error('[ComicCore] Preload profiles error:', profilesErr);
            if (profilesData) {
                profilesData.forEach(p => {
                    ppProfileCache[p.handle] = {
                        id: p.id,
                        handle: p.handle,
                        name: p.name || p.handle,
                        pic: p.pic || '',
                        bio: p.bio || '',
                        banner: p.banner || '',
                        followers: p.follower_count || 0,
                        following: p.following_count || 0,
                        works: p.works_count || 0,
                        role: p.settings?.role || null,
                        status: 'offline' // will update below
                    };
                });
            }

            const memberHandlesForStatus = profilesData ? profilesData.map(p => p.handle).filter(Boolean) : [];
            const { data: statusData, error: statusErr } = await sbFetch(
                _sb.from('user_status').select('handle,status,updated_at').in('handle', memberHandlesForStatus),
                10000
            );
            if (statusErr) console.error('[ComicCore] Preload status error:', statusErr);
            if (statusData) {
                statusData.forEach(s => {
                    if (ppProfileCache[s.handle]) {
                        ppProfileCache[s.handle].status = deriveStatus(s);
                    }
                });
            }
            console.log('[ComicCore] init() preload profiles complete');

            updateHeaderSubtitle();
            document.getElementById('sheetManageBtn').style.display = isSquadOwner ? 'flex' : 'none';
            document.getElementById('sheetLeaveBtn').style.display  = isSquadOwner ? 'none' : 'flex';

            document.getElementById('msgInput').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });

            console.log('[ComicCore] init() loadMessages(true) start');
            await loadMessages(true);
            console.log('[ComicCore] init() loadMessages(true) complete');

            // Defer realtime so browser marks page as fully loaded first
            setTimeout(() => {
                setupRealtime();
                setupTypingRealtime();
            }, 0);
        } catch (err) {
            console.error('[ComicCore] Squad chat init failed:', err.message);
            showError();
        }
    }

    async function loadMemberRoles(squad) {
        try {
            console.log('[ComicCore] loadMemberRoles() start');
            const { data: accepted, error: acceptedErr } = await sbFetch(
                _sb.from('team_requests')
                    .select('sender_handle').eq('ticket_id', activeSquadId).eq('status','accepted')
            );
            if (acceptedErr) throw acceptedErr;

            memberList = [
                { handle: squad.owner_handle, isOwner: true },
                ...(accepted || []).map(r => ({ handle: r.sender_handle, isOwner: false }))
            ];
            memberList.forEach(m => { roleCache[m.handle] = m.isOwner ? 'owner' : 'member'; });
            if (!roleCache[myHandle]) roleCache[myHandle] = isSquadOwner ? 'owner' : 'member';

            const handles = [...new Set(memberList.map(m => m.handle))];
            const { data: profiles, error: profilesErr } = await sbFetch(
                _sb.from('profiles').select('handle,pic').in('handle', handles)
            );
            if (profilesErr) throw profilesErr;

            (profiles || []).forEach(p => { picCache[p.handle] = p.pic || ''; });
            console.log('[ComicCore] loadMemberRoles() complete', { memberCount: memberList.length });
        } catch (err) {
            console.error('[ComicCore] loadMemberRoles failed:', err);
            throw err;
        }
    }

    // ── Header subtitle: online count, or member count as fallback ──
    function updateHeaderSubtitle() {
        const onlineCount = memberList.filter(m => ppProfileCache[m.handle]?.status === 'online').length;
        const dot = document.getElementById('headerSubDot');
        const sub = document.getElementById('headerSub');
        if (onlineCount > 0) {
            dot.classList.add('online');
            sub.innerText = `${onlineCount} online`;
        } else {
            dot.classList.remove('online');

    function showError() {
        document.getElementById('mainUI').style.display   = 'none';
        document.getElementById('errorScreen').style.display = 'flex';
    }

    // ── Message loading ───────────────────────────────────
    async function loadMessages(initial = false) {
        console.log('[ComicCore] loadMessages() start', { initial, activeSquadId, msgOffset });
        if (initial) {
            msgOffset = 0;
            document.getElementById('chatContainer').innerHTML = `
                <div id="msgSkeleton" style="display:flex;flex-direction:column;gap:10px;padding:8px 0;">
                    ${[1,2,3,4,5].map((_, i) => `
                    <div style="display:flex;align-items:flex-end;gap:8px;flex-direction:${i%2===0?'row':'row-reverse'};">
                        <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);flex-shrink:0;"></div>
                        <div style="width:${40+Math.floor(i*13)}%;height:38px;border-radius:18px;background:rgba(255,255,255,0.06);
                            background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.05) 75%);
                            background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
                    </div>`).join('')}
                </div>
                <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>`;
        }

        try {
            console.log('[ComicCore] loadMessages() supabase query start');
            const { data, error } = await sbFetch(
                _sb.from('team_messages')
                    .select('*')
                    .eq('ticket_id', activeSquadId)
                    .order('created_at', { ascending: false })
                    .range(msgOffset, msgOffset + PAGE_SIZE - 1),
                12000
            );
            console.log('[ComicCore] loadMessages() supabase query done', { dataLength: data?.length, error });
            if (error) console.error('Supabase error in loadMessages:', error);

            const skeleton = document.getElementById('msgSkeleton');
            if (skeleton) skeleton.remove();
            if (!initial) document.getElementById('chatContainer').innerHTML = '';

            if (error || !data?.length) { if (initial) renderEmptyState(); return; }
            const totalFetched = msgOffset + data.length;
            hasMoreMsgs = data.length === PAGE_SIZE;
            msgOffset   = totalFetched;

            const msgs      = [...data].reverse();
            const container = document.getElementById('chatContainer');
            if (container.querySelector('.chat-empty')) container.innerHTML = '';

            if (hasMoreMsgs && initial) {
                const btn = document.createElement('button');
                btn.className = 'load-more-btn'; btn.innerText = 'Load older messages';
                btn.id = 'loadMoreBtn'; btn.onclick = loadOlderMessages;
                container.prepend(btn);
            }

            let lastDate = container.querySelector('[data-lastdate]')?.dataset.lastdate || null;
            const anchor = document.getElementById('loadMoreBtn')?.nextSibling || null;

            const unknownHandles = [...new Set(msgs.map(m => m.sender_handle))].filter(h => picCache[h] === undefined);
            if (unknownHandles.length) {
                const { data: picRows } = await sbFetch(
                    _sb.from('profiles').select('handle,pic').in('handle', unknownHandles),
                    8000
                ).catch(() => ({ data: [] }));
                (picRows || []).forEach(p => { picCache[p.handle] = p.pic || ''; });
                unknownHandles.forEach(h => { if (picCache[h] === undefined) picCache[h] = ''; });
            }

            for (const m of msgs) {
                const d = new Date(m.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
                if (d !== lastDate) {
                    const div = document.createElement('div');
                    div.className = 'date-divider'; div.innerText = d; div.dataset.lastdate = d;
                    anchor ? container.insertBefore(div, anchor) : container.appendChild(div);
                    lastDate = d;
                }
                await appendMessage(m, false, anchor);
            }
            if (initial) container.scrollTop = container.scrollHeight;
        } catch (err) {
            console.error('[ComicCore] loadMessages failed:', err.message);
            const skeleton = document.getElementById('msgSkeleton');
            if (skeleton) skeleton.remove();
            if (initial) {
                document.getElementById('chatContainer').innerHTML =
                    `<div class="chat-empty"><div class="chat-empty-icon"><i class="fi fi-rs-triangle-warning"></i></div><div class="chat-empty-title">Couldn't load messages</div><div class="chat-empty-sub">Check your connection and refresh.</div></div>`;
            }
        }
    }

    async function loadOlderMessages() {
        if (!hasMoreMsgs) {
            console.log('[ComicCore] loadOlderMessages skipped: no more messages');
            const btn = document.getElementById('loadMoreBtn');
            if (btn) btn.remove();
            return;
        }

        const container  = document.getElementById('chatContainer');
        const prevH      = container.scrollHeight;
        const prevS      = container.scrollTop;
        const btn        = document.getElementById('loadMoreBtn');
        if (btn) { btn.innerText = 'Loading…'; btn.disabled = true; }

        try {
            console.log('[ComicCore] loadOlderMessages() supabase query start', { msgOffset });
            const { data, error } = await sbFetch(
                _sb.from('team_messages').select('*')
                    .eq('ticket_id', activeSquadId).order('created_at', { ascending: false })
                    .range(msgOffset, msgOffset + PAGE_SIZE - 1),
                12000
            );
            console.log('[ComicCore] loadOlderMessages() supabase query done', { dataLength: data?.length, error });
            if (error) console.error('Supabase error in loadOlderMessages:', error);
            if (error) throw error;
            if (!data?.length) { if (btn) btn.remove(); return; }
            msgOffset += data.length;

            if (data.length < PAGE_SIZE) {
                hasMoreMsgs = false;
                if (btn) btn.remove();
            } else {
                hasMoreMsgs = true;
            }

            const anchor = btn?.nextSibling || null;
            const olderMsgs = [...data].reverse();
            const unknownOlder = [...new Set(olderMsgs.map(m => m.sender_handle))].filter(h => picCache[h] === undefined);
            if (unknownOlder.length) {
                const { data: picRows } = await _sb.from('profiles').select('handle,pic').in('handle', unknownOlder);
                (picRows || []).forEach(p => { picCache[p.handle] = p.pic || ''; });
                unknownOlder.forEach(h => { if (picCache[h] === undefined) picCache[h] = ''; });
            }
            let lastDate = null;
            for (const m of olderMsgs) {
                const d = new Date(m.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
                if (d !== lastDate) {
                    const div = document.createElement('div');
                    div.className = 'date-divider'; div.innerText = d;
                    anchor ? container.insertBefore(div, anchor) : container.appendChild(div);
                    lastDate = d;
                }
                await appendMessage(m, false, anchor);
            }
            if (!hasMoreMsgs && btn) btn.remove();
            else if (btn) { btn.innerText = 'Load older messages'; btn.disabled = false; }
            container.scrollTop = prevS + (container.scrollHeight - prevH);
        } catch (err) {
            console.error('[ComicCore] loadOlderMessages failed:', err?.code || err, err?.message || err);
            if (btn) { btn.innerText = 'Load older messages'; btn.disabled = false; }
        }
    }

    function renderEmptyState() {
        document.getElementById('chatContainer').innerHTML =
            `<div class="chat-empty"><div class="chat-empty-icon"><i class="fi fi-rs-comment-alt"></i></div><div class="chat-empty-title">No messages yet</div><div class="chat-empty-sub">Be the first to say something!</div></div>`;
    }

    // ── Append message ────────────────────────────────────
    async function appendMessage(m, scrollToBottom = true, insertBefore = null) {
        if (document.getElementById(`row-${m.id}`)) return;
        const isMine    = m.sender_handle === myHandle;
        const container = document.getElementById('chatContainer');
        const empty     = container.querySelector('.chat-empty');
        if (empty) empty.remove();

        const row    = document.createElement('div');
        row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;
        row.id        = `row-${m.id}`;

        const pic    = await getPic(m.sender_handle);
        const role   = roleCache[m.sender_handle] || 'member';
        const isTemp = String(m.id).startsWith('temp-');

        const time   = m.created_at
            ? new Date(m.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}) : '';

        const receipt   = isMine
            ? `<span class="read-receipt${isTemp?'':' delivered'}">${isTemp?'›':'››'}</span>` : '';
        const delBtn    = (!isTemp && (isMine || isSquadOwner))
            ? `<button class="msg-delete" onclick="deleteMessage('${m.id}')">✕</button>` : '';
        const reactBtn  = !isTemp
            ? `<button class="quick-react-btn" onclick="openEmojiPopover(event,'${m.id}')">+</button>` : '';

        const rxns    = msgReactions[m.id] || {};
        const rxnHtml = Object.entries(rxns).map(([e,c]) =>
            `<div class="msg-reaction-chip" onclick="toggleReaction('${m.id}','${e}')">${e}<span>${c}</span></div>`
        ).join('');

        const avatarSrc = getProfilePicUrl(pic);
        const avatarHtml = isMine
            ? `<div class="avatar-spacer"></div>`
            : `<img class="msg-avatar" src="${avatarSrc}" onerror="this.src=''" alt="" onclick="openProfilePreview('${esc(m.sender_handle)}', event)">`;

        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper';
        wrapper.innerHTML = `
            ${delBtn}
            ${!isMine ? `<div class="sender-line">
                <span class="sender-name" style="color:${ROLE_COLORS[role]}" onclick="openProfilePreview('${esc(m.sender_handle)}', event)">@${esc(m.sender_handle)}</span>
                <span class="role-badge role-${role}">${ROLE_LABELS[role]}</span>
            </div>` : ''}
            ${buildBubble(m)}
            ${reactBtn}
            ${rxnHtml ? `<div class="msg-reactions">${rxnHtml}</div>` : ''}
            <div class="msg-footer">
                <span class="msg-time">${esc(time)}</span>
                ${receipt}
            </div>`;

        const avatarEl = document.createElement('div');
        avatarEl.innerHTML = avatarHtml;

        if (isMine) {
            row.appendChild(wrapper);
        } else {
            row.appendChild(avatarEl.firstChild);
            row.appendChild(wrapper);
        }

        insertBefore ? container.insertBefore(row, insertBefore) : container.appendChild(row);
        if (scrollToBottom) container.scrollTop = container.scrollHeight;
    }

    function isImg(text) {
        if (!text) return false;
        if (text.startsWith('data:image')) return true;
        if (text.startsWith('[IMG_REACTION]:')) return false;
        return /\.(jpeg|jpg|gif|png|webp|svg)(\?|$)/i.test(text) && (text.startsWith('http') || text.startsWith('blob:'));
    }

    function buildBubble(m) {
        const content = m.content || '';
        if (content.startsWith('[IMG_REACTION]:')) {
            const src = content.replace('[IMG_REACTION]:','').trim();
            return `<div class="bubble bubble-img"><img src="${esc(src)}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${esc(src)}')"></div>`;
        }
        if (content.startsWith('[COLLAB_INVITE]:')) {
            try {
                const payload = JSON.parse(content.replace('[COLLAB_INVITE]:','').trim());
                const isMine = m.sender_handle === myHandle;
                return `<div class="bubble" style="background:rgba(255,122,0,0.10);border:1.5px solid rgba(255,122,0,0.3);padding:12px 14px;min-width:200px;">
                    <div style="font-size:11px;font-weight:900;color:var(--accent);letter-spacing:.4px;margin-bottom:6px;display:flex;align-items:center;gap:5px;"><i class="fi fi-rs-palette"></i> CO-CREATE INVITE</div>
                    <div style="font-size:14px;font-weight:800;color:var(--text);margin-bottom:3px;">${esc(payload.comic_title || 'Untitled Comic')}</div>
                    <div style="font-size:11px;color:var(--text-dim);font-weight:700;margin-bottom:10px;">@${esc(payload.inviter_handle)} invited @${esc(payload.invitee_handle)} to co-create</div>
                    ${!isMine && payload.invitee_handle === myHandle && payload.invite_id ? `
                    <div style="display:flex;gap:6px;" id="collab-chat-btns-${payload.invite_id}">
                        <button onclick="respondCollabFromChat('${payload.invite_id}','${payload.comic_id}','accepted',this)"
                            style="flex:1;background:var(--accent);border:none;color:#1a1a1a;font-size:11px;font-weight:900;border-radius:8px;padding:7px;cursor:pointer;font-family:inherit;">
                            Accept
                        </button>
                        <button onclick="respondCollabFromChat('${payload.invite_id}','${payload.comic_id}','declined',this)"
                            style="background:var(--card-2);border:1px solid var(--border);color:var(--text-muted);font-size:11px;font-weight:700;border-radius:8px;padding:7px 12px;cursor:pointer;font-family:inherit;">
                            Decline
                        </button>
                    </div>` : (!isMine ? '' : `<div style="font-size:11px;color:var(--text-dim);font-weight:700;">Waiting for response…</div>`)}
                </div>`;
            } catch(e) {
                return `<div class="bubble">Co-create invite</div>`;
            }
        }
        if (isImg(content)) {
            return `<div class="bubble bubble-img"><img src="${esc(content)}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${esc(content)}')"></div>`;
        }
        return `<div class="bubble">${esc(content)}</div>`;
    }

    async function respondCollabFromChat(inviteId, comicId, response, btn) {
        const wrap = document.getElementById(`collab-chat-btns-${inviteId}`);
        if (wrap) { wrap.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-weight:700;">Updating…</div>'; }
        const { error } = await _sb
            .from('comic_collaborators')
            .update({ status: response })
            .eq('id', inviteId);
        if (error) {
            if (wrap) wrap.innerHTML = `<div style="font-size:11px;color:#ff453a;">Error: ${error.message}</div>`;
            return;
        }
        if (response === 'accepted') {
            await grantCoOwnership(comicId, myHandle);
            localStorage.setItem('edit_comic_id', comicId);
            location.href = window.innerWidth <= 768 ? 'create-mobile.html' : 'create.html';
        } else {
            if (wrap) wrap.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-weight:700;">Declined</div>';
        }
    }

    // Comics have no single "owner" once a collab is accepted — everyone in
    // owner_handles is an equal co-owner with identical edit/delete rights.
    async function grantCoOwnership(comicId, handle) {
        const { data: comic } = await _sb.from('comics').select('owner_handle, owner_handles').eq('id', comicId).maybeSingle();
        if (!comic) return;
        const current = (comic.owner_handles && comic.owner_handles.length) ? [...comic.owner_handles] : (comic.owner_handle ? [comic.owner_handle] : []);
        if (!current.includes(handle)) {
            current.push(handle);
            await _sb.from('comics').update({ owner_handles: current }).eq('id', comicId);
        }
    }

    // ── Send ──────────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const val   = input.value.trim();
        if (!val && !pendingReactionSrc) return;

        let content = val;
        if (pendingReactionSrc) content = `[IMG_REACTION]:${pendingReactionSrc}`;

        input.value = ''; input.style.height = '38px'; input.focus();
        cancelReaction(); closeChatReactionPicker();

        const tempId = 'temp-' + Date.now();
        await appendMessage({ id: tempId, sender_handle: myHandle, content, created_at: new Date().toISOString() });

        try {
            console.log('[ComicCore] sendMessage insert start', { activeSquadId, myHandle });
            const { data, error } = await sbFetch(
                _sb.from('team_messages').insert([{ ticket_id: activeSquadId, sender_handle: myHandle, content }]).select().single(),
                12000
            );
            console.log('[ComicCore] sendMessage insert complete', { data, error });

            if (data && !error) {
                const tempRow = document.getElementById(`row-${tempId}`);
                if (tempRow) {
                    tempRow.id = `row-${data.id}`;
                    const rcpt = tempRow.querySelector('.read-receipt');
                    if (rcpt) { rcpt.innerText = '\u203a\u203a'; rcpt.classList.add('delivered'); }
                }
                await processMentions(content, activeSquadId, squadData?.team_name || '');
            } else {
                throw error || new Error('Unknown sendMessage error');
            }
        } catch (err) {
            console.error('[ComicCore] sendMessage failed:', err);
            const tempRow = document.getElementById(`row-${tempId}`);
            if (tempRow) { tempRow.style.opacity = '0.5'; tempRow.title = 'Failed to send'; }
        }
    }

    // ── Mention notifications ────────────────────────────────
    async function processMentions(messageText, squadId, squadName) {
        const mentioned = [...new Set((messageText.match(/@([a-zA-Z0-9_]+)/g) || []).map(m => m.slice(1)))];
        if (!mentioned.length) return;
        const others = mentioned.filter(h => h !== myHandle);
        if (!others.length) return;

        try {
            const { data: profiles } = await _sb
                .from('profiles').select('handle,settings').in('handle', others);
            if (!profiles) return;

            const toNotify = profiles.filter(p => p.settings?.notif_mentions !== false);
            if (!toNotify.length) return;

            const rows = toNotify.map(p => ({
                to_handle:    p.handle,
                from_handle:  myHandle,
                squad_id:     String(squadId),
                squad_name:   squadName,
                message_text: messageText.slice(0, 200),
                is_read:      false
            }));

            await _sb.from('mentions').insert(rows);
        } catch(e) {
            console.warn('[ComicCore] processMentions failed:', e);
        }
    }

    async function deleteMessage(id) {
        if (!confirm('Delete this message?')) return;
        const row = document.getElementById(`row-${id}`);
        if (row) row.style.opacity = '0.3';

        try {
            const { error } = await sbFetch(_sb.from('team_messages').delete().eq('id', id), 8000);
            if (error) throw error;
            if (row) row.remove();
        } catch (err) {
            console.error('[ComicCore] deleteMessage failed:', err);
            if (row) row.style.opacity = '1';
        }
    }

    // ── Quick emoji reactions ─────────────────────────────
    function openEmojiPopover(e, msgId) {
        e.stopPropagation();
        activeReactMsgId = msgId;
        const pop = document.getElementById('emojiPopover');
        pop.classList.add('open');
        const x = Math.min(e.clientX, window.innerWidth - 260);
        const y = Math.max(e.clientY - 64, 60);
        pop.style.left = x + 'px'; pop.style.top = y + 'px';
    }

    function applyQuickReact(emoji) {
        document.getElementById('emojiPopover').classList.remove('open');
        if (!activeReactMsgId) return;
        const msgId = activeReactMsgId; activeReactMsgId = null;
        if (!msgReactions[msgId]) msgReactions[msgId] = {};
        msgReactions[msgId][emoji] = (msgReactions[msgId][emoji] || 0) + 1;
        refreshReactionChips(msgId);
    }

    function toggleReaction(msgId, emoji) {
        if (!msgReactions[msgId]) return;
        const cur = msgReactions[msgId][emoji] || 0;
        if (cur <= 1) delete msgReactions[msgId][emoji]; else msgReactions[msgId][emoji] = cur - 1;
        refreshReactionChips(msgId);
    }

    function refreshReactionChips(msgId) {
        const row = document.getElementById(`row-${msgId}`); if (!row) return;
        const wrapper = row.querySelector('.msg-wrapper');
        let rxnDiv = wrapper.querySelector('.msg-reactions');
        const entries = Object.entries(msgReactions[msgId] || {});
        if (!entries.length) { if (rxnDiv) rxnDiv.remove(); return; }
        if (!rxnDiv) {
            rxnDiv = document.createElement('div');
            rxnDiv.className = 'msg-reactions';
            wrapper.querySelector('.msg-footer').before(rxnDiv);
        }
        rxnDiv.innerHTML = entries.map(([em,cnt]) =>
            `<div class="msg-reaction-chip" onclick="toggleReaction('${msgId}','${em}')">${em}<span>${cnt}</span></div>`
        ).join('');
    }

    document.addEventListener('click', e => {
        const pop = document.getElementById('emojiPopover');
        if (pop && !pop.contains(e.target)) { pop.classList.remove('open'); activeReactMsgId = null; }
        const picker = document.getElementById('chatReactionPicker');
        const btn    = document.getElementById('chatReactionBtn');
        if (picker && !picker.contains(e.target) && btn && !btn.contains(e.target)) closeChatReactionPicker();
    });

    // ── Image upload ──────────────────────────────────────
    async function handleImageUpload(input) {
        if (!input.files[0]) return;
        const file   = input.files[0]; input.value = '';
        const tempId = 'temp-img-' + Date.now();

        const blobUrl = URL.createObjectURL(file);
        await appendMessage({ id: tempId, sender_handle: myHandle, content: blobUrl, created_at: new Date().toISOString() });

        const ext      = file.name.split('.').pop().toLowerCase() || 'jpg';
        const filename = `squadimages/${activeSquadId}_${myHandle}_${Date.now()}.${ext}`;
        const url      = await uploadToStorage('userimages', filename, file);

        const tr = document.getElementById(`row-${tempId}`);
        if (url) {
            if (tr) {
                const img = tr.querySelector('img');
                if (img) img.src = url;
            }
            const { data, error } = await sbFetch(
                _sb.from('team_messages').insert([{ ticket_id: activeSquadId, sender_handle: myHandle, content: url }]).select().single(),
                12000
            );
            if (data && !error && tr) {
                tr.id = `row-${data.id}`;
            } else {
                console.error('[ComicCore] handleImageUpload insert failed:', error);
                if (tr) { tr.style.opacity = '0.5'; tr.title = 'Failed to save message'; }
            }
        } else {
            if (tr) { tr.style.opacity = '0.5'; tr.title = 'Upload failed'; }
        }

        URL.revokeObjectURL(blobUrl);
    }

    async function uploadToStorage(bucket, path, file) {
        console.log('[ComicCore] uploadToStorage start:', { bucket, path, type: file.type, size: file.size });
        const { data: uploadData, error } = await _sb.storage
            .from(bucket)
            .upload(path, file, { upsert: true, cacheControl: '3600', contentType: file.type || 'image/jpeg' });
        if (error) {
            console.error('[ComicCore] Storage upload error:', error.code, error.message);
            return null;
        }
        const { data: urlData } = _sb.storage.from(bucket).getPublicUrl(path);
        const publicUrl = urlData?.publicUrl;
        if (!publicUrl) {
            console.error('[ComicCore] Storage upload succeeded but publicUrl missing for', path);
            return null;
        }
        console.log('[ComicCore] Storage upload success:', publicUrl);
        return publicUrl;
    }

    // ── Realtime ──────────────────────────────────────────
    function setupRealtime() {
        _sb.channel(`squad_chat_${activeSquadId}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'team_messages' }, payload => {
                const m = payload.new;
                if (String(m.ticket_id) === String(activeSquadId) && m.sender_handle !== myHandle) {
                    appendMessage(m);
                }
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'team_messages' }, payload => {
                const row = document.getElementById(`row-${payload.old.id}`); if (row) row.remove();
            })
            .subscribe();
    }

    function setupTypingRealtime() {
        typingChannel = _sb.channel(`typing_${activeSquadId}`);
        typingChannel.on('broadcast', { event: 'typing' }, ({ payload }) => {
            if (payload.handle === myHandle) return;
            typingUsers.add(payload.handle);
            clearTimeout(typingTimers[payload.handle]);
            typingTimers[payload.handle] = setTimeout(() => { typingUsers.delete(payload.handle); renderTypingIndicator(); }, 3000);
            renderTypingIndicator();
        }).subscribe();
    }

    function handleTyping() {
        clearTimeout(typingTimeout);
        if (typingChannel) typingChannel.send({ type: 'broadcast', event: 'typing', payload: { handle: myHandle } });
        typingTimeout = setTimeout(() => {}, 2000);
    }

    function renderTypingIndicator() {
        let el = document.getElementById('typing-indicator-row');
        if (typingUsers.size === 0) { if (el) el.remove(); return; }
        const names = [...typingUsers].map(h => `@${h}`).join(', ');
        if (!el) {
            el = document.createElement('div');
            el.id = 'typing-indicator-row'; el.className = 'typing-indicator';
            el.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="typing-label" id="typing-label"></span>`;
            document.getElementById('chatContainer').appendChild(el);
        }
        document.getElementById('typing-label').innerText = `${names} ${typingUsers.size===1?'is':'are'} typing`;
        const c = document.getElementById('chatContainer'); c.scrollTop = c.scrollHeight;
    }

    function autoResize(el) { el.style.height = '38px'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

    function buildChatReactionGrid() {
        document.getElementById('chatReactionGrid').innerHTML = ALL_REACTIONS.map(r =>
            `<button class="chat-reaction-img-btn" title="${esc(r.name)}" onclick="selectChatReaction('${esc(r.src)}')">
                <img src="${esc(r.src)}" alt="${esc(r.name)}" loading="lazy">
             </button>`
        ).join('');
    }

    function toggleChatReactionPicker() {
        const picker = document.getElementById('chatReactionPicker');
        const btn    = document.getElementById('chatReactionBtn');
        const isOpen = picker.classList.toggle('open');
        btn.classList.toggle('active', isOpen);
        if (isOpen && !document.getElementById('chatReactionGrid').children.length) buildChatReactionGrid();
    }
    function closeChatReactionPicker() {
        document.getElementById('chatReactionPicker').classList.remove('open');
        document.getElementById('chatReactionBtn').classList.remove('active');
    }
    function selectChatReaction(src) {
        pendingReactionSrc = src; closeChatReactionPicker();
        document.getElementById('chatReactionBtn').classList.add('active');
        document.getElementById('reactionPreviewImg').src = src;
        document.getElementById('reactionPreview').classList.add('show');
    }
    function cancelReaction() {
        pendingReactionSrc = null;
        document.getElementById('chatReactionBtn').classList.remove('active');
        document.getElementById('reactionPreview').classList.remove('show');
        document.getElementById('reactionPreviewImg').src = '';
        document.getElementById('msgInput').placeholder = 'Message the squad…';
    }

    // ── Member Sheet ────────────────────────────────────────
    async function openMemberSheet() {
        if (!squadData) return;
        document.getElementById('sheetName').innerText  = squadData.team_name;
        document.getElementById('sheetOwner').innerText = `by @${squadData.owner_handle}`;
        const avEl = document.getElementById('sheetAvatar');
        if (squadData.pfp) { avEl.style.backgroundImage = `url(${squadData.pfp})`; avEl.innerHTML = ''; }
        else { avEl.style.backgroundImage = ''; avEl.innerHTML = '<i class="fi fi-rs-users-alt"></i>'; }

        const descEl = document.getElementById('sheetDesc');
        if (squadData.description) { descEl.innerText = squadData.description; descEl.style.display = ''; } else descEl.style.display = 'none';

        document.getElementById('memberSheetOverlay').classList.add('open');
        const listEl = document.getElementById('sheetMemberList');
        listEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:8px;">Loading…</div>';
        document.getElementById('memberSectionLabel').innerText = `Members — ${memberList.length}`;

        const rows = memberList.map(m => {
            const pic    = picCache[m.handle] || '';
            const src    = getProfilePicUrl(pic);
            const prof   = ppProfileCache[m.handle];
            const status = prof?.status || 'offline';
            const isMod  = prof?.role === 'mod' && !m.isOwner;
            const statusLabel = { online: 'Online', afk: 'Away', dnd: 'Do Not Disturb', offline: 'Offline' }[status] || 'Offline';
            return `<div class="member-row" onclick="openProfilePreview('${esc(m.handle)}', event); closeMemberSheet();">
                <div class="member-row-avatar-wrap">
                    <img class="member-row-avatar" src="${src}" onerror="this.src=''" alt="">
                    <div class="member-row-status-dot ${status}"></div>
                </div>
                <div class="member-row-body">
                    <div class="member-row-name">
                        @${esc(m.handle)}
                        ${m.isOwner ? `<span class="member-row-crown"><i class="fi fi-rs-crown"></i></span>` : ''}
                        ${isMod ? `<span class="member-row-mod-badge">Mod</span>` : ''}
                    </div>
                    <div class="member-row-status-text">${statusLabel}</div>
                </div>
            </div>`;
        });
        listEl.innerHTML = rows.join('') || '<div style="font-size:12px;color:var(--text-dim);padding:8px;">No members yet.</div>';
    }
    function closeMemberSheet() { document.getElementById('memberSheetOverlay').classList.remove('open'); }

    function goManageSquad() {
        location.href = `squads.html?manage=${activeSquadId}`;
    }

    function copyInviteLink() {
        const link = `${location.origin}${location.pathname.replace('squad_chat.html','')}squads.html?join=${activeSquadId}`;
        navigator.clipboard.writeText(link)
            .then(() => toast('Invite link copied'))
            .catch(() => toast('Could not copy link'));
    }

    async function leaveSquad() {
        if (!confirm(`Leave "${squadData?.team_name || 'this squad'}"?`)) return;
        try {
            await _sb.from('team_requests').delete().eq('ticket_id', activeSquadId).eq('sender_handle', myHandle);
            location.href = 'squads.html';
        } catch (err) {
            console.error('[ComicCore] leaveSquad failed:', err);
            toast('Failed to leave squad');
        }
    }

    function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

    // ── Profile Preview Card ──────────────────────────────
    const ppProfileCache = {};

    async function openProfilePreview(handle, event) {
        if (event) event.stopPropagation();

        const backdrop = document.getElementById('profilePreviewBackdrop');
        backdrop.classList.add('open');

        document.getElementById('ppAvatar').src = getProfilePicUrl(picCache[handle]);
        document.getElementById('ppName').textContent = handle;
        document.getElementById('ppHandle').textContent = '@' + handle;
        document.getElementById('ppRoleTag').style.display = 'none';
        document.getElementById('ppBio').style.display = 'none';
        document.getElementById('ppFollowers').textContent = '—';
        document.getElementById('ppFollowing').textContent = '—';
        document.getElementById('ppWorks').textContent = '—';
        setPreviewStatus('offline');
        document.getElementById('ppBannerImg').style.display = 'none';
        document.getElementById('ppBanner').style.background = 'var(--card-2)';

        document.getElementById('ppViewBtn').onclick = () => {
            location.href = `profile.html?u=${encodeURIComponent(handle)}`;
        };

        document.getElementById('ppMentionBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            const cur   = input.value;
            const mention = `@${handle} `;
            input.value = cur ? cur.trimEnd() + ' ' + mention : mention;
            input.focus();
            autoResize(input);
            closeProfilePreview();
        };

        if (ppProfileCache[handle]) {
            applyPreviewData(ppProfileCache[handle]);
            return;
        }

        try {
            const { data: p, error } = await _sb
                .from('profile_stats')
                .select('*')
                .eq('handle', handle)
                .maybeSingle();

            if (error) {
                console.error('[ComicCore] openProfilePreview fetch error:', error.code, error.message);
                closeProfilePreview();
                return;
            }

            const { data: statusRow } = await _sb
                .from('user_status')
                .select('status,updated_at')
                .eq('handle', handle)
                .maybeSingle()
                .catch(() => ({ data: null }));

            if (p) {
                const previewData = {
                    id: p.permanent_id || p.id,
                    handle: p.handle,
                    name: p.name || p.handle,
                    pic: p.pic || '',
                    bio: p.bio || '',
                    banner: p.banner || '',
                    followers: p.follower_count || 0,
                    following: p.following_count || 0,
                    works: p.works_count || 0,
                    role: p.settings?.role || null,
                    status: deriveStatus(statusRow)
                };

                ppProfileCache[handle] = previewData;
                applyPreviewData(previewData);
                console.log('[ComicCore] openProfilePreview success', handle);
            } else {
                console.warn('[ComicCore] No profile_stats row found for', handle);
            }
        } catch (err) {
            console.error('[ComicCore] openProfilePreview failed:', err?.code || err, err?.message || err);
            closeProfilePreview();
        }
    }

    function deriveStatus(row) {
        if (!row) return 'offline';
        const minutesAgo = (Date.now() - new Date(row.updated_at).getTime()) / 60000;
        if (minutesAgo > 10) return 'offline';
        return row.status || 'online';
    }

    function applyPreviewData(d) {
        document.getElementById('ppAvatar').src = getProfilePicUrl(d.pic);
        document.getElementById('ppName').textContent = d.name;
        document.getElementById('ppHandle').textContent = '@' + d.handle;

        const rt = document.getElementById('ppRoleTag');
        if (d.handle === squadData?.owner_handle) {
            rt.textContent = 'Owner'; rt.className = 'pp-role-tag owner'; rt.style.display = 'inline-block';
        } else if (d.role === 'mod') {
            rt.textContent = 'Mod'; rt.className = 'pp-role-tag mod'; rt.style.display = 'inline-block';
        } else {
            rt.style.display = 'none';
        }

        const bioEl = document.getElementById('ppBio');
        if (d.bio) { bioEl.textContent = d.bio; bioEl.style.display = 'block'; }
        else { bioEl.style.display = 'none'; }

        document.getElementById('ppFollowers').textContent = fmtNum(d.followers);
        document.getElementById('ppFollowing').textContent = fmtNum(d.following);
        document.getElementById('ppWorks').textContent = fmtNum(d.works);

        setPreviewStatus(d.status);

        const bannerImg = document.getElementById('ppBannerImg');
        if (d.banner) {
            const rawPic = d.banner;
            bannerImg.src = rawPic.startsWith('data:')
                ? rawPic
                : (rawPic.startsWith('avatars/')
                    ? _sb.storage.from('avatars').getPublicUrl(rawPic.replace('avatars/', '')).data.publicUrl
                    : rawPic);
            bannerImg.style.display = 'block';
        } else {
            bannerImg.style.display = 'none';
            const hue = d.handle.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
            document.getElementById('ppBanner').style.background = `hsl(${hue}, 22%, 13%)`;
        }
    }

    function setPreviewStatus(status) {
        const dot    = document.getElementById('ppStatusDot');
        const ldot   = document.getElementById('ppStatusLabelDot');
        const ltext  = document.getElementById('ppStatusText');
        const labels = { online: 'Online', afk: 'Away', dnd: 'Do Not Disturb', offline: 'Offline' };
        const cls    = status || 'offline';
        dot.className   = 'pp-status-dot '  + cls;
        ldot.className  = 'pp-status-label-dot ' + cls;
        ltext.textContent = labels[cls] || 'Offline';
    }

    function fmtNum(n) {
        if (n === null || n === undefined || n === '—') return '—';
        n = Number(n);
        if (isNaN(n)) return '—';
        if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        return String(n);
    }

    function closeProfilePreview() {
        document.getElementById('profilePreviewBackdrop').classList.remove('open');
    }

    function handlePreviewBackdropClick(e) {
        if (e.target === document.getElementById('profilePreviewBackdrop')) closeProfilePreview();
    }

    let _initOnce = false;
    async function runInitOnce() {
        if (_initOnce) return;
        _initOnce = true;
        console.log('[ComicCore] init trigger event fired');
        try {
            await init();
        } catch (err) {
            console.error('[ComicCore] init() threw:', err);
            showError();
        }
    }

    window.addEventListener('DOMContentLoaded', runInitOnce);
    window.addEventListener('load', runInitOnce);

    // After 8 seconds, force-stop the browser loading spinner
    setTimeout(() => {
        if (document.readyState !== 'complete') {
            window.stop();
        }
        const url = location.href.split('#')[0];
        history.replaceState(null, '', url + '#_loaded');
        history.replaceState(null, '', url);
    }, 8000);
</script>
</body>
</html>
