<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicCore | Squad Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        :root {
            --accent: #ff7a00;
            --glass: rgba(0,0,0,0.55);
            --glass-b: rgba(255,255,255,0.07);
        }

        html, body {
            height: 100%; height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #f0f0f5;
            background: #08080c;
        }

        /* ── Immersive background ── */
        #chatBg {
            position: fixed; inset: 0; z-index: 0;
            background-size: cover; background-position: center;
        }
        #chatBg::after {
            content: '';
            position: absolute; inset: 0;
            background: var(--wash, rgba(6,6,12,0.78));
            backdrop-filter: blur(1px);
        }

        #mainUI {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100dvh;
        }

        /* ══════════════════════════════════════
           HEADER
        ══════════════════════════════════════ */
        .chat-header {
            flex-shrink: 0;
            background: rgba(0,0,0,0.70);
            backdrop-filter: blur(28px) saturate(1.5);
            border-bottom: 1px solid var(--glass-b);
            z-index: 100;
        }

        .chat-header-top {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px 7px;
        }

        .back-btn {
            width: 32px; height: 32px; border-radius: 10px;
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-b);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: .15s; color: #aaa; font-size: 15px;
            text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.14); color: white; }

        #chatPic {
            width: 34px; height: 34px; border-radius: 10px;
            background: #1a1a1e; background-size: cover; background-position: center;
            border: 1.5px solid rgba(255,122,0,0.4); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }

        .header-info { flex: 1; min-width: 0; cursor: pointer; }
        .header-info:hover .header-name { color: var(--accent); }
        .header-name { font-size: 15px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s; }
        .header-sub  { font-size: 10px; color: rgba(255,255,255,0.3); font-weight: 600; margin-top: 1px; }

        .header-info-btn {
            width: 32px; height: 32px; border-radius: 10px;
            background: rgba(255,255,255,0.07); border: 1px solid var(--glass-b);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; color: #666; font-size: 14px; transition: .15s;
        }
        .header-info-btn:hover { color: white; background: rgba(255,255,255,0.13); }

        /* ── Participant row + live ticker ── */
        .chat-header-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 14px 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .participant-avatars { display: flex; align-items: center; flex-shrink: 0; }
        .participant-avatar {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.7);
            background: #1e1e22; object-fit: cover;
            margin-left: -5px; flex-shrink: 0;
            transition: transform .12s; cursor: pointer;
        }
        .participant-avatar:first-child { margin-left: 0; }
        .participant-avatar:hover { transform: scale(1.25); z-index: 5; }
        .participant-count {
            width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,255,255,0.09); border: 2px solid rgba(0,0,0,0.7);
            font-size: 8px; font-weight: 900; color: #888;
            display: flex; align-items: center; justify-content: center;
            margin-left: -5px; flex-shrink: 0;
        }
        .live-ticker-wrap { flex: 1; min-width: 0; overflow: hidden; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #32d74b; flex-shrink: 0; animation: livePulse 2s infinite; }
        @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }
        .live-ticker { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live-ticker b { color: rgba(255,255,255,0.6); }

        /* ══════════════════════════════════════
           CHAT SCROLL
        ══════════════════════════════════════ */
        #chatContainer {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 12px 12px 8px;
            display: flex; flex-direction: column; gap: 3px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }
        #chatContainer::-webkit-scrollbar { width: 2px; }
        #chatContainer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* date pill */
        .date-divider {
            align-self: center;
            background: rgba(0,0,0,0.50); backdrop-filter: blur(8px);
            border: 1px solid var(--glass-b); border-radius: 20px;
            padding: 3px 12px; font-size: 10px; font-weight: 800;
            color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase;
            margin: 8px 0;
        }

        .load-more-btn {
            align-self: center; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-b); color: rgba(255,255,255,.35);
            font-size: 11px; font-weight: 800; padding: 6px 18px; border-radius: 20px;
            cursor: pointer; font-family: inherit; transition: .15s; margin: 4px 0;
        }
        .load-more-btn:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.6); }

        .chat-empty {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px; text-align: center; padding: 40px 20px;
            color: rgba(255,255,255,0.18);
        }
        .chat-empty-icon { font-size: 44px; }
        .chat-empty-title { font-size: 15px; font-weight: 800; }
        .chat-empty-sub { font-size: 12px; }

        /* ══════════════════════════════════════
           MESSAGE ROWS
        ══════════════════════════════════════ */
        .msg-row {
            display: flex; align-items: flex-end; gap: 7px; width: 100%;
            margin-bottom: 2px;
            animation: msgIn .16s cubic-bezier(.2,0,.2,1) both;
        }
        @keyframes msgIn { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
        .mine   { flex-direction: row-reverse; }
        .theirs { flex-direction: row; }

        .msg-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            background: #1e1e22; object-fit: cover; flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,0.08); align-self: flex-end;
        }
        .mine .msg-avatar { display: none; }
        .avatar-spacer { width: 30px; flex-shrink: 0; }

        .msg-wrapper {
            display: flex; flex-direction: column;
            max-width: min(76%, 340px); position: relative; gap: 2px;
        }
        .mine  .msg-wrapper { align-items: flex-end; }
        .theirs .msg-wrapper { align-items: flex-start; }

        /* sender name + role badge */
        .sender-line { display: flex; align-items: center; gap: 5px; padding: 0 4px; margin-bottom: 2px; }
        .mine .sender-line { display: none; }
        .sender-name { font-size: 11px; font-weight: 800; letter-spacing: .1px; }
        .role-badge {
            font-size: 8px; font-weight: 900; letter-spacing: .5px;
            padding: 1px 5px; border-radius: 5px; text-transform: uppercase; flex-shrink: 0;
        }
        .role-owner  { background: rgba(255,122,0,.18); color: #ff7a00; border: 1px solid rgba(255,122,0,.3); }
        .role-member { background: rgba(255,255,255,.06); color: #555; border: 1px solid rgba(255,255,255,.1); }
        .role-mod    { background: rgba(50,215,75,.14); color: #32d74b; border: 1px solid rgba(50,215,75,.25); }

        /* bubble */
        .bubble {
            padding: 10px 14px;
            font-size: 14px; line-height: 1.5;
            word-wrap: break-word; white-space: pre-wrap;
            position: relative; backdrop-filter: blur(14px);
            border: 1px solid var(--glass-b);
        }
        .mine .bubble {
            background: var(--accent); color: #000; font-weight: 600;
            border-color: transparent;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 20px rgba(255,122,0,0.28);
        }
        .theirs .bubble {
            background: rgba(16,16,22,0.80); color: #f0f0f5;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        /* image bubble */
        .bubble-img { padding: 3px; background: transparent !important; border: none !important; box-shadow: none !important; }
        .bubble-img img { width: 200px; max-width: 100%; border-radius: 14px; display: block; cursor: pointer; transition: transform .13s; }
        .bubble-img img:hover { transform: scale(1.02); }

        /* delete (hover) */
        .msg-delete {
            position: absolute; top: -7px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #ff3b30; border: none; color: white;
            font-size: 9px; cursor: pointer; display: none;
            align-items: center; justify-content: center; z-index: 5;
        }
        .mine  .msg-delete { left: -7px; }
        .theirs .msg-delete { right: -7px; }
        .msg-wrapper:hover .msg-delete { display: flex; }

        /* quick-react (+) */
        .quick-react-btn {
            position: absolute; bottom: -9px;
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(22,22,30,0.92); border: 1px solid rgba(255,255,255,0.14);
            font-size: 11px; cursor: pointer; display: none;
            align-items: center; justify-content: center; z-index: 4; transition: .12s;
        }
        .mine  .quick-react-btn { left: 6px; }
        .theirs .quick-react-btn { right: 6px; }
        .msg-wrapper:hover .quick-react-btn { display: flex; }
        .quick-react-btn:hover { background: rgba(255,122,0,.22); border-color: var(--accent); }

        /* footer: time + receipt */
        .msg-footer { display: flex; align-items: center; gap: 4px; padding: 0 4px; }
        .mine .msg-footer { flex-direction: row-reverse; }
        .msg-time { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.22); }
        .mine .msg-time { color: rgba(255,255,255,0.32); }
        .read-receipt { font-size: 10px; color: rgba(255,255,255,0.25); line-height: 1; }
        .read-receipt.delivered { color: rgba(50,215,75,0.7); }

        /* mini reaction chips along bubble border */
        .msg-reactions { display: flex; flex-wrap: wrap; gap: 3px; padding: 2px 2px 0; }
        .mine  .msg-reactions { justify-content: flex-end; }
        .msg-reaction-chip {
            background: rgba(0,0,0,0.50); backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
            padding: 2px 7px; font-size: 12px; cursor: pointer; transition: .12s;
            display: flex; align-items: center; gap: 3px;
        }
        .msg-reaction-chip:hover { border-color: var(--accent); background: rgba(255,122,0,.12); }
        .msg-reaction-chip span { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 800; }

        /* typing bubble */
        .typing-indicator { display: flex; align-items: center; gap: 8px; padding: 4px 0; margin-top: 2px; }
        .typing-bubble {
            background: rgba(16,16,22,0.80); backdrop-filter: blur(14px);
            border: 1px solid var(--glass-b); border-radius: 18px 18px 18px 4px;
            padding: 8px 14px; display: flex; align-items: center; gap: 4px;
        }
        .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.35); animation: typeBounce 1.2s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: .18s; }
        .typing-dot:nth-child(3) { animation-delay: .36s; }
        @keyframes typeBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
        .typing-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); margin-left: 4px; }

        /* ══════════════════════════════════════
           INPUT AREA
        ══════════════════════════════════════ */
        .input-wrap {
            flex-shrink: 0; position: relative;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(28px);
            border-top: 1px solid var(--glass-b);
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        }

        /* reaction tray */
        .chat-reaction-picker {
            position: absolute; bottom: 100%; left: 0; right: 0;
            background: rgba(8,8,14,0.97); backdrop-filter: blur(24px);
            border-top: 1px solid var(--glass-b);
            display: none; flex-direction: column; max-height: 250px; z-index: 20;
        }
        .chat-reaction-picker.open { display: flex; }
        .chat-reaction-label { font-size: 9px; font-weight: 900; color: rgba(255,255,255,.25); letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 14px 6px; }
        .chat-reaction-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; padding: 0 12px 12px; overflow-y: auto; }
        .chat-reaction-img-btn { aspect-ratio: 1; background: rgba(255,255,255,.05); border-radius: 10px; overflow: hidden; border: 1.5px solid transparent; cursor: pointer; transition: .14s; padding: 0; }
        .chat-reaction-img-btn:hover { border-color: var(--accent); transform: scale(1.05); }
        .chat-reaction-img-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* pending reaction preview */
        .reaction-preview { display: none; align-items: center; gap: 8px; padding: 0 2px 8px; }
        .reaction-preview.show { display: flex; }
        .reaction-preview img { width: 30px; height: 30px; border-radius: 8px; object-fit: cover; }
        .reaction-preview-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.35); flex: 1; }
        .reaction-preview-cancel { background: none; border: none; color: rgba(255,255,255,.35); font-size: 16px; cursor: pointer; padding: 0; }

        /* input row */
        .input-row { display: flex; align-items: flex-end; gap: 8px; }

        .input-icon-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.07); border: 1px solid var(--glass-b);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: .15s;
            color: rgba(255,255,255,0.45); font-size: 17px;
        }
        .input-icon-btn:hover { background: rgba(255,255,255,0.13); color: white; }
        .input-icon-btn.active { border-color: var(--accent); background: rgba(255,122,0,.14); color: var(--accent); }

        .msg-input {
            flex: 1; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-b);
            border-radius: 20px; padding: 9px 16px; color: white;
            font-size: 14px; font-family: inherit; outline: none;
            transition: border-color .15s, background .15s;
            line-height: 1.45; resize: none; overflow: hidden;
            min-height: 38px; max-height: 120px;
        }
        .msg-input:focus { border-color: rgba(255,122,0,0.4); background: rgba(255,255,255,0.1); }
        .msg-input::placeholder { color: rgba(255,255,255,0.22); }

        .send-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--accent); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: .15s;
            box-shadow: 0 2px 14px rgba(255,122,0,0.45);
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(255,122,0,0.6); }
        .send-btn:active { transform: scale(0.94); }
        .send-btn svg { width: 16px; height: 16px; fill: #000; transform: translateX(1px); }

        /* ══════════════════════════════════════
           EMOJI POPOVER
        ══════════════════════════════════════ */
        .emoji-popover {
            position: fixed; z-index: 600;
            background: rgba(12,12,18,0.96); backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 8px 10px; display: none; gap: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            animation: popIn .13s cubic-bezier(.2,0,.2,1);
        }
        .emoji-popover.open { display: flex; }
        @keyframes popIn { from{opacity:0;transform:scale(.82)} to{opacity:1;transform:scale(1)} }
        .emoji-opt {
            width: 36px; height: 36px; border-radius: 12px;
            background: transparent; border: none; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .1s;
        }
        .emoji-opt:hover { background: rgba(255,255,255,.1); transform: scale(1.28); }

        /* ══════════════════════════════════════
           INFO PANEL
        ══════════════════════════════════════ */
        .info-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 800; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(10px); }
        .info-overlay.open { display: flex; }
        .info-sheet { background: #0f0f14; border: 1px solid var(--glass-b); border-radius: 24px 24px 0 0; width: 100%; max-width: 560px; padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 14px; max-height: 82vh; overflow-y: auto; animation: slideUp .25s cubic-bezier(.4,0,.2,1); }
        @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
        .info-pfp { width: 64px; height: 64px; border-radius: 18px; background: #1a1a1e; background-size: cover; background-position: center; border: 2px solid rgba(255,122,0,0.35); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .info-name { font-size: 20px; font-weight: 900; }
        .info-desc { font-size: 13px; color: #555; line-height: 1.5; }
        .info-topics { display: flex; gap: 6px; flex-wrap: wrap; }
        .info-topic-tag { background: #111; border: 1px solid #1a1a1a; color: #444; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 10px; }
        .info-label { font-size: 9px; font-weight: 900; color: #333; letter-spacing: 2px; text-transform: uppercase; }
        .info-member-list { display: flex; flex-direction: column; gap: 6px; }
        .info-member-row { display: flex; align-items: center; gap: 10px; background: #111; border-radius: 10px; padding: 10px 12px; }
        .info-member-avatar { width: 30px; height: 30px; border-radius: 8px; object-fit: cover; background: #222; border: 1px solid #2a2a2a; flex-shrink: 0; }
        .info-member-handle { font-size: 13px; font-weight: 700; color: #ccc; }
        .info-owner-badge { font-size: 9px; color: #ff7a00; font-weight: 900; background: rgba(255,122,0,.1); border: 1px solid rgba(255,122,0,.2); padding: 1px 6px; border-radius: 5px; margin-left: 6px; }
        .info-close-btn { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: #666; border-radius: 14px; padding: 13px; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; transition: .15s; }
        .info-close-btn:hover { border-color: #444; color: #aaa; }

        /* ── Error ── */
        .error-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; text-align: center; gap: 10px; padding: 30px; }
        .error-screen h2 { font-size: 20px; }
        .error-screen p { color: #555; font-size: 13px; }
        .error-btn { margin-top: 10px; padding: 11px 24px; border-radius: 20px; background: var(--accent); color: #000; border: none; font-weight: 800; cursor: pointer; font-size: 13px; font-family: inherit; }

        /* ── Lightbox ── */
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 94vw; max-height: 88vh; border-radius: 14px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #aaa; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* ══════════════════════════════════════
           PROFILE PREVIEW CARD (Discord-style)
        ══════════════════════════════════════ */
        .profile-preview-backdrop {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            display: none; align-items: flex-end; justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .profile-preview-backdrop.open { display: flex; animation: ppFadeIn .15s ease both; }
        @keyframes ppFadeIn { from{opacity:0} to{opacity:1} }

        .profile-preview-card {
            width: 100%; max-width: 420px;
            background: #0f0f14;
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 26px 26px 0 0;
            overflow: hidden;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
            animation: ppSlideUp .22s cubic-bezier(.25,.46,.45,.94) both;
        }
        @keyframes ppSlideUp { from{transform:translateY(28px);opacity:0} to{transform:translateY(0);opacity:1} }

        /* banner strip */
        .pp-banner {
            width: 100%; height: 72px;
            background: linear-gradient(135deg,#1a1a2e,#16213e);
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .pp-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* close btn on banner */
        .pp-close {
            position: absolute; top: 10px; right: 12px;
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
            color: #aaa; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: .15s;
        }
        .pp-close:hover { background: rgba(255,255,255,0.14); color: white; }

        .pp-body { padding: 0 18px 22px; position: relative; }

        /* Avatar floated up from banner */
        .pp-avatar-wrap { margin-top: -30px; margin-bottom: 10px; position: relative; display: inline-block; }
        .pp-avatar {
            width: 62px; height: 62px; border-radius: 50%;
            border: 3px solid #0f0f14;
            object-fit: cover; background: #1a1a1e;
            display: block;
        }
        .pp-status-dot {
            position: absolute; bottom: 3px; right: 3px;

        .pp-status-dot.online  { background: #32d74b; box-shadow: 0 0 6px rgba(50,215,75,.6); }
        .pp-status-dot.afk     { background: #ffcc00; box-shadow: 0 0 6px rgba(255,204,0,.5); }
        .pp-status-dot.dnd     { background: #ff3b30; box-shadow: 0 0 6px rgba(255,59,48,.5); }
        .pp-status-dot.offline { background: #555; }

        .pp-name-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 2px; }
        .pp-name { font-size: 17px; font-weight: 900; color: #f0f0f5; }
        .pp-role-tag {
            font-size: 9px; font-weight: 900; padding: 2px 7px; border-radius: 20px;
            letter-spacing: .5px; text-transform: uppercase;
            background: rgba(255,255,255,0.08); color: #888;
            border: 1px solid rgba(255,255,255,0.12);

        .pp-role-tag.owner { background: rgba(255,122,0,0.15); color: #ff7a00; border-color: rgba(255,122,0,.35); }
        .pp-role-tag.mod   { background: rgba(0,201,177,0.15); color: #00c9b1; border-color: rgba(0,201,177,.35); }

        .pp-handle { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 4px; }

        .pp-status-label {
            display: flex; align-items: center; gap: 5px;

            margin-bottom: 12px;
        }
        .pp-status-label-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; flex-shrink: 0; }
        .pp-status-label-dot.online { background: #32d74b; }
        .pp-status-label-dot.afk    { background: #ffcc00; }
        .pp-status-label-dot.dnd    { background: #ff3b30; }

        .pp-bio {
            font-size: 13px; color: #999; line-height: 1.5;
            margin-bottom: 14px;
            display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        .pp-stats {
            display: flex; gap: 20px; margin-bottom: 16px;
        }
        .pp-stat b { display: block; font-size: 16px; font-weight: 900; color: white; }
        .pp-stat span { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; font-weight: 700; letter-spacing: .4px; }

        .pp-divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 14px; }

        .pp-actions { display: flex; gap: 8px; }
        .pp-view-btn {
            flex: 1; padding: 11px 0; border-radius: 14px;
            background: var(--accent); color: #000; border: none;
            font-weight: 800; font-size: 13px; cursor: pointer;
            font-family: inherit; transition: .15s;
            box-shadow: 0 2px 14px rgba(255,122,0,.3);
        }
        .pp-view-btn:hover { filter: brightness(1.1); }
        .pp-mention-btn {
            padding: 11px 16px; border-radius: 14px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            color: #aaa; font-weight: 700; font-size: 13px; cursor: pointer;
            font-family: inherit; transition: .15s; white-space: nowrap;
        }
        .pp-mention-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,122,0,.08); }

        /* skeleton shimmer */
        .pp-skeleton {
            background: linear-gradient(90deg, #1a1a22 25%, #22222e 50%, #1a1a22 75%);
            background-size: 200% 100%;
            border-radius: 6px;
            animation: ppShimmer 1.2s infinite linear;
        }
        @keyframes ppShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* clickable message avatars & sender names */
        .msg-avatar { cursor: pointer; transition: transform .12s, box-shadow .12s; }
        .msg-avatar:hover { transform: scale(1.12); box-shadow: 0 0 0 2.5px rgba(255,122,0,0.6); }
        .sender-name { cursor: pointer; }
        .sender-name:hover { text-decoration: underline; text-underline-offset: 2px; }
    </style>
</head>
<body>

<div id="chatBg"></div>

<div class="error-screen" id="errorScreen">

            </div>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
            <input type="file" id="imgUploadInput" hidden accept="image/*" onchange="handleImageUpload(this)">
            <textarea class="msg-input" id="msgInput" placeholder="Message the squad…" autocomplete="off" rows="1" oninput="autoResize(this);handleTyping()"></textarea>
            <div class="input-icon-btn" id="chatReactionBtn" onclick="toggleChatReactionPicker()" title="Reaction images">🎭</div>

<!-- Squad Info Panel -->

            <div style="display:flex;gap:14px;align-items:center;">
                <div class="info-pfp" id="infoPfp"></div>
                <div>
                    <div class="info-name" id="infoName"></div>

                </div>

<!-- Emoji react popover -->

<!-- Profile Preview Card -->
<div class="profile-preview-backdrop" id="profilePreviewBackdrop" onclick="handlePreviewBackdropClick(event)">
    <div class="profile-preview-card" id="profilePreviewCard">
        <div class="pp-banner" id="ppBanner">
            <img id="ppBannerImg" src="" alt="" style="display:none;" onerror="this.style.display='none'">
            <div class="pp-close" onclick="closeProfilePreview()">✕</div>
        </div>
        <div class="pp-body">
            <div class="pp-avatar-wrap">
                <img class="pp-avatar" id="ppAvatar" src="" alt="" onerror="this.src=''">
                <div class="pp-status-dot offline" id="ppStatusDot"></div>
            </div>
            <div class="pp-name-row">
                <span class="pp-name" id="ppName">…</span>
                <span class="pp-role-tag" id="ppRoleTag" style="display:none;"></span>
            </div>

                <div class="pp-stat"><b id="ppFollowers">—</b><span>Followers</span></div>
                <div class="pp-stat"><b id="ppFollowing">—</b><span>Following</span></div>
                <div class="pp-stat"><b id="ppWorks">—</b><span>Works</span></div>
            </div>

            </div>

</div>

<script>
    const _sb = supabase.createClient(
        'https://mmycqeejhguzhtzkyjaj.supabase.co',
        'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE',
        { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } }
    );

    window.addEventListener('unhandledrejection', e => {
        console.error('UNHANDLED PROMISE:', e.reason || e);
        showError();
    });

    let myProfile = {};
    try {
        myProfile = JSON.parse(localStorage.getItem('user_profile') || '{}');
    } catch (parseErr) {
        console.error('[ComicCore] Invalid user_profile JSON in localStorage:', parseErr);
    }

    const myHandle = myProfile && typeof myProfile === 'object' ? myProfile.handle : null;
    const activeSquadId = new URLSearchParams(window.location.search).get('id');

    const picCache  = {};
    const roleCache = {};

    async function getPic(handle) {
        if (picCache[handle] !== undefined) return picCache[handle];
        try {
            const { data, error } = await sbFetch(
                _sb.from('profiles').select('pic').eq('handle', handle).maybeSingle(),
                8000
            );
            if (error) throw error;
            picCache[handle] = data?.pic || '';
        } catch (err) {
            console.error('[ComicCore] getPic failed for', handle, err);
            picCache[handle] = '';
        }
        return picCache[handle];
    }

    const ROLE_COLORS = { owner: '#ff7a00', mod: '#32d74b', member: '#8e8ea0' };
    const ROLE_LABELS = { owner: 'Owner', mod: 'Mod', member: 'Member' };

    const BASE_URL = 'https://mmycqeejhguzhtzkyjaj.supabase.co/storage/v1/object/public/avatars/reactions/';
    const ALL_REACTIONS = [
        { name: 'nuke the whole generation', src: BASE_URL + 'IMG_1823.webp' },
        { name: 'who is this',               src: BASE_URL + 'IMG_1824.webp' },
        { name: 'sipping lex luthor',        src: BASE_URL + 'IMG_1825.webp' },
        { name: 'read',                      src: BASE_URL + 'IMG_1826.webp' },
        { name: 'sobbing man',               src: BASE_URL + 'IMG_1827.webp' },
        { name: 'thinking',                  src: BASE_URL + 'IMG_1829.webp' },
        { name: 'gem found',                 src: BASE_URL + 'IMG_1831.webp' },
        { name: 'flight interested',         src: BASE_URL + 'IMG_1832.webp' },
        { name: 'spongebob phone',           src: BASE_URL + 'IMG_1833.webp' },
    ];

    let pendingReactionSrc = null;
    let isSquadOwner       = false;
    let squadData          = null;
    let memberList         = [];
    let msgReactions       = {};
    let activeReactMsgId   = null;

    const PAGE_SIZE = 40;
    let msgOffset   = 0;
    let hasMoreMsgs = false;

    let typingTimeout = null;
    let typingChannel = null;
    const typingUsers = new Set();
    let typingTimers  = {};

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ──────────────────────────────────────────────
    // Races any Supabase query against a timeout — prevents silent infinite hangs
    function sbFetch(query, ms = 8000) {
        return Promise.race([
            query,
            new Promise((_, rej) =>
                setTimeout(() => rej(new Error('Supabase request timed out (' + ms + 'ms)')), ms)
            )
        ]);
    }

    async function init() {
        console.log('[ComicCore] init() started', { activeSquadId, myHandle });

        if (!activeSquadId || !myHandle) {
            console.error('[ComicCore] init() missing required parameters', { activeSquadId, myHandle });
            showError();
            return;
        }

        try {
            console.log('[ComicCore] init() auth.getSession race start');
            const authSession = await Promise.race([
                _sb.auth.getSession(),
                new Promise(res => setTimeout(res, 5000))
            ]);
            console.log('[ComicCore] init() auth.getSession race complete', authSession);

            console.log('[ComicCore] init() loading squad data', activeSquadId);
            const { data: squad, error: squadErr } = await sbFetch(
                _sb.from('team_tickets').select('*').eq('id', activeSquadId).maybeSingle()
            );
            console.log('[ComicCore] init() squad query done', { squad, squadErr });
            if (squadErr || !squad) return showError();
            squadData    = squad;
            isSquadOwner = squad.owner_handle === myHandle;

            if (!isSquadOwner) {
                console.log('[ComicCore] init() checking team request approval for', myHandle);
                const { data: req, error: reqErr } = await sbFetch(
                    _sb.from('team_requests')
                        .select('status').eq('ticket_id', activeSquadId).eq('sender_handle', myHandle).maybeSingle()
                );
                console.log('[ComicCore] init() team request query done', { req, reqErr });
                if (reqErr || !req || req.status !== 'accepted') {
                    console.error('[ComicCore] not authorized for squad', { req, reqErr });
                    showError();
                    return;
                }
            }

            // Background + hue wash
            if (squad.pfp) document.getElementById('chatBg').style.backgroundImage = `url(${squad.pfp})`;
            const hue = (squad.team_name || '').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 360;
            document.getElementById('chatBg').style.cssText += `--wash: linear-gradient(155deg, hsla(${hue},35%,5%,0.80) 0%, rgba(4,4,10,0.84) 100%);`;

            // Header
            document.getElementById('headerTitle').innerText = squad.team_name;
            document.getElementById('headerSub').innerText   = isSquadOwner ? 'Squad Owner' : 'Squad Chat';
            if (squad.pfp) { document.getElementById('chatPic').style.backgroundImage = `url(${squad.pfp})`; document.getElementById('chatPic').innerText = ''; }

            console.log('[ComicCore] init() member role load start');
            await loadMemberRoles(squad);
            console.log('[ComicCore] init() member role load complete');

            buildParticipantAvatarRow();

            console.log('[ComicCore] init() live ticker update start');
            await updateLiveTicker();
            console.log('[ComicCore] init() live ticker update complete');

            document.getElementById('msgInput').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });

            console.log('[ComicCore] init() loadMessages(true) start');
            await loadMessages(true);
            console.log('[ComicCore] init() loadMessages(true) complete');

            setupRealtime();
            setupTypingRealtime();
            setInterval(updateLiveTicker, 60000);
        } catch (err) {
            console.error('[ComicCore] Squad chat init failed:', err.message);
            showError();
        }
    }

    async function loadMemberRoles(squad) {
        try {
            console.log('[ComicCore] loadMemberRoles() start');
            const { data: accepted, error: acceptedErr } = await sbFetch(
                _sb.from('team_requests')
                    .select('sender_handle').eq('ticket_id', activeSquadId).eq('status','accepted')
            );
            if (acceptedErr) throw acceptedErr;

            memberList = [
                { handle: squad.owner_handle, isOwner: true },
                ...(accepted || []).map(r => ({ handle: r.sender_handle, isOwner: false }))
            ];
            memberList.forEach(m => { roleCache[m.handle] = m.isOwner ? 'owner' : 'member'; });
            if (!roleCache[myHandle]) roleCache[myHandle] = isSquadOwner ? 'owner' : 'member';

            const handles = [...new Set(memberList.map(m => m.handle))];
            const { data: profiles, error: profilesErr } = await sbFetch(
                _sb.from('profiles').select('handle,pic').in('handle', handles)
            );
            if (profilesErr) throw profilesErr;

            (profiles || []).forEach(p => { picCache[p.handle] = p.pic || ''; });
            console.log('[ComicCore] loadMemberRoles() complete', { memberCount: memberList.length });
        } catch (err) {
            console.error('[ComicCore] loadMemberRoles failed:', err);
            throw err;
        }
    }

    function buildParticipantAvatarRow() {
        const wrap  = document.getElementById('participantAvatars');
        const shown = memberList.slice(0, 7);
        const extra = memberList.length - shown.length;
        wrap.innerHTML = shown.map(m => {
            const pic = picCache[m.handle] || '';
            return pic
                ? `<img class="participant-avatar" src="${esc(pic)}" title="@${esc(m.handle)}" onerror="this.style.display='none'" onclick="openProfilePreview('${esc(m.handle)}', event)">`
                : `<div class="participant-avatar" style="font-size:10px;font-weight:900;color:#555;display:flex;align-items:center;justify-content:center;background:#1e1e22;" onclick="openProfilePreview('${esc(m.handle)}', event)">${esc((m.handle[0]||'?').toUpperCase())}</div>`;
        }).join('') + (extra > 0 ? `<div class="participant-count">+${extra}</div>` : '');
    }

    async function updateLiveTicker() {
        const ticker = document.getElementById('liveTicker');
        const cutoff = new Date(Date.now() - 3600000).toISOString();

        if (!activeSquadId) {
            console.error('[ComicCore] updateLiveTicker failed: missing activeSquadId');
            ticker.innerHTML = 'Live status unavailable';
            return;
        }

        try {
            console.log('[ComicCore] updateLiveTicker() start');
            const squadId = String(activeSquadId);
            const { data, error } = await _sb.rpc('get_squad_stats', {
                squad_id: squadId,
                cutoff_time: cutoff
            });

            if (error) {
                console.error('[ComicCore] updateLiveTicker Supabase RPC error:', error.code, error.message);
            }

            const cnt    = data?.[0]?.message_count || 0;
            const memCnt = memberList.length;
            ticker.innerHTML = `<b>${memCnt}</b> member${memCnt!==1?'s':''} · <b>${cnt}</b> msg${cnt!==1?'s':''} this hour`;
            console.log('[ComicCore] updateLiveTicker() complete', { cnt, memCnt });
        } catch (err) {
            console.error('[ComicCore] updateLiveTicker error:', err.code || err, err.message || err);
            ticker.innerHTML = 'Live status unavailable';
        }
    }

    function showError() {
        document.getElementById('mainUI').style.display   = 'none';
        document.getElementById('errorScreen').style.display = 'flex';
    }

    // ── Message loading ───────────────────────────────────
    async function loadMessages(initial = false) {
        console.log('[ComicCore] loadMessages() start', { initial, activeSquadId, msgOffset });
        if (initial) {
            msgOffset = 0;
            document.getElementById('chatContainer').innerHTML = `
                <div id="msgSkeleton" style="display:flex;flex-direction:column;gap:10px;padding:8px 0;">
                    ${[1,2,3,4,5].map((_, i) => `
                    <div style="display:flex;align-items:flex-end;gap:8px;flex-direction:${i%2===0?'row':'row-reverse'};">
                        <div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);flex-shrink:0;"></div>
                        <div style="width:${40+Math.floor(i*13)}%;height:38px;border-radius:18px;background:rgba(255,255,255,0.06);
                            background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.05) 75%);
                            background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
                    </div>`).join('')}
                </div>
                <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>`;
        }

        try {
            console.log('[ComicCore] loadMessages() supabase query start');
            const { data, error } = await sbFetch(
                _sb.from('team_messages')
                    .select('*')
                    .eq('ticket_id', activeSquadId)
                    .order('created_at', { ascending: false })
                    .range(msgOffset, msgOffset + PAGE_SIZE - 1),
                12000
            );
            console.log('[ComicCore] loadMessages() supabase query done', { dataLength: data?.length, error });
            if (error) console.error('Supabase error in loadMessages:', error);

            const skeleton = document.getElementById('msgSkeleton');
            if (skeleton) skeleton.remove();
            if (!initial) document.getElementById('chatContainer').innerHTML = '';

            if (error || !data?.length) { if (initial) renderEmptyState(); return; }
            const totalFetched = msgOffset + data.length;
            hasMoreMsgs = data.length === PAGE_SIZE;
            msgOffset   = totalFetched;

            const msgs      = [...data].reverse();
            const container = document.getElementById('chatContainer');
            if (container.querySelector('.chat-empty')) container.innerHTML = '';

            if (hasMoreMsgs && initial) {
                const btn = document.createElement('button');
                btn.className = 'load-more-btn'; btn.innerText = 'Load older messages';
                btn.id = 'loadMoreBtn'; btn.onclick = loadOlderMessages;
                container.prepend(btn);
            }

            let lastDate = container.querySelector('[data-lastdate]')?.dataset.lastdate || null;
            const anchor = document.getElementById('loadMoreBtn')?.nextSibling || null;

            const unknownHandles = [...new Set(msgs.map(m => m.sender_handle))].filter(h => picCache[h] === undefined);
            if (unknownHandles.length) {
                const { data: picRows } = await sbFetch(
                    _sb.from('profiles').select('handle,pic').in('handle', unknownHandles),
                    8000
                ).catch(() => ({ data: [] }));
                (picRows || []).forEach(p => { picCache[p.handle] = p.pic || ''; });
                unknownHandles.forEach(h => { if (picCache[h] === undefined) picCache[h] = ''; });
            }

            for (const m of msgs) {
                const d = new Date(m.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
                if (d !== lastDate) {
                    const div = document.createElement('div');
                    div.className = 'date-divider'; div.innerText = d; div.dataset.lastdate = d;
                    anchor ? container.insertBefore(div, anchor) : container.appendChild(div);
                    lastDate = d;
                }
                await appendMessage(m, false, anchor);
            }
            if (initial) container.scrollTop = container.scrollHeight;
        } catch (err) {
            console.error('[ComicCore] loadMessages failed:', err.message);
            const skeleton = document.getElementById('msgSkeleton');
            if (skeleton) skeleton.remove();
            if (initial) {
                document.getElementById('chatContainer').innerHTML =
                    `<div class="chat-empty"><div class="chat-empty-icon">⚠️</div><div class="chat-empty-title">Couldn't load messages</div><div class="chat-empty-sub">Check your connection and refresh.</div></div>`;
            }
        }
    }

    async function loadOlderMessages() {
        if (!hasMoreMsgs) {
            console.log('[ComicCore] loadOlderMessages skipped: no more messages');
            const btn = document.getElementById('loadMoreBtn');
            if (btn) btn.remove();
            return;
        }

        const container  = document.getElementById('chatContainer');
        const prevH      = container.scrollHeight;
        const prevS      = container.scrollTop;
        const btn        = document.getElementById('loadMoreBtn');
        if (btn) { btn.innerText = 'Loading…'; btn.disabled = true; }

        try {
            console.log('[ComicCore] loadOlderMessages() supabase query start', { msgOffset });
            const { data, error } = await sbFetch(
                _sb.from('team_messages').select('*')
                    .eq('ticket_id', activeSquadId).order('created_at', { ascending: false })
                    .range(msgOffset, msgOffset + PAGE_SIZE - 1),
                12000
            );
            console.log('[ComicCore] loadOlderMessages() supabase query done', { dataLength: data?.length, error });
            if (error) console.error('Supabase error in loadOlderMessages:', error);
            if (error) throw error;
            if (!data?.length) { if (btn) btn.remove(); return; }
            msgOffset += data.length;

            if (data.length < PAGE_SIZE) {
                hasMoreMsgs = false;
                if (btn) btn.remove();
            } else {
                hasMoreMsgs = true;
            }

            const anchor = btn?.nextSibling || null;
            const olderMsgs = [...data].reverse();
            const unknownOlder = [...new Set(olderMsgs.map(m => m.sender_handle))].filter(h => picCache[h] === undefined);
            if (unknownOlder.length) {
                const { data: picRows } = await _sb.from('profiles').select('handle,pic').in('handle', unknownOlder);
                (picRows || []).forEach(p => { picCache[p.handle] = p.pic || ''; });
                unknownOlder.forEach(h => { if (picCache[h] === undefined) picCache[h] = ''; });
            }
            let lastDate = null;
            for (const m of olderMsgs) {
                const d = new Date(m.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
                if (d !== lastDate) {
                    const div = document.createElement('div');
                    div.className = 'date-divider'; div.innerText = d;
                    anchor ? container.insertBefore(div, anchor) : container.appendChild(div);
                    lastDate = d;
                }
                await appendMessage(m, false, anchor);
            }
            if (!hasMoreMsgs && btn) btn.remove();
            else if (btn) { btn.innerText = 'Load older messages'; btn.disabled = false; }
            container.scrollTop = prevS + (container.scrollHeight - prevH);
        } catch (err) {
            console.error('[ComicCore] loadOlderMessages failed:', err?.code || err, err?.message || err);
            if (btn) { btn.innerText = 'Load older messages'; btn.disabled = false; }
        }
    }

    function renderEmptyState() {
        document.getElementById('chatContainer').innerHTML =
            `<div class="chat-empty"><div class="chat-empty-icon">💬</div><div class="chat-empty-title">No messages yet</div><div class="chat-empty-sub">Be the first to say something!</div></div>`;
    }

    // ── Append message ────────────────────────────────────
    async function appendMessage(m, scrollToBottom = true, insertBefore = null) {
        if (document.getElementById(`row-${m.id}`)) return;
        const isMine    = m.sender_handle === myHandle;
        const container = document.getElementById('chatContainer');
        const empty     = container.querySelector('.chat-empty');
        if (empty) empty.remove();

        const row    = document.createElement('div');
        row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;
        row.id        = `row-${m.id}`;

        const pic    = await getPic(m.sender_handle);
        const role   = roleCache[m.sender_handle] || 'member';
        const isTemp = String(m.id).startsWith('temp-');

        const time   = m.created_at
            ? new Date(m.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}) : '';

        const receipt   = isMine
            ? `<span class="read-receipt${isTemp?'':' delivered'}">${isTemp?'›':'››'}</span>` : '';
        const delBtn    = (!isTemp && (isMine || isSquadOwner))
            ? `<button class="msg-delete" onclick="deleteMessage('${m.id}')">✕</button>` : '';
        const reactBtn  = !isTemp
            ? `<button class="quick-react-btn" onclick="openEmojiPopover(event,'${m.id}')">+</button>` : '';

        const rxns    = msgReactions[m.id] || {};
        const rxnHtml = Object.entries(rxns).map(([e,c]) =>
            `<div class="msg-reaction-chip" onclick="toggleReaction('${m.id}','${e}')">${e}<span>${c}</span></div>`
        ).join('');

        const avatarHtml = isMine
            ? `<div class="avatar-spacer"></div>`
            : `<img class="msg-avatar" src="${esc(pic)}" onerror="this.src=''" alt="" onclick="openProfilePreview('${esc(m.sender_handle)}', event)">`;

        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper';
        wrapper.innerHTML = `
            ${delBtn}
            ${!isMine ? `<div class="sender-line">
                <span class="sender-name" style="color:${ROLE_COLORS[role]}" onclick="openProfilePreview('${esc(m.sender_handle)}', event)">@${esc(m.sender_handle)}</span>
                <span class="role-badge role-${role}">${ROLE_LABELS[role]}</span>
            </div>` : ''}
            ${buildBubble(m)}
            ${reactBtn}
            ${rxnHtml ? `<div class="msg-reactions">${rxnHtml}</div>` : ''}
            <div class="msg-footer">
                <span class="msg-time">${esc(time)}</span>
                ${receipt}
            </div>`;

        const avatarEl = document.createElement('div');
        avatarEl.innerHTML = avatarHtml;

        if (isMine) {
            row.appendChild(wrapper);
        } else {
            row.appendChild(avatarEl.firstChild);
            row.appendChild(wrapper);
        }

        insertBefore ? container.insertBefore(row, insertBefore) : container.appendChild(row);
        if (scrollToBottom) container.scrollTop = container.scrollHeight;
    }

    function isImg(text) {
        if (!text) return false;
        if (text.startsWith('data:image')) return true;
        if (text.startsWith('[IMG_REACTION]:')) return false;
        return /\.(jpeg|jpg|gif|png|webp|svg)(\?|$)/i.test(text) && (text.startsWith('http') || text.startsWith('blob:'));
    }

    function buildBubble(m) {
        const content = m.content || '';
        if (content.startsWith('[IMG_REACTION]:')) {
            const src = content.replace('[IMG_REACTION]:','').trim();
            return `<div class="bubble bubble-img"><img src="${esc(src)}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${esc(src)}')"></div>`;
        }
        if (isImg(content)) {
            return `<div class="bubble bubble-img"><img src="${esc(content)}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${esc(content)}')"></div>`;
        }
        return `<div class="bubble">${esc(content)}</div>`;
    }

    // ── Send ──────────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const val   = input.value.trim();
        if (!val && !pendingReactionSrc) return;

        let content = val;
        if (pendingReactionSrc) content = `[IMG_REACTION]:${pendingReactionSrc}`;

        input.value = ''; input.style.height = '38px'; input.focus();
        cancelReaction(); closeChatReactionPicker();

        const tempId = 'temp-' + Date.now();
        await appendMessage({ id: tempId, sender_handle: myHandle, content, created_at: new Date().toISOString() });

        try {
            console.log('[ComicCore] sendMessage insert start', { activeSquadId, myHandle });
            const { data, error } = await sbFetch(
                _sb.from('team_messages').insert([{ ticket_id: activeSquadId, sender_handle: myHandle, content }]).select().single(),
                12000
            );
            console.log('[ComicCore] sendMessage insert complete', { data, error });

            if (data && !error) {
                const tempRow = document.getElementById(`row-${tempId}`);
                if (tempRow) {
                    tempRow.id = `row-${data.id}`;
                    const rcpt = tempRow.querySelector('.read-receipt');
                    if (rcpt) { rcpt.innerText = '››'; rcpt.classList.add('delivered'); }
                }
            } else {
                throw error || new Error('Unknown sendMessage error');
            }
        } catch (err) {
            console.error('[ComicCore] sendMessage failed:', err);
            const tempRow = document.getElementById(`row-${tempId}`);
            if (tempRow) { tempRow.style.opacity = '0.5'; tempRow.title = 'Failed to send'; }
        }
    }

    async function deleteMessage(id) {
        if (!confirm('Delete this message?')) return;
        const row = document.getElementById(`row-${id}`);
        if (row) row.style.opacity = '0.3';

        try {
            const { error } = await sbFetch(_sb.from('team_messages').delete().eq('id', id), 8000);
            if (error) throw error;
            if (row) row.remove();
        } catch (err) {
            console.error('[ComicCore] deleteMessage failed:', err);
            if (row) row.style.opacity = '1';
        }
    }

    // ── Quick emoji reactions ─────────────────────────────
    function openEmojiPopover(e, msgId) {
        e.stopPropagation();
        activeReactMsgId = msgId;
        const pop = document.getElementById('emojiPopover');
        pop.classList.add('open');
        const x = Math.min(e.clientX, window.innerWidth - 260);
        const y = Math.max(e.clientY - 64, 60);
        pop.style.left = x + 'px'; pop.style.top = y + 'px';
    }

    function applyQuickReact(emoji) {
        document.getElementById('emojiPopover').classList.remove('open');
        if (!activeReactMsgId) return;
        const msgId = activeReactMsgId; activeReactMsgId = null;
        if (!msgReactions[msgId]) msgReactions[msgId] = {};
        msgReactions[msgId][emoji] = (msgReactions[msgId][emoji] || 0) + 1;
        refreshReactionChips(msgId);
    }

    function toggleReaction(msgId, emoji) {
        if (!msgReactions[msgId]) return;
        const cur = msgReactions[msgId][emoji] || 0;
        if (cur <= 1) delete msgReactions[msgId][emoji]; else msgReactions[msgId][emoji] = cur - 1;
        refreshReactionChips(msgId);
    }

    function refreshReactionChips(msgId) {
        const row = document.getElementById(`row-${msgId}`); if (!row) return;
        const wrapper = row.querySelector('.msg-wrapper');
        let rxnDiv = wrapper.querySelector('.msg-reactions');
        const entries = Object.entries(msgReactions[msgId] || {});
        if (!entries.length) { if (rxnDiv) rxnDiv.remove(); return; }
        if (!rxnDiv) {
            rxnDiv = document.createElement('div');
            rxnDiv.className = 'msg-reactions';
            wrapper.querySelector('.msg-footer').before(rxnDiv);
        }
        rxnDiv.innerHTML = entries.map(([em,cnt]) =>
            `<div class="msg-reaction-chip" onclick="toggleReaction('${msgId}','${em}')">${em}<span>${cnt}</span></div>`
        ).join('');
    }

    document.addEventListener('click', e => {
        const pop = document.getElementById('emojiPopover');
        if (pop && !pop.contains(e.target)) { pop.classList.remove('open'); activeReactMsgId = null; }
        const picker = document.getElementById('chatReactionPicker');
        const btn    = document.getElementById('chatReactionBtn');
        if (picker && !picker.contains(e.target) && btn && !btn.contains(e.target)) closeChatReactionPicker();
    });

    // ── Image upload ──────────────────────────────────────
    async function handleImageUpload(input) {
        if (!input.files[0]) return;
        const file    = input.files[0]; input.value = '';
        const blobUrl = URL.createObjectURL(file);
        const tempId  = 'temp-img-' + Date.now();
        await appendMessage({ id: tempId, sender_handle: myHandle, content: blobUrl, created_at: new Date().toISOString() });

        const b64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
        const url = await uploadToStorage('squad-pfps', `chat_${myHandle}_${Date.now()}.jpg`, b64);

        if (url) {
            const { data, error } = await _sb.from('team_messages').insert([{ ticket_id: activeSquadId, sender_handle: myHandle, content: url }]).select().single();
            const tr = document.getElementById(`row-${tempId}`);
            if (data && !error && tr) tr.id = `row-${data.id}`;
        } else {
            const tr = document.getElementById(`row-${tempId}`);
            if (tr) { tr.style.opacity = '0.5'; tr.title = 'Upload failed'; }
        }
    }

    async function uploadToStorage(bucket, filename, data) {
        const path = `userimages/${filename}`;
        let blob = data;
        if (typeof data === 'string' && data.startsWith('data:')) { const res = await fetch(data); blob = await res.blob(); }
        const { error } = await _sb.storage.from(bucket).upload(path, blob, { upsert: true, cacheControl: '3600', contentType: 'image/jpeg' });
        if (error) { console.error('Storage upload error:', error); return null; }
        return `${_sb.storage.from(bucket).getPublicUrl(path).data.publicUrl}?t=${Date.now()}`;
    }

    // ── Realtime ──────────────────────────────────────────
    function setupRealtime() {
        _sb.channel(`squad_chat_${activeSquadId}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'team_messages' }, payload => {
                const m = payload.new;
                if (String(m.ticket_id) === String(activeSquadId) && m.sender_handle !== myHandle) {
                    appendMessage(m); updateLiveTicker();
                }
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'team_messages' }, payload => {
                const row = document.getElementById(`row-${payload.old.id}`); if (row) row.remove();
            })
            .subscribe();
    }

    function setupTypingRealtime() {
        typingChannel = _sb.channel(`typing_${activeSquadId}`);
        typingChannel.on('broadcast', { event: 'typing' }, ({ payload }) => {
            if (payload.handle === myHandle) return;
            typingUsers.add(payload.handle);
            clearTimeout(typingTimers[payload.handle]);
            typingTimers[payload.handle] = setTimeout(() => { typingUsers.delete(payload.handle); renderTypingIndicator(); }, 3000);
            renderTypingIndicator();
        }).subscribe();
    }

    function handleTyping() {
        clearTimeout(typingTimeout);
        if (typingChannel) typingChannel.send({ type: 'broadcast', event: 'typing', payload: { handle: myHandle } });
        typingTimeout = setTimeout(() => {}, 2000);
    }

    function renderTypingIndicator() {
        let el = document.getElementById('typing-indicator-row');
        if (typingUsers.size === 0) { if (el) el.remove(); return; }
        const names = [...typingUsers].map(h => `@${h}`).join(', ');
        if (!el) {
            el = document.createElement('div');
            el.id = 'typing-indicator-row'; el.className = 'typing-indicator';
            el.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="typing-label" id="typing-label"></span>`;
            document.getElementById('chatContainer').appendChild(el);
        }
        document.getElementById('typing-label').innerText = `${names} ${typingUsers.size===1?'is':'are'} typing`;
        const c = document.getElementById('chatContainer'); c.scrollTop = c.scrollHeight;
    }

    function autoResize(el) { el.style.height = '38px'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

    function buildChatReactionGrid() {
        document.getElementById('chatReactionGrid').innerHTML = ALL_REACTIONS.map(r =>
            `<button class="chat-reaction-img-btn" title="${esc(r.name)}" onclick="selectChatReaction('${esc(r.src)}')">
                <img src="${esc(r.src)}" alt="${esc(r.name)}" loading="lazy">
             </button>`
        ).join('');
    }

    function toggleChatReactionPicker() {
        const picker = document.getElementById('chatReactionPicker');
        const btn    = document.getElementById('chatReactionBtn');
        const isOpen = picker.classList.toggle('open');
        btn.classList.toggle('active', isOpen);
        if (isOpen && !document.getElementById('chatReactionGrid').children.length) buildChatReactionGrid();
    }
    function closeChatReactionPicker() {
        document.getElementById('chatReactionPicker').classList.remove('open');
        document.getElementById('chatReactionBtn').classList.remove('active');
    }
    function selectChatReaction(src) {
        pendingReactionSrc = src; closeChatReactionPicker();
        document.getElementById('chatReactionBtn').classList.add('active');
        document.getElementById('reactionPreviewImg').src = src;
        document.getElementById('reactionPreview').classList.add('show');
    }
    function cancelReaction() {
        pendingReactionSrc = null;
        document.getElementById('chatReactionBtn').classList.remove('active');
        document.getElementById('reactionPreview').classList.remove('show');
        document.getElementById('reactionPreviewImg').src = '';
        document.getElementById('msgInput').placeholder = 'Message the squad…';
    }

    // ── Info panel ────────────────────────────────────────
    async function openInfoPanel() {
        if (!squadData) return;
        document.getElementById('infoName').innerText  = squadData.team_name;
        document.getElementById('infoOwner').innerText = `by @${squadData.owner_handle}`;
        const pfpEl = document.getElementById('infoPfp');
        if (squadData.pfp) { pfpEl.style.backgroundImage = `url(${squadData.pfp})`; pfpEl.innerText = ''; }
        else { pfpEl.style.backgroundImage = ''; pfpEl.innerText = '💬'; }

        const descEl = document.getElementById('infoDesc');
        if (squadData.description) { descEl.innerText = squadData.description; descEl.style.display = ''; } else descEl.style.display = 'none';

        const topics = Array.isArray(squadData.topics) ? squadData.topics : [];
        const tw = document.getElementById('infoTopicsWrap');
        if (topics.length) { document.getElementById('infoTopics').innerHTML = topics.map(t=>`<span class="info-topic-tag">${esc(t)}</span>`).join(''); tw.style.display=''; } else tw.style.display='none';

                <img class="info-member-avatar" src="${esc(pic)}" onerror="this.src=''" alt="">
                <span class="info-member-handle">@${esc(m.handle)}${m.isOwner?'<span class="info-owner-badge">OWNER</span>':''}</span>
            </div>`;

    function closeInfoPanel() { document.getElementById('infoOverlay').classList.remove('open'); }
    function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

    // ── Profile Preview Card ──────────────────────────────
    const ppProfileCache = {};

    async function openProfilePreview(handle, event) {
        if (event) event.stopPropagation();

        const backdrop = document.getElementById('profilePreviewBackdrop');
        backdrop.classList.add('open');

        // Reset card to loading state
        document.getElementById('ppAvatar').src = picCache[handle] || 'https://via.placeholder.com/62x62?text=Avatar';
        document.getElementById('ppName').textContent = handle;
        document.getElementById('ppHandle').textContent = '@' + handle;
        document.getElementById('ppRoleTag').style.display = 'none';
        document.getElementById('ppBio').style.display = 'none';
        document.getElementById('ppFollowers').textContent = '—';
        document.getElementById('ppFollowing').textContent = '—';
        document.getElementById('ppWorks').textContent = '—';
        setPreviewStatus('offline');
        document.getElementById('ppBannerImg').style.display = 'none';
        document.getElementById('ppBanner').style.background = 'linear-gradient(135deg,#1a1a2e,#16213e)';

        // "View Profile" button
        document.getElementById('ppViewBtn').onclick = () => {
            location.href = `profile.html?u=${encodeURIComponent(handle)}`;
        };

        // "@Mention" button — inserts @handle into chat input
        document.getElementById('ppMentionBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            const cur   = input.value;
            const mention = `@${handle} `;
            input.value = cur ? cur.trimEnd() + ' ' + mention : mention;
            input.focus();
            autoResize(input);
            closeProfilePreview();
        };

        // Don't re-fetch if cached
        if (ppProfileCache[handle]) {
            applyPreviewData(ppProfileCache[handle]);
            return;
        }

        // Fetch profile data from view
        try {
            const { data: p, error } = await _sb
                .from('profile_stats')
                .select('*')
                .eq('handle', handle)
                .maybeSingle();

            if (error) {
                console.error('[ComicCore] openProfilePreview fetch error:', error.code, error.message);
                throw error;
            }

            // Also fetch status
            const { data: statusRow, error: statusErr } = await _sb.from('user_status').select('status,updated_at').eq('handle', handle).maybeSingle();
            if (statusErr) {
                console.error('[ComicCore] openProfilePreview status fetch error:', statusErr?.code, statusErr?.message);
            }

            if (p) {
                const previewData = {
                    handle: p.handle,
                    name: p.name || p.handle,
                    pic: p.pic || '',
                    bio: p.bio || '',
                    banner: p.banner || '',
                    followers: p.follower_count || 0,
                    following: p.following_count || 0,
                    works: p.works_count || 0,
                    role: p.settings?.role || null,
                    status: deriveStatus(statusRow)
                };

                ppProfileCache[handle] = previewData;
                applyPreviewData(previewData);
                console.log('[ComicCore] openProfilePreview success', handle);
            } else {
                console.error('[ComicCore] No profile data found for', handle);
                document.getElementById('infoMembers').innerHTML = '<div style="font-size:12px;color:#333;">Unable to load profile.</div>';
                showError();
            }
        } catch (err) {
            console.error('[ComicCore] openProfilePreview failed:', err?.code || err, err?.message || err);
            document.getElementById('infoMembers').innerHTML = '<div style="font-size:12px;color:#333;">Unable to load profile.</div>';
            showError();
        }
    }

    function deriveStatus(row) {
        if (!row) return 'offline';
        const minutesAgo = (Date.now() - new Date(row.updated_at).getTime()) / 60000;
        if (minutesAgo > 10) return 'offline';
        return row.status || 'online';
    }

    function applyPreviewData(d) {
        document.getElementById('ppAvatar').src = d.pic || 'https://via.placeholder.com/62x62?text=Avatar';
        document.getElementById('ppName').textContent = d.name;
        document.getElementById('ppHandle').textContent = '@' + d.handle;

        // Role tag
        const rt = document.getElementById('ppRoleTag');
        if (d.handle === 'jeffyplays') {
            rt.textContent = 'Owner'; rt.className = 'pp-role-tag owner'; rt.style.display = 'inline-block';
        } else if (d.role === 'mod') {
            rt.textContent = 'Mod'; rt.className = 'pp-role-tag mod'; rt.style.display = 'inline-block';
        } else {
            rt.style.display = 'none';
        }

        // Bio
        const bioEl = document.getElementById('ppBio');
        if (d.bio) { bioEl.textContent = d.bio; bioEl.style.display = 'block'; }
        else { bioEl.style.display = 'none'; }

        // Stats
        document.getElementById('ppFollowers').textContent = fmtNum(d.followers);
        document.getElementById('ppFollowing').textContent = fmtNum(d.following);
        document.getElementById('ppWorks').textContent = fmtNum(d.works);

        // Status
        setPreviewStatus(d.status);

        // Banner
        const bannerImg = document.getElementById('ppBannerImg');
        if (d.banner) {
            bannerImg.src = d.banner;
            bannerImg.style.display = 'block';
        } else {
            bannerImg.style.display = 'none';
            // Deterministic gradient from handle
            const hue = d.handle.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
            document.getElementById('ppBanner').style.background =
                `linear-gradient(135deg, hsl(${hue},30%,12%) 0%, hsl(${(hue+40)%360},20%,8%) 100%)`;
        }
    }

    function setPreviewStatus(status) {
        const dot    = document.getElementById('ppStatusDot');
        const ldot   = document.getElementById('ppStatusLabelDot');
        const ltext  = document.getElementById('ppStatusText');
        const labels = { online: 'Online', afk: 'Away', dnd: 'Do Not Disturb', offline: 'Offline' };
        const cls    = status || 'offline';
        dot.className   = 'pp-status-dot '  + cls;
        ldot.className  = 'pp-status-label-dot ' + cls;
        ltext.textContent = labels[cls] || 'Offline';
    }

    function fmtNum(n) {
        if (n === null || n === undefined || n === '—') return '—';
        n = Number(n);
        if (isNaN(n)) return '—';
        if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (n >= 1000)    return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
        return String(n);
    }

    function closeProfilePreview() {
        document.getElementById('profilePreviewBackdrop').classList.remove('open');
    }

    function handlePreviewBackdropClick(e) {
        if (e.target === document.getElementById('profilePreviewBackdrop')) closeProfilePreview();
    }

    let _initOnce = false;
    async function runInitOnce() {
        if (_initOnce) return;
        _initOnce = true;
        console.log('[ComicCore] init trigger event fired');
        try {
            await init();
        } catch (err) {
            console.error('[ComicCore] init() threw:', err);
            showError();
        }
    }

    window.addEventListener('DOMContentLoaded', runInitOnce);
    window.addEventListener('load', runInitOnce);
</script>
</body>
</html>
