<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicCore - My Favorites</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --orange: #ff7a00;
            --orange-light: #ff9a3c;
            --orange-glow: rgba(255,122,0,0.22);
            --bg: #0f0f11;
            --bg2: #18181b;
            --card: #1e1e22;
            --card2: #26262c;
            --border: rgba(255,255,255,0.08);
            --text: #f4f4f6;
            --text-muted: #888896;
            --text-dim: #55555f;
            --teal: #00c9b1;
            --teal-glow: rgba(0,201,177,0.18);
            --accent: #ff7a00;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100dvh; padding-bottom: 24px;
            overflow-x: hidden; position: relative;
        }
        /* Ambient glows matching my-comics */
        body::before {
            content: ''; position: fixed; top: -100px; left: -80px;
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(255,122,0,0.09) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -80px; right: -60px;
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(0,201,177,0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── Header ── */
        .header {
            position: sticky; top: 0; z-index: 100;
            height: 54px;
            background: rgba(15,15,17,0.88);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 16px; gap: 10px;
            backdrop-filter: blur(20px);
        }
        .title {
            font-size: 15px; font-weight: 900;
            letter-spacing: .5px; color: var(--text);
            flex: 1;
        }
        .title span {
            color: var(--gold);
            margin-right: 6px;
        }

        /* ── Grid ── */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
            max-width: 680px;
            margin: 0 auto;
            position: relative; z-index: 1;
        }

        /* ── Comic card — matches my-comics card style ── */
        .comic-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: .18s;
            position: relative;
            display: flex; flex-direction: column;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .comic-card:hover {
            background: var(--card2);
            transform: translateY(-2px);
            border-color: rgba(255,215,0,0.35);
            box-shadow: 0 8px 28px rgba(255,215,0,0.1);
        }

        .cover-wrapper {
            width: 100%; aspect-ratio: 2/3;
            background: var(--bg2);
            overflow: hidden; flex-shrink: 0;
            position: relative;
        }
        .cover-wrapper img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .cover-wrapper .no-cover {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, var(--card), var(--bg2));
        }
        /* Star badge on cover */
        .cover-wrapper .fav-badge {
            position: absolute; top: 7px; right: 7px;
            background: rgba(255,215,0,0.15);
            color: var(--gold);
            border: 1px solid rgba(255,215,0,0.3);
            font-size: 8px; font-weight: 900;
            padding: 2px 7px; border-radius: 6px;
            letter-spacing: .5px; text-transform: uppercase;
        }

        /* ── Card info ── */
        .comic-info {
            padding: 9px 10px 10px;
            flex: 1; display: flex; flex-direction: column; gap: 3px;
        }
        .comic-title {
            font-size: 12px; font-weight: 900; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
            grid-column: 1 / -1;
        }
        .empty-state .empty-icon { font-size: 52px; opacity: .25; }
        .empty-state .empty-title { font-size: 15px; font-weight: 900; color: var(--text-muted); }
        .empty-state .empty-sub { font-size: 12px; color: var(--text-dim); line-height: 1.6; max-width: 260px; }

    </style>
</head>
<body>

    <div class="header">
        <button onclick="history.back()" style="background:none;border:none;color:var(--text);font-size:14px;font-weight:900;cursor:pointer;padding:6px 10px 6px 0;display:flex;align-items:center;gap:6px;flex-shrink:0;letter-spacing:.3px;font-family:'Inter',sans-serif;">← Back</button>
        <div class="title"><span>⭐</span> FAVORITES</div>
    </div>

    <div id="favoritesList" class="favorites-grid"></div>

<script>
    const _supabase = supabase.createClient('https://mmycqeejhguzhtzkyjaj.supabase.co', 'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE', { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } });
    const myProfile = JSON.parse(localStorage.getItem('user_profile') || '{"handle":"guest"}');

    async function loadFavorites() {
        if (myProfile.handle === "guest") {
            document.getElementById('favoritesList').innerHTML = '<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Not logged in</div><div class="empty-sub">Log in to see your starred favorites here.</div></div>';
            return;
        }

        // 1. Get all Star IDs for this user
        const { data: starEntries, error: starError } = await _supabase
            .from('messages')
            .select('receiver_hand')
            .eq('sender_handle', myProfile.handle)
            .eq('reaction', '⭐');

        if (!starEntries || starEntries.length === 0) {
            document.getElementById('favoritesList').innerHTML = '<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">No favorites yet</div><div class="empty-sub">Star comics while browsing to collect them here.</div></div>';
            return;
        }

        // 2. Extract IDs
        const favoriteIds = starEntries.map(entry => entry.receiver_hand);

        // 3. Fetch comic data for these IDs
        const { data: comics, error: comicError } = await _supabase
            .from('comics')
            .select('*')
            .in('id', favoriteIds);

        if (comics) {
            renderFavorites(comics);
        }
    }

    function renderFavorites(comics) {
        const container = document.getElementById('favoritesList');
        container.innerHTML = comics.map(c => `
            <div class="comic-card" onclick="location.href='reader.html?id=${c.id}'">
                <div class="cover-wrapper">
                    <img src="${c.cover || ''}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=no-cover>📖</div>'">
                    <div class="fav-badge">★ Fav</div>
                </div>
                <div class="comic-info">
                    <div class="comic-title">${c.title}</div>
                </div>
            </div>
        `).join('');
    }

    window.onload = loadFavorites;
</script>
</body>
</html>
