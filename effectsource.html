<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EffectSource | FX Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        .header {
            padding: 15px 30px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100;
        }

        .container { padding: 20px 30px 100px 30px; max-width: 1400px; margin: auto; }

        /* ── Admin Panel ── */
        #admin-panel { display: none; background: #0a0a0a; border: 1px solid #ff7a00; padding: 25px; border-radius: 15px; margin-bottom: 40px; }
        .main-upload-area { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .preview-box { width: 120px; height: 120px; background: #000; border: 1px solid #333; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; font-size: 11px; color: #444; font-weight: 800; }
        .preview-box img { width: 100%; height: 100%; object-fit: contain; }

        .actions-manager { background: #111; padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-control { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; text-align: center; border: 1px solid transparent; transition: 0.2s; font-family: inherit; }
        .btn-bulk { background: #ff7a00; color: #000; }
        .btn-add  { background: #222; color: white; border-color: #333; }
        .btn-clear { background: #441111; color: #ff5555; max-width: 100px; }

        .actions-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px; max-height: 500px; overflow-y: auto; padding-right: 10px;
        }
        .action-item { background: #000; border: 1px solid #333; padding: 8px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .action-item input[type="text"] { background: #111; border: 1px solid #222; color: white; padding: 5px; border-radius: 4px; font-size: 11px; flex: 1; font-family: inherit; }
        .action-item img { width: 35px; height: 35px; object-fit: contain; background: #111; border-radius: 4px; }

        .btn-publish { width: 100%; padding: 18px; background: #ff7a00; color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 25px; font-size: 13px; letter-spacing: 1px; transition: .15s; font-family: inherit; }
        .btn-publish:hover { opacity: .88; }
        .btn-publish:disabled { opacity: .4; cursor: not-allowed; }

        /* ── Preview Overlay ── */
        #preview-overlay {
            position: fixed; top: 0; right: -100%; width: 400px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--border);
            z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px;
            box-shadow: -20px 0 50px rgba(0,0,0,0.8); overflow-y: auto;
        }
        #preview-overlay.active { right: 0; }
        .overlay-close { cursor: pointer; color: #555; font-size: 11px; font-weight: 900; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        .view-main-img { width: 100%; aspect-ratio: 1; background: #000; border-radius: 12px; object-fit: contain; border: 1px solid #222; margin-bottom: 20px; }
        .view-actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .view-chip { background: #111; border: 1px solid #222; padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; transition: .15s; }
        .view-chip:hover { border-color: #ff7a00; }
        .view-chip img { width: 100%; height: 50px; object-fit: contain; margin-bottom: 5px; }
        .view-chip span { font-size: 9px; color: #888; font-weight: 700; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .admin-btn-delete {
            width: 100%; padding: 12px; background: #331111; color: #ff5555;
            border: 1px solid #552222; border-radius: 8px; font-weight: 800;
            cursor: pointer; margin-top: 15px; font-size: 10px; letter-spacing: 1px; transition: 0.2s; font-family: inherit;
        }
        .admin-btn-delete:hover { background: #551111; color: white; }

        /* ── Grid ── */
        .effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .effect-card { aspect-ratio: 1; background: var(--card); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
        .effect-card:hover { border-color: #ff7a00; transform: translateY(-3px); }
        .effect-card img { width: 100%; height: 100%; object-fit: contain; padding: 10px; opacity: 0; transition: opacity .25s; }
        .effect-card img.loaded { opacity: 1; }
        .effect-card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 8px; background: rgba(0,0,0,0.75); font-size: 10px; font-weight: 800; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Skeleton ── */
        .effect-skeleton {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #1a1a1a 25%, #242424 50%, #1a1a1a 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── Search / Tags / Sort ── */
        .search-wrap { position: relative; margin-bottom: 14px; }
        .search-bar { width: 100%; padding: 12px 16px; background: #111; border: 1px solid #333; color: white; border-radius: 10px; font-size: 13px; font-weight: 600; outline: none; box-sizing: border-box; font-family: inherit; }
        .search-bar:focus { border-color: #ff7a00; }

        .sort-filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .sort-select { background: #111; border: 1px solid #333; color: #aaa; padding: 7px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; outline: none; cursor: pointer; font-family: inherit; transition: .15s; }
        .sort-select:focus { border-color: #ff7a00; color: white; }
        .sort-label { font-size: 9px; font-weight: 900; color: #333; text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }

        .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .tag-chip { padding: 5px 12px; border-radius: 20px; background: #1c1c1e; border: 1px solid #333; color: #aaa; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.15s; }
        .tag-chip:hover { border-color: #555; color: white; }
        .tag-chip.active { background: #ff7a00; color: #000; border-color: #ff7a00; }
        .tag-chips-label { font-size: 9px; font-weight: 900; color: #333; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 14px; border-top: 1px solid #222; padding-top: 24px; }
        .section-title { font-size: 12px; font-weight: 900; color: #ff7a00; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <a href="create.html" style="color:white;text-decoration:none;font-size:12px;">← BACK TO EDITOR</a>
    <h1 style="font-size:16px;margin:0;">⚡ EFFECT SOURCE</h1>
    <div id="status-badge" style="font-size:10px;color:#ff7a00;">CREATOR MODE</div>
</div>

<!-- ── Preview Overlay ── -->
<div id="preview-overlay">
    <span class="overlay-close" onclick="closePreview()">✕ CLOSE PREVIEW</span>
    <img id="v-img" class="view-main-img">
    <h2 id="v-name" style="margin:0;font-weight:900;"></h2>
    <div id="v-creator-link" style="color:#ff7a00;font-size:11px;margin-bottom:20px;cursor:pointer;text-decoration:underline;"></div>

    <div style="border-top:1px solid #222;padding-top:20px;">
        <span style="font-size:10px;font-weight:800;color:#555;">PACK EFFECTS</span>
        <div id="v-actions" class="view-actions-grid"></div>
    </div>
    <button class="btn-publish" style="background:#ff7a00;" id="v-use-btn">USE EFFECT PACK</button>
    <div id="admin-action-container"></div>
</div>

<div class="container">

    <!-- ── Admin Upload Panel ── -->
    <div id="admin-panel">
        <div style="font-size:11px;font-weight:900;color:#ff7a00;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;">⚡ PUBLISH EFFECT PACK</div>
        <div class="main-upload-area">
            <div class="preview-box" id="main-preview">COVER</div>
            <div style="flex:1;">
                <input type="text" id="effect-name" placeholder="Pack Name (e.g. Fire Pack)" style="width:100%;padding:12px;background:#000;border:1px solid #333;color:white;border-radius:6px;margin-bottom:10px;box-sizing:border-box;font-family:inherit;font-size:13px;outline:none;">
                <input type="text" id="effect-tags" placeholder="🏷 Tags (fire, smoke, impact, aura, glow...)" style="width:100%;padding:12px;background:#111;border:1px solid #ff7a00;color:white;border-radius:6px;margin-bottom:10px;box-sizing:border-box;font-family:inherit;font-size:12px;outline:none;">
                <input type="file" id="main-file-input" accept="image/*" onchange="previewMain(this)">
            </div>
        </div>

        <div class="actions-manager">
            <div style="font-size:9px;font-weight:900;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">EFFECTS IN THIS PACK</div>
            <div class="controls">
                <div class="btn-control btn-bulk" onclick="document.getElementById('bulk-input').click()">+ BULK ADD</div>
                <div class="btn-control btn-add" onclick="addActionSlot()">+ MANUAL</div>
                <div class="btn-control btn-clear" onclick="clearActions()">CLEAR</div>
            </div>
            <input type="file" id="bulk-input" multiple accept="image/*" style="display:none;" onchange="handleBulkUpload(this)">
            <div class="actions-list" id="actions-list"></div>
        </div>

        <button class="btn-publish" id="upload-btn" onclick="uploadToDatabase()">⚡ PUBLISH EFFECT PACK</button>
    </div>

    <!-- ── Search + Sort + Tags ── -->
    <div class="search-wrap">
        <input type="text" class="search-bar" id="effect-search"
            placeholder="🔍 Search effects by name or tag..."
            oninput="filterEffects()" autocomplete="off" spellcheck="false">
    </div>

    <div class="sort-filter-row">
        <span class="sort-label">Sort</span>
        <select class="sort-select" id="effect-sort" onchange="filterEffects()">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="lastused">Last Used</option>
        </select>
    </div>

    <div class="tag-chips-label">⚡ Top Tags</div>
    <div class="tag-chips" id="tag-chips-row"></div>

    <div class="section-header">
        <span class="section-title">⚡ Public Library</span>
        <span id="effect-count" style="font-size:11px;color:#555;font-weight:700;"></span>
    </div>
    <div class="effect-grid" id="main-grid"></div>
</div>

<script>
    const _sb = supabase.createClient(
        'https://mmycqeejhguzhtzkyjaj.supabase.co',
        'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE'
    );

    const ADMIN_ID       = 'de0b7378-e779-4e0d-9e3d-b33bf643df3e';
    const META_CACHE_KEY = 'cc_effects_meta_v1';
    const META_CACHE_TTL = 10 * 60 * 1000;
    const FULL_CACHE_TTL = 30 * 60 * 1000;
    const CACHE_VERSION  = 'v2';

    let allEffects     = [];
    let allTags        = new Set();
    let tagCounts      = {};
    let activeTagFilter = null;
    let myHandle       = null;
    let isAdmin        = false;
    let mainBase64     = '';
    const fullDataCache = new Map();

    // ── Auth ──────────────────────────────────────────────────────────────
    function checkIsAdmin(user) {
        const uid = user.permanent_id || user.id || user.user_id || user.uid || '';
        if (uid === ADMIN_ID) return true;
        const handle = (user.handle || user.username || '').toLowerCase().replace('@', '');
        return handle === 'jeffyplays';
    }

    window.onload = async () => {
        const user = JSON.parse(localStorage.getItem('user_profile') || '{}');
        myHandle = user.handle || null;
        isAdmin = false;
        try {
            const { data: { user: authUser } } = await _sb.auth.getUser();
            if (authUser) {
                console.log('[EffectSource] Auth user ID:', authUser.id);
                isAdmin = checkIsAdmin(authUser);
            }
        } catch(e) {}
        if (!isAdmin) isAdmin = checkIsAdmin(user);
        console.log('[EffectSource] isAdmin:', isAdmin);

        if (isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('status-badge').innerText = 'ADMIN MODE 🔑';
            document.getElementById('status-badge').style.color = '#ff7a00';
        }
        fetchLibrary();
    };

    // ── Storage upload ────────────────────────────────────────────────────
    async function uploadToStorage(path, data) {
        let blob = data;
        if (typeof data === 'string' && data.startsWith('data:')) {
            const res = await fetch(data); blob = await res.blob();
        }
        const { error } = await _sb.storage.from('effects').upload(path, blob, { upsert: true, cacheControl: '3600' });
        if (error) { console.error('Storage error:', error); return null; }
        return _sb.storage.from('effects').getPublicUrl(path).data.publicUrl;
    }

    // ── Admin: cover preview ──────────────────────────────────────────────
    function previewMain(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            mainBase64 = e.target.result;
            document.getElementById('main-preview').innerHTML = `<img src="${mainBase64}">`;
        };
        reader.readAsDataURL(input.files[0]);
    }

    // ── Admin: bulk + manual effect slots ────────────────────────────────
    function handleBulkUpload(input) {
        const currentCount = document.querySelectorAll('.action-item').length;
        const remaining = 480 - currentCount;
        const files = Array.from(input.files).slice(0, remaining);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = e => createActionItem(file.name.replace(/\.[^/.]+$/, ''), e.target.result);
            reader.readAsDataURL(file);
        });
        input.value = '';
    }

    function addActionSlot() {
        if (document.querySelectorAll('.action-item').length >= 480) return alert('Limit reached');
        createActionItem('', '');
    }

    function createActionItem(name, base64) {
        const container = document.getElementById('actions-list');
        const div = document.createElement('div');
        div.className = 'action-item';
        div.innerHTML = `
            <img src="${base64 || ''}" style="display:${base64 ? 'block' : 'none'}">
            <input type="text" value="${name}" placeholder="Effect Name">
            <span style="color:#ff4444;cursor:pointer;font-size:16px;line-height:1;" onclick="this.parentElement.remove()">×</span>
        `;
        div.dataset.base64 = base64;
        container.appendChild(div);
    }

    function clearActions() {
        if (confirm('Clear all effects in this pack?')) document.getElementById('actions-list').innerHTML = '';
    }

    // ── Admin: publish pack ───────────────────────────────────────────────
    async function uploadToDatabase() {
        const name    = document.getElementById('effect-name').value.trim();
        const tagsRaw = document.getElementById('effect-tags').value;
        const tags    = tagsRaw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
        const btn     = document.getElementById('upload-btn');

        if (!name || !mainBase64) { alert('Pack name and cover image required!'); return; }
        btn.disabled = true;

        const safeName = name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');

        // 1. Upload cover image
        btn.innerText = 'UPLOADING COVER...';
        const coverExt = mainBase64.startsWith('data:image/gif') ? 'gif'
            : mainBase64.startsWith('data:image/webp') ? 'webp' : 'png';
        const mainUrl = await uploadToStorage(safeName + '/cover.' + coverExt, mainBase64);
        if (!mainUrl) {
            alert('Failed to upload cover. Try again.');
            btn.disabled = false; btn.innerText = '⚡ PUBLISH EFFECT PACK'; return;
        }

        // 2. Upload each effect in the pack
        const actionItems = document.querySelectorAll('.action-item');
        const actionsObj  = {};
        let i = 0;
        for (const item of actionItems) {
            const aName = item.querySelector('input').value.trim() || 'Effect';
            if (item.dataset.base64) {
                btn.innerText = `UPLOADING EFFECTS (${++i}/${actionItems.length})...`;
                const safeAction = aName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
                const ext = item.dataset.base64.startsWith('data:image/gif') ? 'gif'
                    : item.dataset.base64.startsWith('data:image/webp') ? 'webp' : 'png';
                const url = await uploadToStorage(safeName + '/effects/' + safeAction + '.' + ext, item.dataset.base64);
                actionsObj[aName] = url || item.dataset.base64;
            }
        }

        // 3. Save to DB
        btn.innerText = 'SAVING...';
        const { error } = await _sb.from('effects_library').insert([{
            name, image_data: mainUrl, actions: actionsObj,
            creator: myHandle || 'Guest', tags
        }]);

        btn.disabled = false;
        if (error) {
            alert('Error: ' + error.message);
            btn.innerText = '⚡ PUBLISH EFFECT PACK';
        } else {
            localStorage.removeItem(META_CACHE_KEY);
            alert('✅ Effect Pack Published!');
            location.reload();
        }
    }

    // ── Cache helpers ─────────────────────────────────────────────────────
    function saveMetaCache(data) {
        const lean = (data || []).map(({ id, name, tags, creator, created_at }) => ({ id, name, tags, creator, created_at }));
        try { localStorage.setItem(META_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: lean })); } catch(e) {}
    }
    function loadMetaCache() {
        try {
            const raw = localStorage.getItem(META_CACHE_KEY);
            if (!raw) return null;
            const p = JSON.parse(raw);
            if (Date.now() - p.ts > META_CACHE_TTL) { localStorage.removeItem(META_CACHE_KEY); return null; }
            return p.data;
        } catch(e) { return null; }
    }
    function getCachedImage(id) { try { return sessionStorage.getItem('cc_efx_' + id); } catch(e) { return null; } }
    function setCachedImage(id, url) { try { sessionStorage.setItem('cc_efx_' + id, url); } catch(e) {} }
    function getFullCache(id) {
        try {
            const raw = localStorage.getItem('efx-full-' + id);
            if (!raw) return null;
            const p = JSON.parse(raw);
            if (p.v !== CACHE_VERSION || Date.now() - (p.ts || 0) > FULL_CACHE_TTL) {
                localStorage.removeItem('efx-full-' + id); return null;
            }
            return p;
        } catch(e) { return null; }
    }
    function setFullCache(id, imageData, actions) {
        try { localStorage.setItem('efx-full-' + id, JSON.stringify({ img: imageData, actions: actions || {}, ts: Date.now(), v: CACHE_VERSION })); } catch(e) {}
    }

    // ── Fetch library ─────────────────────────────────────────────────────
    async function fetchLibrary() {
        const cached = loadMetaCache();
        if (cached) { allEffects = cached; initAfterFetch(false); }

        const { data } = await _sb.from('effects_library')
            .select('id, name, tags, creator, created_at')
            .order('created_at', { ascending: false });
        const fresh = data || [];
        const cachedIds = (allEffects || []).map(e => e.id).join(',');
        const freshIds  = fresh.map(e => e.id).join(',');
        if (freshIds !== cachedIds || !cached) {
            allEffects = fresh;
            saveMetaCache(fresh);
            initAfterFetch(true);
        }
    }

    function initAfterFetch(rerender) {
        allTags = new Set(); tagCounts = {};
        allEffects.forEach(e => { (e.tags || []).forEach(t => { allTags.add(t); tagCounts[t] = (tagCounts[t] || 0) + 1; }); });
        renderTagChips();
        if (rerender) filterEffects();
    }

    // ── Fetch full pack (cover + actions) ─────────────────────────────────
    async function fetchFullEffect(id) {
        if (fullDataCache.has(id)) return fullDataCache.get(id);

        const lsCached = getFullCache(id);
        if (lsCached) {
            const result = { image_data: lsCached.img, actions: lsCached.actions };
            fullDataCache.set(id, result);
            return result;
        }

        const { data } = await _sb.from('effects_library')
            .select('id, image_data, actions')
            .eq('id', id).single();
        if (!data) return null;

        const effect = allEffects.find(e => e.id === id);
        if (effect && data.image_data) effect.image_data = data.image_data;
        fullDataCache.set(id, data);
        if (data.image_data) setFullCache(id, data.image_data, data.actions);
        return data;
    }

    function prefetchEffect(id) {
        if (fullDataCache.has(id) || getFullCache(id)) return;
        fetchFullEffect(id);
    }

    // ── Lazy loading ──────────────────────────────────────────────────────
    let lazyQueue = [], lazyTimer = null;

    const lazyObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            lazyObserver.unobserve(entry.target);
            const id = entry.target.dataset.id;
            if (!id) return;
            const cached = getCachedImage(id);
            if (cached) applyImageToCard(entry.target, cached);
            else { lazyQueue.push(id); scheduleBatch(); }
        });
    }, { rootMargin: '300px 0px' });

    function scheduleBatch() { if (lazyTimer) return; lazyTimer = setTimeout(flushBatch, 40); }

    async function flushBatch() {
        lazyTimer = null;
        if (!lazyQueue.length) return;
        const batch = [...new Set(lazyQueue.splice(0, 20))];
        const { data } = await _sb.from('effects_library').select('id, image_data').in('id', batch);
        if (!data) return;
        data.forEach(row => {
            setCachedImage(row.id, row.image_data);
            const effect = allEffects.find(e => e.id === row.id);
            if (effect) effect.image_data = row.image_data;
            const card = document.querySelector(`.effect-card[data-id="${row.id}"]`);
            if (card) applyImageToCard(card, row.image_data);
        });
        if (lazyQueue.length) scheduleBatch();
    }

    function applyImageToCard(card, src) {
        const skeleton = card.querySelector('.effect-skeleton');
        if (skeleton) {
            const img = document.createElement('img');
            img.onload = () => { skeleton.replaceWith(img); img.classList.add('loaded'); };
            img.src = src;
        } else {
            let img = card.querySelector('img');
            if (!img) { img = document.createElement('img'); const lbl = card.querySelector('.effect-card-label'); lbl ? card.insertBefore(img, lbl) : card.appendChild(img); }
            img.onload = () => img.classList.add('loaded');
            img.src = src;
        }
    }

    // ── Tag chips ─────────────────────────────────────────────────────────
    function renderTagChips() {
        const row = document.getElementById('tag-chips-row');
        if (!allTags.size) { row.style.display = 'none'; return; }
        row.style.display = 'flex';
        const top10 = [...allTags].sort((a, b) => (tagCounts[b]||0) - (tagCounts[a]||0)).slice(0, 10);
        row.innerHTML = `<button class="tag-chip ${!activeTagFilter ? 'active' : ''}" data-tag="">All</button>`
            + top10.map(t => `<button class="tag-chip ${activeTagFilter === t ? 'active' : ''}" data-tag="${t}">${t}</button>`).join('');
        row.querySelectorAll('.tag-chip').forEach(chip => {
            chip.onclick = () => {
                activeTagFilter = chip.dataset.tag || null;
                document.getElementById('effect-search').value = '';
                renderTagChips();
                filterEffects();
            };
        });
    }

    // ── Sort + filter ─────────────────────────────────────────────────────
    function sortEffectList(list, sort) {
        if (sort === 'newest')   return [...list].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        if (sort === 'oldest')   return [...list].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        if (sort === 'az')       return [...list].sort((a, b) => (a.name||'').localeCompare(b.name||''));
        if (sort === 'za')       return [...list].sort((a, b) => (b.name||'').localeCompare(a.name||''));
        if (sort === 'lastused') return [...list].sort((a, b) =>
            (parseInt(localStorage.getItem('efx-used-'+b.id)||0)) - (parseInt(localStorage.getItem('efx-used-'+a.id)||0)));
        return list;
    }

    function filterEffects() {
        const q    = document.getElementById('effect-search').value.toLowerCase().trim();
        const sort = document.getElementById('effect-sort').value;
        let list   = [...allEffects];
        if (activeTagFilter) list = list.filter(e => (e.tags || []).includes(activeTagFilter));
        if (q) list = list.filter(e => e.name.toLowerCase().includes(q) || (e.tags || []).some(t => t.includes(q)));
        list = sortEffectList(list, sort);
        renderGrid(list);
        document.getElementById('effect-count').innerText = list.length + ' packs';
    }

    // ── Render grid ───────────────────────────────────────────────────────
    function renderGrid(effects) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        if (!effects.length) {
            grid.innerHTML = '<div style="color:#333;font-size:13px;font-weight:700;padding:40px;grid-column:1/-1;text-align:center;">No effects found</div>';
            return;
        }
        effects.forEach(item => {
            const card = document.createElement('div');
            card.className = 'effect-card';
            card.dataset.id = item.id;
            const cachedSrc = item.image_data || getCachedImage(item.id);
            if (cachedSrc) {
                card.innerHTML = `<img src="${cachedSrc}" class="loaded"><div class="effect-card-label">${item.name}</div>`;
            } else {
                card.innerHTML = `<div class="effect-skeleton"></div><div class="effect-card-label">${item.name}</div>`;
                lazyObserver.observe(card);
            }
            card.onclick = () => openPreview(item);
            card.addEventListener('mouseenter', () => prefetchEffect(item.id));
            card.addEventListener('touchstart', () => prefetchEffect(item.id), { passive: true });
            grid.appendChild(card);
        });
    }

    // ── Preview panel ─────────────────────────────────────────────────────
    async function openPreview(item) {
        document.getElementById('v-img').src = '';
        document.getElementById('v-img').style.opacity = '0';
        document.getElementById('v-name').innerText = item.name.toUpperCase();
        document.getElementById('v-actions').innerHTML = '<div style="color:#333;font-size:11px;font-weight:700;padding:8px;">Loading effects...</div>';
        document.getElementById('preview-overlay').classList.add('active');

        const creatorLink = document.getElementById('v-creator-link');
        creatorLink.innerText = item.creator ? `CREATED BY ${item.creator}` : '';
        creatorLink.onclick = item.creator ? () => { location.href = `profile.html?u=${item.creator.replace('@','')}`; } : null;

        // Admin delete
        const adminContainer = document.getElementById('admin-action-container');
        adminContainer.innerHTML = '';
        if (isAdmin) {
            const delBtn = document.createElement('button');
            delBtn.className = 'admin-btn-delete';
            delBtn.innerText = 'DELETE EFFECT PACK';
            delBtn.onclick = async () => {
                if (!confirm('Delete this effect pack?')) return;
                delBtn.disabled = true; delBtn.innerText = 'DELETING...';
                const { error } = await _sb.from('effects_library').delete().eq('id', item.id);
                if (error) { alert('Delete failed: ' + error.message); delBtn.disabled = false; delBtn.innerText = 'DELETE EFFECT PACK'; return; }
                localStorage.removeItem(META_CACHE_KEY);
                localStorage.removeItem('efx-full-' + item.id);
                sessionStorage.removeItem('cc_efx_' + item.id);
                fullDataCache.delete(item.id);
                location.reload();
            };
            adminContainer.appendChild(delBtn);
        }

        // Use button — sends whole pack to create.html
        document.getElementById('v-use-btn').onclick = async () => {
            const full = await fetchFullEffect(item.id);
            localStorage.setItem('efx-used-' + item.id, Date.now());
            localStorage.setItem('incoming_effect', JSON.stringify({ ...item, ...full }));
            location.href = 'create.html';
        };

        // Load full pack
        const full = await fetchFullEffect(item.id);
        const vImg = document.getElementById('v-img');
        if (full?.image_data || item.image_data) {
            vImg.src = full?.image_data || item.image_data;
            vImg.style.opacity = '1';
        }

        // Render effect chips
        const actGrid = document.getElementById('v-actions');
        actGrid.innerHTML = '';
        let actions = full?.actions;
        if (typeof actions === 'string') try { actions = JSON.parse(actions); } catch(e) {}
        if (actions && Object.keys(actions).length) {
            Object.entries(actions).forEach(([key, val]) => {
                const chip = document.createElement('div');
                chip.className = 'view-chip';
                chip.innerHTML = `<img src="${val}" loading="lazy"><span>${key}</span>`;
                chip.onclick = () => {
                    // Clicking an individual effect from the pack — send just that one
                    localStorage.setItem('efx-used-' + item.id, Date.now());
                    localStorage.setItem('incoming_effect', JSON.stringify({ ...item, image_data: val, actions: {}, _single: true }));
                    location.href = 'create.html';
                };
                actGrid.appendChild(chip);
            });
        } else {
            actGrid.innerHTML = '<div style="color:#333;font-size:11px;padding:8px;">No effects in this pack yet.</div>';
        }
    }

    function closePreview() { document.getElementById('preview-overlay').classList.remove('active'); }
</script>
