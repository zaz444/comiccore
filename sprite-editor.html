<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ComicCore — Sprite Studio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0c; --card: #141416; --card2: #1c1c1e;
  --text: #f0f0f2; --accent: #ff7a00; --teal: #00d2ff;
  --border: #2a2a2c; --danger: #ff3b30; --green: #34c759;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column; height: 100dvh;
}

/* ── TOP BAR ── */
#top-bar {
  height: 52px; background: var(--card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  flex-shrink: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
}
.tb-btn {
  background: rgba(255,255,255,0.07); border: 1px solid var(--border);
  color: var(--text); padding: 7px 12px; border-radius: 8px;
  cursor: pointer; font-size: 12px; font-weight: 700; font-family: inherit;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
  transition: 0.15s; flex-shrink: 0;
}
.tb-btn:hover { background: rgba(255,255,255,0.12); }
.tb-btn:active { opacity: 0.7; }
.tb-btn.accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 900; }
.tb-btn.teal { background: rgba(0,210,255,0.1); border-color: var(--teal); color: var(--teal); }
.tb-btn.danger-btn { border-color: rgba(255,59,48,0.4); color: var(--danger); }
.tb-spacer { flex: 1; }
#sprite-name-input {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 13px;
  font-weight: 700; font-family: inherit; outline: none; min-width: 140px; max-width: 200px;
}
#sprite-name-input:focus { border-color: var(--accent); }

/* ── MAIN LAYOUT ── */
#main { flex: 1; display: flex; overflow: hidden; }

/* ── LEFT PANEL (canvas area) ── */
#canvas-area {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  position: relative;
}

/* ── CANVAS STAGE ── */
#stage {
  flex: 1; background: #050507; display: flex; align-items: center;
  justify-content: center; position: relative; overflow: hidden;
  cursor: crosshair;
}
/* checkerboard transparent bg indicator */
#stage::before {
  content: ''; position: absolute; inset: 0; opacity: 0.08;
  background-image: repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%);
  background-size: 20px 20px; pointer-events: none;
}
#canvas-wrapper {
  position: relative; box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.1);
}
#main-canvas { display: block; cursor: crosshair; touch-action: none; }
/* Grid overlay */
#grid-canvas {
  position: absolute; inset: 0; pointer-events: none;
  display: none;
}

/* ── TOOL BAR (left side) ── */
#tool-bar {
  width: 52px; background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0; gap: 2px; flex-shrink: 0; overflow-y: auto;
}
.tool-btn {
  width: 42px; height: 42px; border: none; background: transparent;
  color: #666; border-radius: 8px; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: 0.12s; font-family: inherit; position: relative;
}
.tool-btn:hover { background: rgba(255,255,255,0.06); color: #ccc; }
.tool-btn.active { background: rgba(255,122,0,0.15); color: var(--accent); }
.tool-divider { width: 28px; height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }
.tool-tip {
  position: absolute; left: 48px; top: 50%; transform: translateY(-50%);
  background: #111; border: 1px solid var(--border); color: var(--text);
  font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px;
  white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.1s;
  z-index: 500; letter-spacing: 0.5px; text-transform: uppercase;
}
.tool-btn:hover .tool-tip { opacity: 1; }

/* ── RIGHT PANEL (actions manager) ── */
#right-panel {
  width: 280px; background: var(--card); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  overflow: hidden;
}
@media (max-width: 700px) {
  #right-panel { display: none; }
  #tool-bar { display: none; }
  #mobile-bottom-bar { display: flex !important; }
}
#mobile-bottom-bar {
  display: none; flex-direction: column; background: var(--card);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.panel-tab-bar {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.panel-tab {
  flex: 1; padding: 10px; background: transparent; border: none; color: #555;
  font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.8px;
  cursor: pointer; font-family: inherit; transition: 0.12s; border-bottom: 2px solid transparent;
}
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── ACTIONS PANEL ── */
#panel-actions {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.panel-section-title {
  font-size: 9px; font-weight: 900; color: #555; text-transform: uppercase;
  letter-spacing: 1.5px; padding: 10px 12px 6px; border-bottom: 1px solid #1e1e1e;
  flex-shrink: 0;
}
#actions-list {
  flex: 1; overflow-y: auto; padding: 8px;
}
#actions-list::-webkit-scrollbar { width: 3px; }
#actions-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.action-slot {
  display: flex; align-items: center; gap: 8px; padding: 8px;
  border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 6px;
  cursor: pointer; transition: 0.15s; background: #0d0d0f;
  position: relative;
}
.action-slot:hover { border-color: #3a3a3c; }
.action-slot.active-action { border-color: var(--accent); background: rgba(255,122,0,0.08); }
.action-slot.default-slot { border-color: rgba(0,210,255,0.3); background: rgba(0,210,255,0.04); }
.action-slot.default-slot.active-action { border-color: var(--teal); background: rgba(0,210,255,0.1); }
.action-thumb {
  width: 44px; height: 44px; border-radius: 7px; background: #111;
  object-fit: contain; flex-shrink: 0; border: 1px solid #222;
}
.action-info { flex: 1; min-width: 0; }
.action-name {
  font-size: 11px; font-weight: 800; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.action-badge {
  font-size: 9px; font-weight: 900; color: #555; margin-top: 2px;
}
.action-del {
  background: none; border: none; color: #333; cursor: pointer;
  font-size: 14px; padding: 4px; border-radius: 4px; transition: 0.12s;
  flex-shrink: 0;
}
.action-del:hover { color: var(--danger); background: rgba(255,59,48,0.1); }
.action-add-btn {
  width: 100%; padding: 10px; background: rgba(255,122,0,0.07);
  border: 1.5px dashed rgba(255,122,0,0.3); border-radius: 10px;
  color: var(--accent); font-size: 11px; font-weight: 800; cursor: pointer;
  font-family: inherit; transition: 0.15s; display: flex; align-items: center; gap: 6px;
  justify-content: center;
}
.action-add-btn:hover { background: rgba(255,122,0,0.12); border-color: var(--accent); }

/* ── TOOL OPTIONS BAR ── */
#tool-options {
  height: 44px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  flex-shrink: 0; flex-wrap: nowrap; overflow-x: auto;
}
#tool-options::-webkit-scrollbar { display: none; }
.opt-label { font-size: 9px; font-weight: 900; color: #555; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
.opt-color-btn {
  width: 26px; height: 26px; border-radius: 50%; border: 2px solid #444;
  cursor: pointer; flex-shrink: 0; box-shadow: 0 0 0 1px #222;
}
.opt-size-track {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.opt-slider { width: 80px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.opt-val { font-size: 11px; font-weight: 800; color: var(--teal); min-width: 22px; }
.opt-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.opt-chip {
  padding: 4px 9px; border-radius: 20px; border: 1px solid var(--border);
  background: #111; color: #666; font-size: 10px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: 0.12s; white-space: nowrap; flex-shrink: 0;
}
.opt-chip.active { background: rgba(255,122,0,0.15); border-color: var(--accent); color: var(--accent); }

/* ── BOTTOM STATUS ── */
#status-bar {
  height: 28px; background: rgba(0,0,0,0.5); border-top: 1px solid #111;
  display: flex; align-items: center; gap: 12px; padding: 0 12px;
  font-size: 10px; font-weight: 700; color: #444; flex-shrink: 0;
}
#status-bar span { color: #555; }
#status-coords { margin-left: auto; }

/* ── COLOR PALETTE ── */
#palette-row {
  display: flex; gap: 4px; flex-wrap: wrap; padding: 8px 12px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.swatch {
  width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
  border: 1.5px solid transparent; transition: 0.1s; flex-shrink: 0;
}
.swatch:hover { transform: scale(1.15); border-color: #fff; }
.swatch.active { border-color: #fff; transform: scale(1.1); }

/* ── CANVAS SIZE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 9999; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #1a1a1c; border: 1px solid var(--border); border-radius: 18px;
  padding: 24px; min-width: 280px; max-width: 380px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
.modal-title {
  font-size: 13px; font-weight: 900; color: var(--accent); letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 16px;
}
.modal-row { margin-bottom: 12px; }
.modal-label { font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.modal-input {
  width: 100%; background: #111; border: 1px solid var(--border); color: var(--text);
  padding: 9px 12px; border-radius: 8px; font-size: 13px; font-weight: 700;
  font-family: inherit; outline: none;
}
.modal-input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; }
.modal-btn {
  flex: 1; padding: 11px; border: none; border-radius: 10px; font-weight: 900;
  font-size: 13px; cursor: pointer; font-family: inherit; transition: 0.15s;
}
.modal-btn.cancel { background: #222; color: #aaa; }
.modal-btn.confirm { background: var(--accent); color: #000; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,22,0.95); border: 1px solid var(--border);
  color: var(--text); padding: 8px 20px; border-radius: 20px;
  font-size: 12px; font-weight: 800; z-index: 9998; pointer-events: none;
  opacity: 0; transition: opacity 0.25s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
#toast.show { opacity: 1; }

/* ── MOBILE TOOLS ROW ── */
#mobile-tools {
  display: flex; overflow-x: auto; padding: 6px 8px; gap: 4px;
  border-bottom: 1px solid var(--border); scrollbar-width: none;
}
#mobile-tools::-webkit-scrollbar { display: none; }
.mob-tool-btn {
  flex-shrink: 0; width: 38px; height: 38px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent; color: #666;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: 0.12s;
}
.mob-tool-btn.active { background: rgba(255,122,0,0.15); color: var(--accent); border-color: rgba(255,122,0,0.4); }

/* ── LOADING ── */
#save-status {
  font-size: 10px; font-weight: 800; color: #555;
  display: flex; align-items: center; gap: 4px;
}
#save-status.saving { color: var(--teal); }
#save-status.saved  { color: var(--green); }
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div id="top-bar">
  <button class="tb-btn" onclick="goBackToCreator()">← Back</button>
  <div class="opt-sep"></div>
  <input type="text" id="sprite-name-input" placeholder="Sprite name..." value="My Sprite">
  <div class="tb-spacer"></div>
  <div id="save-status">● Unsaved</div>
  <div class="opt-sep"></div>
  <button class="tb-btn" onclick="clearCanvas()" title="Clear canvas">🗑 Clear</button>
  <button class="tb-btn" onclick="openResizeModal()" title="Resize">⬛ Size</button>
  <button class="tb-btn teal" onclick="saveCurrentActionAsNew()" title="Save frame as new action">+ Action</button>
  <button class="tb-btn accent" onclick="saveAndReturn()">💾 Save & Return</button>
</div>

<!-- ── MAIN LAYOUT ── -->
<div id="main">

  <!-- TOOL BAR (desktop) -->
  <div id="tool-bar">
    <button class="tool-btn active" id="tb-pencil" onclick="setTool('pencil')" title="Pencil">
      ✏️<span class="tool-tip">Pencil (B)</span>
    </button>
    <button class="tool-btn" id="tb-eraser" onclick="setTool('eraser')" title="Eraser">
      🧹<span class="tool-tip">Eraser (E)</span>
    </button>
    <button class="tool-btn" id="tb-fill" onclick="setTool('fill')" title="Fill">
      🪣<span class="tool-tip">Fill (F)</span>
    </button>
    <button class="tool-btn" id="tb-eyedrop" onclick="setTool('eyedrop')" title="Eyedropper">
      💉<span class="tool-tip">Eyedropper (I)</span>
    </button>
    <button class="tool-btn" id="tb-rect" onclick="setTool('rect')" title="Rectangle">
      ▭<span class="tool-tip">Rectangle (R)</span>
    </button>
    <button class="tool-btn" id="tb-ellipse" onclick="setTool('ellipse')" title="Ellipse">
      ◯<span class="tool-tip">Ellipse (O)</span>
    </button>
    <button class="tool-btn" id="tb-line" onclick="setTool('line')" title="Line">
      ╱<span class="tool-tip">Line (L)</span>
    </button>
    <div class="tool-divider"></div>
    <button class="tool-btn" id="tb-select" onclick="setTool('select')" title="Select">
      ⬚<span class="tool-tip">Select (S)</span>
    </button>
    <button class="tool-btn" onclick="undoHistory()" title="Undo">
      ↩<span class="tool-tip">Undo (Ctrl+Z)</span>
    </button>
    <button class="tool-btn" onclick="redoHistory()" title="Redo">
      ↪<span class="tool-tip">Redo (Ctrl+Y)</span>
    </button>
    <div class="tool-divider"></div>
    <button class="tool-btn" onclick="flipH()" title="Flip H">
      ↔<span class="tool-tip">Flip H</span>
    </button>
    <button class="tool-btn" onclick="flipV()" title="Flip V">
      ↕<span class="tool-tip">Flip V</span>
    </button>
    <button class="tool-btn" onclick="toggleGrid()" title="Toggle Grid" id="tb-grid">
      ⊞<span class="tool-tip">Grid</span>
    </button>
    <button class="tool-btn" onclick="zoomIn()" title="Zoom In">
      +<span class="tool-tip">Zoom In</span>
    </button>
    <button class="tool-btn" onclick="zoomOut()" title="Zoom Out">
      −<span class="tool-tip">Zoom Out</span>
    </button>
    <button class="tool-btn" onclick="resetZoom()" title="Reset Zoom">
      ⤢<span class="tool-tip">Fit Canvas</span>
    </button>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <!-- Tool Options Bar -->
    <div id="tool-options">
      <span class="opt-label">Color</span>
      <input type="color" id="color-picker-input" value="#000000" oninput="setDrawColor(this.value)"
        style="width:26px;height:26px;border-radius:50%;border:2px solid #444;cursor:pointer;background:none;padding:0;overflow:hidden;flex-shrink:0;">
      <div class="opt-sep"></div>
      <span class="opt-label">Size</span>
      <div class="opt-size-track">
        <input type="range" class="opt-slider" id="size-slider" min="1" max="60" value="6" oninput="setBrushSize(this.value)">
        <span class="opt-val" id="size-val">6</span>
      </div>
      <div class="opt-sep"></div>
      <span class="opt-label">Opacity</span>
      <div class="opt-size-track">
        <input type="range" class="opt-slider" id="opacity-slider" min="1" max="100" value="100" oninput="setBrushOpacity(this.value)">
        <span class="opt-val" id="opacity-val">100%</span>
      </div>
      <div class="opt-sep"></div>
      <button class="opt-chip" id="smooth-btn" onclick="toggleSmooth()">Smooth</button>
      <button class="opt-chip active" id="aa-btn" onclick="toggleAA()">Anti-alias</button>
    </div>

    <!-- Color Palette -->
    <div id="palette-row"></div>

    <!-- Stage -->
    <div id="stage">
      <div id="canvas-wrapper">
        <canvas id="main-canvas" width="400" height="400"></canvas>
        <canvas id="grid-canvas" width="400" height="400"></canvas>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span>Tool: <span id="status-tool">Pencil</span></span>
      <span>Brush: <span id="status-size">6px</span></span>
      <span id="status-zoom">100%</span>
      <span id="status-coords">x:0 y:0</span>
    </div>
  </div>

  <!-- RIGHT PANEL (desktop actions) -->
  <div id="right-panel">
    <div class="panel-tab-bar">
      <button class="panel-tab active" id="ptab-actions" onclick="switchPanelTab('actions')">Actions</button>
      <button class="panel-tab" id="ptab-import" onclick="switchPanelTab('import')">Import</button>
    </div>

    <!-- ACTIONS TAB -->
    <div id="panel-actions">
      <div class="panel-section-title">SPRITE ACTIONS / POSES</div>
      <div id="palette-right" style="display:flex;gap:4px;flex-wrap:wrap;padding:8px 10px;border-bottom:1px solid var(--border)"></div>
      <div id="actions-list">
        <div id="default-slot" class="action-slot default-slot active-action" onclick="selectActionSlot('default')">
          <img id="default-thumb" class="action-thumb" src="" alt="Default">
          <div class="action-info">
            <div class="action-name">Default</div>
            <div class="action-badge">Main sprite image</div>
          </div>
        </div>
        <!-- extra action slots appended here -->
      </div>
      <div style="padding:8px;">
        <button class="action-add-btn" onclick="addNewActionSlot()">+ Add New Action</button>
      </div>
    </div>

    <!-- IMPORT TAB -->
    <div id="panel-import" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="panel-section-title">IMPORT IMAGE</div>
      <div style="padding:12px;display:flex;flex-direction:column;gap:8px;">
        <div id="import-drop-zone"
          style="border:2px dashed #333;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:0.15s;"
          onclick="triggerFileImport()"
          ondragover="this.style.borderColor='#ff7a00';event.preventDefault()"
          ondragleave="this.style.borderColor='#333'"
          ondrop="handleImportDrop(event)">
          <div style="font-size:28px;margin-bottom:8px;">🖼️</div>
          <div style="font-size:12px;font-weight:800;color:#aaa;">Drop image here or tap to browse</div>
          <div style="font-size:10px;color:#555;margin-top:4px;">PNG, GIF, WebP, JPG</div>
          <input type="file" id="import-file-input" accept="image/*" style="display:none" onchange="handleImportFile(this.files[0])">
        </div>
        <div style="font-size:10px;color:#444;font-weight:700;text-align:center;">Import as current action layer</div>
        <div style="height:1px;background:var(--border);margin:4px 0;"></div>
        <div style="font-size:9px;font-weight:900;color:#555;text-transform:uppercase;letter-spacing:1px;">From URL</div>
        <input type="text" id="import-url-input" placeholder="https://..." class="modal-input" style="font-size:12px;">
        <button class="tb-btn" onclick="importFromUrl()" style="width:100%;justify-content:center;">Load from URL</button>
      </div>
    </div>
  </div>

</div><!-- /main -->

<!-- MOBILE BOTTOM BAR -->
<div id="mobile-bottom-bar">
  <div id="mobile-tools">
    <button class="mob-tool-btn active" id="mtb-pencil" onclick="setTool('pencil')">✏️</button>
    <button class="mob-tool-btn" id="mtb-eraser" onclick="setTool('eraser')">🧹</button>
    <button class="mob-tool-btn" id="mtb-fill" onclick="setTool('fill')">🪣</button>
    <button class="mob-tool-btn" id="mtb-eyedrop" onclick="setTool('eyedrop')">💉</button>
    <button class="mob-tool-btn" id="mtb-rect" onclick="setTool('rect')">▭</button>
    <button class="mob-tool-btn" id="mtb-ellipse" onclick="setTool('ellipse')">◯</button>
    <button class="mob-tool-btn" id="mtb-line" onclick="setTool('line')">╱</button>
    <button class="mob-tool-btn" id="mtb-select" onclick="setTool('select')">⬚</button>
    <div style="width:1px;height:30px;background:var(--border);margin:4px 6px;flex-shrink:0;"></div>
    <button class="mob-tool-btn" onclick="undoHistory()">↩</button>
    <button class="mob-tool-btn" onclick="redoHistory()">↪</button>
    <button class="mob-tool-btn" onclick="flipH()">↔</button>
    <button class="mob-tool-btn" onclick="zoomIn()">+</button>
    <button class="mob-tool-btn" onclick="zoomOut()">−</button>
    <button class="mob-tool-btn" onclick="resetZoom()">⤢</button>

<div id="toast"></div>

<input type="color" id="hidden-color-input" style="display:none;" oninput="setDrawColor(this.value)">

<script>
// ══════════════════════════════════════════════════════════════
// SUPABASE INIT
// ══════════════════════════════════════════════════════════════
const _supabase = supabase.createClient(
  'https://mmycqeejhguzhtzkyjaj.supabase.co',
  'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE',
  { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } }
);

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');
const gridCanvas = document.getElementById('grid-canvas');
const gridCtx    = gridCanvas.getContext('2d');

let currentTool   = 'pencil';
let drawColor     = '#000000';
let brushSize     = 6;
let brushOpacity  = 1.0;
let isDrawing     = false;
let lastX = 0, lastY = 0;
let smoothing     = false;
let antiAlias     = true;
let showGrid      = false;
let canvasZoom    = 1;
let panX = 0, panY = 0;
let isPanning     = false;
let panStartX = 0, panStartY = 0;

let historyStack = [];
let redoStack    = [];
const MAX_HISTORY = 30;

// Shape drawing state
let shapeStartX = 0, shapeStartY = 0;
let shapeSnapshot = null;
let selRect = null; // {x,y,w,h}
let selSnapshot = null;

// Actions: { default: <dataURL>, 'Walk': <dataURL>, ... }
let spriteActions = { default: null };
let currentActionKey = 'default';

// Editing context (passed from creator)
let editingContext = null; // { spriteId, spriteName, returnPage }

// ── Color palette ──
const PALETTE = [
  '#000000','#ffffff','#ff3b30','#ff9500','#ffcc00','#34c759','#007aff','#5856d6',
  '#af52de','#ff2d55','#8e8e93','#636366','#3a3a3c','#2c2c2e','#1c1c1e',
  '#f4a261','#e76f51','#264653','#2a9d8f','#e9c46a',
  '#transparent'
];

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
function init() {
  buildPalette();
  buildPaletteRight();
  fitCanvasToStage();
  window.addEventListener('resize', () => { fitCanvasToStage(); drawGrid(); });

  // Load editing context from localStorage
  const raw = localStorage.getItem('sprite_editor_context');
  if (raw) {
    try {
      editingContext = JSON.parse(raw);
      if (editingContext.spriteName) {
        document.getElementById('sprite-name-input').value = editingContext.spriteName;
      }
      // Load existing sprite data if provided
      if (editingContext.imageData) {
        loadImageDataUrl(editingContext.imageData, () => {
          spriteActions.default = canvas.toDataURL('image/png');
          updateDefaultThumb();
        });
      }
      if (editingContext.actions) {
        const acts = typeof editingContext.actions === 'string'
          ? JSON.parse(editingContext.actions) : editingContext.actions;
        Object.entries(acts || {}).forEach(([k, v]) => {
          if (k !== 'default') {
            spriteActions[k] = v;
            appendActionSlot(k, v);
          }
        });
      }
    } catch(e) { console.warn('Could not parse editor context:', e); }
  }

  // Canvas background: white
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveHistory();

  // Set default thumb if none
  updateDefaultThumb();
  updateSaveStatus('unsaved');
}

// ══════════════════════════════════════════════════════════════
// PALETTE
// ══════════════════════════════════════════════════════════════
function buildPalette() {
  const row = document.getElementById('palette-row');
  row.innerHTML = '';
  PALETTE.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch';
    if (c === '#transparent') {
      s.style.cssText = 'background:linear-gradient(to bottom right,#fff 46%,#ff3b30 46% 54%,#fff 54%);border-color:#333;';
      s.title = 'Transparent / Erase';
      s.onclick = () => { setDrawColor('rgba(0,0,0,0)'); setTool('eraser'); };
    } else {
      s.style.background = c;
      if (c === '#000000') s.classList.add('active');
      s.onclick = () => { setDrawColor(c); if(currentTool==='eraser') setTool('pencil'); };
    }
    row.appendChild(s);
  });
}

function buildPaletteRight() {
  const row = document.getElementById('palette-right');
  row.innerHTML = '';
  PALETTE.slice(0, 16).forEach(c => {
    if (c === '#transparent') return;
    const s = document.createElement('div');
    s.className = 'swatch'; s.style.background = c; s.style.width='17px'; s.style.height='17px';
    s.onclick = () => { setDrawColor(c); if(currentTool==='eraser') setTool('pencil'); };
    row.appendChild(s);
  });
}

// ══════════════════════════════════════════════════════════════
// TOOLS
// ══════════════════════════════════════════════════════════════
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn[id^="tb-"], .mob-tool-btn[id^="mtb-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tb-' + tool);
  if (btn) btn.classList.add('active');
  const mbtn = document.getElementById('mtb-' + tool);
  if (mbtn) mbtn.classList.add('active');
  document.getElementById('status-tool').innerText = tool.charAt(0).toUpperCase() + tool.slice(1);
  canvas.style.cursor = tool === 'fill' ? 'cell' : tool === 'eyedrop' ? 'crosshair' : 'crosshair';
}

function setDrawColor(c) {
  drawColor = c;
  document.getElementById('color-picker-input').value = c.startsWith('#') ? c : '#000000';
  const mobPicker = document.getElementById('mob-color-picker');
  if (mobPicker) mobPicker.value = c.startsWith('#') ? c : '#000000';
  // Update palette active
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('active', s.style.background === c || s.style.backgroundColor === c);
  });
}

function setBrushSize(v) {
  brushSize = parseInt(v);
  document.getElementById('size-slider').value = v;
  document.getElementById('size-val').innerText = v;
  const ms = document.getElementById('mob-size-slider');
  const msv = document.getElementById('mob-size-val');
  if (ms) ms.value = v;
  if (msv) msv.innerText = v;
  document.getElementById('status-size').innerText = v + 'px';
}

function setBrushOpacity(v) {
  brushOpacity = v / 100;
  document.getElementById('opacity-val').innerText = v + '%';
}

function toggleSmooth() {
  smoothing = !smoothing;
  document.getElementById('smooth-btn').classList.toggle('active', smoothing);
}

function toggleAA() {
  antiAlias = !antiAlias;
  ctx.imageSmoothingEnabled = antiAlias;
  document.getElementById('aa-btn').classList.toggle('active', antiAlias);
}

// ══════════════════════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════════════════════
function saveHistory() {
  if (historyStack.length >= MAX_HISTORY) historyStack.shift();
  historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  redoStack = [];
}

function undoHistory() {
  if (historyStack.length <= 1) { showToast('Nothing to undo'); return; }
  redoStack.push(historyStack.pop());
  ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
  updateDefaultThumb();
}

function redoHistory() {
  if (!redoStack.length) { showToast('Nothing to redo'); return; }
  const state = redoStack.pop();
  historyStack.push(state);
  ctx.putImageData(state, 0, 0);
  updateDefaultThumb();
}

// ══════════════════════════════════════════════════════════════
// CANVAS → STAGE TRANSFORM
// ══════════════════════════════════════════════════════════════
function fitCanvasToStage() {
  const stage = document.getElementById('stage');
  const sw = stage.clientWidth - 40;
  const sh = stage.clientHeight - 40;
  const scaleX = sw / canvas.width;
  const scaleY = sh / canvas.height;
  canvasZoom = Math.min(scaleX, scaleY, 4);
  panX = 0; panY = 0;
  applyTransform();
}

function applyTransform() {
  const wrapper = document.getElementById('canvas-wrapper');
  wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${canvasZoom})`;
  document.getElementById('status-zoom').innerText = Math.round(canvasZoom * 100) + '%';
}

function zoomIn()  { canvasZoom = Math.min(canvasZoom * 1.25, 20); applyTransform(); drawGrid(); }
function zoomOut() { canvasZoom = Math.max(canvasZoom / 1.25, 0.1); applyTransform(); drawGrid(); }
function resetZoom() { fitCanvasToStage(); drawGrid(); }

// ══════════════════════════════════════════════════════════════
// GRID
// ══════════════════════════════════════════════════════════════
function toggleGrid() {
  showGrid = !showGrid;
  gridCanvas.style.display = showGrid ? 'block' : 'none';
  document.getElementById('tb-grid').classList.toggle('active', showGrid);
  if (showGrid) drawGrid();
}

function drawGrid() {
  gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  if (!showGrid) return;
  const cellSize = 16;
  gridCtx.strokeStyle = 'rgba(255,255,255,0.08)';
  gridCtx.lineWidth = 1 / canvasZoom;
  for (let x = 0; x <= gridCanvas.width; x += cellSize) {
    gridCtx.beginPath(); gridCtx.moveTo(x, 0); gridCtx.lineTo(x, gridCanvas.height); gridCtx.stroke();
  }
  for (let y = 0; y <= gridCanvas.height; y += cellSize) {
    gridCtx.beginPath(); gridCtx.moveTo(0, y); gridCtx.lineTo(gridCanvas.width, y); gridCtx.stroke();
  }
}

// ══════════════════════════════════════════════════════════════
// DRAWING: POINTER EVENTS
// ══════════════════════════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: Math.floor((clientX - rect.left) * (canvas.width  / rect.width)),
    y: Math.floor((clientY - rect.top)  * (canvas.height / rect.height))
  };
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup',   onPointerUp);
canvas.addEventListener('pointerleave', onPointerUp);

function onPointerDown(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  // Space + drag = pan
  if (e.code === 'Space' || spaceDown) {
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    return;
  }
  isDrawing = true;
  lastX = pos.x; lastY = pos.y;

  if (currentTool === 'eyedrop') {
    pickColor(pos.x, pos.y);
    isDrawing = false;
    return;
  }
  if (currentTool === 'fill') {
    saveHistory();
    floodFill(pos.x, pos.y, drawColor);
    isDrawing = false;
    updateCurrentActionThumb();
    return;
  }
  if (currentTool === 'select') {
    shapeStartX = pos.x; shapeStartY = pos.y;
    selRect = null;
    return;
  }
  if (['rect','ellipse','line'].includes(currentTool)) {
    shapeStartX = pos.x; shapeStartY = pos.y;
    shapeSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    return;
  }
  saveHistory();
  ctx.globalAlpha = brushOpacity;
  ctx.strokeStyle = drawColor;
  ctx.fillStyle   = drawColor;
  ctx.lineWidth   = brushSize;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
  ctx.fill();
}

function onPointerMove(e) {
  e.preventDefault();
  if (isPanning) {
    panX = e.clientX - panStartX;
    panY = e.clientY - panStartY;
    applyTransform();
    return;
  }
  const pos = getCanvasPos(e);
  document.getElementById('status-coords').innerText = `x:${pos.x} y:${pos.y}`;

  if (!isDrawing) return;

  if (currentTool === 'select') {
    // draw selection rect
    ctx.putImageData(shapeSnapshot || ctx.getImageData(0,0,canvas.width,canvas.height), 0, 0);
    const rx = Math.min(shapeStartX, pos.x), ry = Math.min(shapeStartY, pos.y);
    const rw = Math.abs(pos.x - shapeStartX), rh = Math.abs(pos.y - shapeStartY);
    selRect = {x:rx, y:ry, w:rw, h:rh};
    ctx.save(); ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(0,210,255,0.8)';
    ctx.lineWidth=1; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    ctx.strokeRect(rx, ry, rw, rh); ctx.restore();
    return;
  }

  if (['rect','ellipse','line'].includes(currentTool)) {
    ctx.putImageData(shapeSnapshot, 0, 0);
    ctx.globalAlpha = brushOpacity;
    ctx.strokeStyle = drawColor;
    ctx.fillStyle   = drawColor;
    ctx.lineWidth   = brushSize;
    ctx.lineCap     = 'round';
    ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.beginPath();
    if (currentTool === 'rect') {
      ctx.strokeRect(shapeStartX, shapeStartY, pos.x - shapeStartX, pos.y - shapeStartY);
    } else if (currentTool === 'ellipse') {
      const cx = (shapeStartX + pos.x) / 2, cy = (shapeStartY + pos.y) / 2;
      const rx = Math.abs(pos.x - shapeStartX) / 2, ry = Math.abs(pos.y - shapeStartY) / 2;
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (currentTool === 'line') {
      ctx.moveTo(shapeStartX, shapeStartY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
    return;
  }

  if (currentTool === 'pencil' || currentTool === 'eraser') {
    ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.globalAlpha = brushOpacity;
    ctx.strokeStyle = drawColor;
    ctx.lineWidth   = brushSize;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    if (smoothing) {
      const midX = (lastX + pos.x) / 2, midY = (lastY + pos.y) / 2;
      ctx.quadraticCurveTo(lastX, lastY, midX, midY);
    } else {
      ctx.lineTo(pos.x, pos.y);
    }
    ctx.stroke();
  }
  lastX = pos.x; lastY = pos.y;
}

function onPointerUp(e) {
  if (isPanning) { isPanning = false; return; }
  if (!isDrawing) return;
  isDrawing = false;
  if (['rect','ellipse','line'].includes(currentTool)) saveHistory();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  updateCurrentActionThumb();
  updateSaveStatus('unsaved');
}

// Space-to-pan support
let spaceDown = false;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') { spaceDown = true; e.preventDefault(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) undoHistory();
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) redoHistory();
  // Tool shortcuts
  const shortcuts = { b:'pencil', e:'eraser', f:'fill', i:'eyedrop', r:'rect', o:'ellipse', l:'line', s:'select' };
  if (shortcuts[e.key] && e.target.tagName !== 'INPUT') setTool(shortcuts[e.key]);
});
document.addEventListener('keyup', e => { if (e.code === 'Space') spaceDown = false; });

// Wheel zoom on stage
document.getElementById('stage').addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  canvasZoom = Math.max(0.1, Math.min(20, canvasZoom * delta));
  applyTransform();
}, { passive: false });

// ══════════════════════════════════════════════════════════════
// FLOOD FILL
// ══════════════════════════════════════════════════════════════
function floodFill(startX, startY, fillColorStr) {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;
  const W = canvas.width, H = canvas.height;

  const toRgba = hex => {
    if (!hex || hex === 'rgba(0,0,0,0)' || hex === 'transparent') return [0,0,0,0];
    const tmp = document.createElement('canvas');
    tmp.width = tmp.height = 1;
    const tctx = tmp.getContext('2d');
    tctx.fillStyle = hex;
    tctx.fillRect(0,0,1,1);
    const d = tctx.getImageData(0,0,1,1).data;
    return [d[0],d[1],d[2],d[3]];
  };

  const idx = (x, y) => (y * W + x) * 4;
  const matchColor = (i, target) => data[i]===target[0] && data[i+1]===target[1] && data[i+2]===target[2] && data[i+3]===target[3];
  const setColor  = (i, c) => { data[i]=c[0]; data[i+1]=c[1]; data[i+2]=c[2]; data[i+3]=c[3]; };

  const target = [data[idx(startX,startY)], data[idx(startX,startY)+1], data[idx(startX,startY)+2], data[idx(startX,startY)+3]];
  const fill   = toRgba(fillColorStr);
  if (target[0]===fill[0]&&target[1]===fill[1]&&target[2]===fill[2]&&target[3]===fill[3]) return;

  const stack = [[startX, startY]];
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const i = idx(cx, cy);
    if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;
    if (!matchColor(i, target)) continue;
    setColor(i, fill);
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imgData, 0, 0);
}

// ══════════════════════════════════════════════════════════════
// EYEDROPPER
// ══════════════════════════════════════════════════════════════
function pickColor(x, y) {
  const d = ctx.getImageData(x, y, 1, 1).data;
  const hex = '#' + [d[0],d[1],d[2]].map(v => v.toString(16).padStart(2,'0')).join('');
  setDrawColor(hex);
  setTool('pencil');
  showToast('Color picked: ' + hex);
}

// ══════════════════════════════════════════════════════════════
// FLIP / TRANSFORM
// ══════════════════════════════════════════════════════════════
function flipH() {
  saveHistory();
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  tctx.translate(canvas.width, 0); tctx.scale(-1, 1);
  tctx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tmp, 0, 0);
  updateCurrentActionThumb();
}

function flipV() {
  saveHistory();
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  tctx.translate(0, canvas.height); tctx.scale(1, -1);
  tctx.drawImage(canvas, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tmp, 0, 0);
  updateCurrentActionThumb();
}

// ══════════════════════════════════════════════════════════════
// RESIZE MODAL
// ══════════════════════════════════════════════════════════════
function openResizeModal() {
  document.getElementById('canvas-w-input').value = canvas.width;
  document.getElementById('canvas-h-input').value = canvas.height;
  document.getElementById('resize-modal').classList.add('open');
}
function closeResizeModal() {
  document.getElementById('resize-modal').classList.remove('open');
}
function applyResize() {
  const nw = parseInt(document.getElementById('canvas-w-input').value) || canvas.width;
  const nh = parseInt(document.getElementById('canvas-h-input').value) || canvas.height;
  const keep = document.getElementById('resize-keep-content').checked;
  const oldData = keep ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
  canvas.width  = Math.max(16, Math.min(2048, nw));
  canvas.height = Math.max(16, Math.min(2048, nh));
  gridCanvas.width  = canvas.width;
  gridCanvas.height = canvas.height;
  if (oldData) ctx.putImageData(oldData, 0, 0);
  historyStack = []; redoStack = [];
  saveHistory();
  fitCanvasToStage();
  drawGrid();
  closeResizeModal();
  showToast(`Canvas: ${canvas.width}×${canvas.height}`);
}

// ══════════════════════════════════════════════════════════════
// CLEAR
// ══════════════════════════════════════════════════════════════
function clearCanvas() {
  if (!confirm('Clear the entire canvas?')) return;
  saveHistory();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  updateCurrentActionThumb();
  showToast('Canvas cleared');
}

// ══════════════════════════════════════════════════════════════
// ACTIONS SYSTEM
// ══════════════════════════════════════════════════════════════
function selectActionSlot(key) {
  // Save current action
  spriteActions[currentActionKey] = canvas.toDataURL('image/png');

  // Load new action
  currentActionKey = key;
  const src = spriteActions[key];

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (src) {
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      saveHistory();
    };
    img.src = src;
  } else {
    saveHistory();
  }

  // Update highlight
  document.querySelectorAll('.action-slot').forEach(s => s.classList.remove('active-action'));
  const slot = document.querySelector(`.action-slot[data-action-key="${key}"]`) || document.getElementById('default-slot');
  if (slot) slot.classList.add('active-action');
}

function updateCurrentActionThumb() {
  spriteActions[currentActionKey] = canvas.toDataURL('image/png');
  // Update the thumb image for this key
  if (currentActionKey === 'default') {
    updateDefaultThumb();
  } else {
    const slot = document.querySelector(`.action-slot[data-action-key="${currentActionKey}"]`);
    if (slot) {
      const img = slot.querySelector('.action-thumb');
      if (img) img.src = spriteActions[currentActionKey];
    }
  }
  updateSaveStatus('unsaved');
}

function updateDefaultThumb() {
  const thumb = document.getElementById('default-thumb');
  if (thumb) thumb.src = canvas.toDataURL('image/png');
}

function appendActionSlot(key, src) {
  const list = document.getElementById('actions-list');
  const slot = document.createElement('div');
  slot.className = 'action-slot';
  slot.dataset.actionKey = key;
  slot.innerHTML = `
    <img class="action-thumb" src="${src||''}" alt="${key}">
    <div class="action-info">
      <div class="action-name" contenteditable="true" spellcheck="false"
           onblur="renameAction(this, '${key}')"
           onclick="event.stopPropagation()">${key}</div>
      <div class="action-badge">Custom action</div>
    </div>
    <button class="action-del" onclick="deleteAction('${key}', event)">🗑</button>
  `;
  slot.onclick = () => selectActionSlot(key);
  list.appendChild(slot);
  return slot;
}

function addNewActionSlot() {
  // Save current first
  spriteActions[currentActionKey] = canvas.toDataURL('image/png');

  const name = 'Action ' + (Object.keys(spriteActions).length);
  spriteActions[name] = null; // blank canvas for this action

  appendActionSlot(name, '');
  selectActionSlot(name);

  // Clear canvas for new action
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveHistory();
  showToast('New action: ' + name + ' — draw it!');
  updateSaveStatus('unsaved');
}

function deleteAction(key, e) {
  e && e.stopPropagation();
  if (!confirm(`Delete action "${key}"?`)) return;
  delete spriteActions[key];
  const slot = document.querySelector(`.action-slot[data-action-key="${key}"]`);
  if (slot) slot.remove();
  if (currentActionKey === key) selectActionSlot('default');
  updateSaveStatus('unsaved');
}

function renameAction(el, oldKey) {
  const newKey = el.innerText.trim();
  if (!newKey || newKey === oldKey || spriteActions[newKey]) {
    el.innerText = oldKey; return;
  }
  spriteActions[newKey] = spriteActions[oldKey];
  delete spriteActions[oldKey];
  const slot = el.closest('.action-slot');
  if (slot) {
    slot.dataset.actionKey = newKey;
    const delBtn = slot.querySelector('.action-del');
    if (delBtn) delBtn.setAttribute('onclick', `deleteAction('${newKey}', event)`);
    const nameEl = slot.querySelector('.action-name');
    if (nameEl) nameEl.setAttribute('onblur', `renameAction(this, '${newKey}')`);
  }
  if (currentActionKey === oldKey) currentActionKey = newKey;
  updateSaveStatus('unsaved');
}

// ══════════════════════════════════════════════════════════════
// SAVE STATUS
// ══════════════════════════════════════════════════════════════
function updateSaveStatus(state) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + state;
  if (state === 'saving') el.innerHTML = '⟳ Saving…';
  else if (state === 'saved') el.innerHTML = '✓ Saved';
  else el.innerHTML = '● Unsaved';
}

// ══════════════════════════════════════════════════════════════
// PANEL TABS
// ══════════════════════════════════════════════════════════════
function switchPanelTab(tab) {
  ['actions','import'].forEach(t => {
    document.getElementById('ptab-' + t)?.classList.toggle('active', t === tab);
    document.getElementById('panel-' + t)?.style && (document.getElementById('panel-' + t).style.display = t === tab ? 'flex' : 'none');
  });
}

// ══════════════════════════════════════════════════════════════
// IMPORT
// ══════════════════════════════════════════════════════════════
function triggerFileImport() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadImageDataUrl(e.target.result);
  reader.readAsDataURL(file);
}

function handleImportDrop(e) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#333';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleImportFile(file);
}

function importFromUrl() {
  const url = document.getElementById('import-url-input').value.trim();
  if (!url) return;
  loadImageDataUrl(url);
}

function loadImageDataUrl(src, cb) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    saveHistory();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    updateCurrentActionThumb();
    if (cb) cb();
    showToast('Image loaded!');
  };
  img.onerror = () => showToast('⚠ Could not load image');
  img.src = src;
}

// ══════════════════════════════════════════════════════════════
// MOBILE ACTIONS MODAL
// ══════════════════════════════════════════════════════════════
function openMobileActions() {
  const list = document.getElementById('mob-actions-list');
  list.innerHTML = '';
  Object.entries(spriteActions).forEach(([key, src]) => {
    const item = document.createElement('div');
    item.className = 'action-slot' + (key === currentActionKey ? ' active-action' : '') + (key === 'default' ? ' default-slot' : '');
    item.style.marginBottom = '6px';
    item.innerHTML = `
      <img class="action-thumb" src="${src||''}" alt="${key}" style="width:40px;height:40px;">
      <div class="action-info">
        <div class="action-name">${key}</div>
        <div class="action-badge">${key === 'default' ? 'Main sprite' : 'Custom'}</div>
      </div>
    `;
    item.onclick = () => { selectActionSlot(key); closeMobileActions(); };
    list.appendChild(item);
  });
  document.getElementById('mob-actions-modal').classList.add('open');
}
function closeMobileActions() {
  document.getElementById('mob-actions-modal').classList.remove('open');
}

// ══════════════════════════════════════════════════════════════
// SAVE TO SUPABASE & RETURN
// ══════════════════════════════════════════════════════════════
async function saveCurrentActionAsNew() {
  spriteActions[currentActionKey] = canvas.toDataURL('image/png');
  addNewActionSlot();
}

async function saveAndReturn() {
  // Save current drawing to actions
  spriteActions[currentActionKey] = canvas.toDataURL('image/png');

  const spriteName = document.getElementById('sprite-name-input').value.trim() || 'My Sprite';
  const profile = JSON.parse(localStorage.getItem('user_profile') || '{}');
  const handle  = profile.handle;

  updateSaveStatus('saving');

  try {
    // Build actions object (excluding 'default' which is the main image_data)
    const actionsObj = {};
    Object.entries(spriteActions).forEach(([k, v]) => {
      if (k !== 'default' && v) actionsObj[k] = v;
    });

    const mainImageData = spriteActions.default || canvas.toDataURL('image/png');

    // Upload main image to Supabase Storage if we have a handle
    let imageUrl = mainImageData;
    if (handle) {
      try {
        const blob = await dataUrlToBlob(mainImageData);
        const path = `user/${handle}/sprites/sprite_${Date.now()}.png`;
        const { error: upErr } = await _supabase.storage
          .from('avatars')
          .upload(path, blob, { upsert: true, cacheControl: '3600' });
        if (!upErr) {
          imageUrl = _supabase.storage.from('avatars').getPublicUrl(path).data.publicUrl;
        }
      } catch(e) { /* fallback to base64 */ }
    }

    // Also upload action images
    const actionsUpload = {};
    for (const [k, v] of Object.entries(actionsObj)) {
      if (v && handle) {
        try {
          const blob = await dataUrlToBlob(v);
          const path = `user/${handle}/sprites/action_${Date.now()}_${k.replace(/\W/g,'_')}.png`;
          const { error } = await _supabase.storage.from('avatars').upload(path, blob, { upsert: true });
          if (!error) {
            actionsUpload[k] = _supabase.storage.from('avatars').getPublicUrl(path).data.publicUrl;
          } else {
            actionsUpload[k] = v; // fallback
          }
        } catch(e) { actionsUpload[k] = v; }
      } else {
        actionsUpload[k] = v;
      }
    }

    const payload = {
      owner_handle: handle || 'guest',
      name: spriteName,
      image_data: imageUrl,
      actions: actionsUpload,
      updated_at: new Date().toISOString()
    };

    let error;
    if (editingContext?.spriteId) {
      ({ error } = await _supabase
        .from('user_sprites')
        .update(payload)
        .eq('id', editingContext.spriteId));
    } else {
      ({ error } = await _supabase
        .from('user_sprites')
        .insert([payload]));
    }

    if (error) {
      console.warn('Supabase save error:', error);
      showToast('⚠ Save failed: ' + error.message);
      updateSaveStatus('unsaved');
    } else {
      updateSaveStatus('saved');
      // Save result to localStorage so creator can pick it up
      localStorage.setItem('sprite_editor_result', JSON.stringify({
        name: spriteName,
        image_data: imageUrl,
        actions: actionsUpload,
        timestamp: Date.now()
      }));
      // Invalidate creator sprite cache
      localStorage.removeItem('cc_user_sprites_meta_v1');
      showToast('✅ Saved! Returning…');
      setTimeout(goBackToCreator, 900);
    }
  } catch(err) {
    console.error('Save error:', err);
    showToast('⚠ Error saving');
    updateSaveStatus('unsaved');
  }
}

async function dataUrlToBlob(dataUrl) {
  const res = await fetch(dataUrl);
  return res.blob();
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════
function goBackToCreator() {
  // Auto-save current state to localStorage before leaving
  spriteActions[currentActionKey] = canvas.toDataURL('image/png');
  localStorage.setItem('sprite_editor_draft', JSON.stringify({
    name: document.getElementById('sprite-name-input').value.trim(),
    actions: spriteActions,
    timestamp: Date.now()
  }));

  const ctx_ = editingContext;
  if (ctx_?.returnPage) {
    location.href = ctx_.returnPage;
  } else {
    // Try to detect if we came from mobile or desktop
    history.back();
  }
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.innerText = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════════════
// RUN
// ══════════════════════════════════════════════════════════════
init();
</script>
