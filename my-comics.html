<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ComicCore — My Comics</title>
<link rel="stylesheet" href="theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
:root{
  --orange:#ff7a00;
  --orange-light:#ff9a3c;
  --orange-glow:rgba(255,122,0,0.22);
  --bg:#0f0f11;
  --bg2:#18181b;
  --card:#1e1e22;
  --card2:#26262c;
  --border:rgba(255,255,255,0.08);
  --text:#f4f4f6;
  --text-muted:#888896;
  --text-dim:#55555f;
  --teal:#00c9b1;
  --teal-glow:rgba(0,201,177,0.18);
  --accent:#ff7a00;
  --danger:#ff3b30;
  --green:#32d74b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;
  overflow-x:hidden;position:relative;
}
body::before{
  content:'';position:fixed;top:-100px;left:-80px;
  width:480px;height:480px;
  background:radial-gradient(circle,rgba(255,122,0,0.09) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-80px;right:-60px;
  width:380px;height:380px;
  background:radial-gradient(circle,rgba(0,201,177,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:100;height:54px;background:rgba(15,15,17,0.88);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;backdrop-filter:blur(20px);}
.topbar-title{font-size:15px;font-weight:900;letter-spacing:.5px;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--text-dim);font-weight:700;flex:1;}
.tb{background:var(--card2);border:1px solid var(--border);color:var(--text-muted);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;transition:.15s;white-space:nowrap;}
.tb:hover{background:#303038;color:var(--text);}
.tb.accent{border-color:rgba(255,122,0,0.4);color:var(--orange);}
.tb.accent:hover{background:rgba(255,122,0,0.1);color:var(--orange-light);}
.tb.teal{border-color:rgba(0,201,177,0.3);color:var(--teal);}
.tb.teal:hover{background:rgba(0,201,177,0.08);}

/* ── Tab switcher ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:rgba(15,15,17,0.7);position:sticky;top:54px;z-index:90;backdrop-filter:blur(8px);}
.tab{flex:1;padding:13px 8px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.5px;color:var(--text-dim);cursor:pointer;border:none;background:none;transition:.12s;text-transform:uppercase;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;}
.tab:hover{color:var(--text-muted);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab-count{background:var(--card2);color:var(--text-dim);border-radius:10px;padding:1px 6px;font-size:9px;margin-left:4px;font-weight:900;}
.tab.active .tab-count{background:rgba(255,122,0,0.15);color:var(--orange);}

.content{flex:1;padding:16px;max-width:680px;margin:0 auto;width:100%;position:relative;z-index:1;}

/* ── Toolbar row ── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-box{flex:1;min-width:140px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:9px;font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:.15s;}
.search-box:focus{border-color:rgba(255,122,0,0.5);box-shadow:0 0 0 3px rgba(255,122,0,0.08);}
.search-box::placeholder{color:var(--text-dim);}
select.tb{appearance:none;padding-right:10px;}

/* ── Comics grid ── */
.comics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}

/* ── Comic card ── */
.comic-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:.18s;position:relative;display:flex;flex-direction:column;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.comic-card:hover{background:var(--card2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
.comic-card.draft-card:hover{border-color:rgba(0,201,177,0.35);box-shadow:0 8px 24px var(--teal-glow);}
.comic-card.pub-card:hover{border-color:rgba(255,122,0,0.35);box-shadow:0 8px 24px var(--orange-glow);}
.comic-thumb{width:100%;aspect-ratio:.7;background:var(--bg2);position:relative;overflow:hidden;flex-shrink:0;}
.comic-thumb canvas{width:100%;height:100%;object-fit:cover;display:block;}
.comic-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.comic-thumb .thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,var(--card),var(--bg2));}
.comic-thumb .page-badge{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.85);color:var(--text-muted);font-size:8px;font-weight:900;padding:2px 6px;border-radius:6px;letter-spacing:.5px;}
.comic-thumb .status-badge{position:absolute;top:7px;left:7px;font-size:8px;font-weight:900;padding:2px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase;}
.badge-draft{background:rgba(0,201,177,0.15);color:var(--teal);border:1px solid rgba(0,201,177,0.25);}
.badge-pub{background:rgba(255,122,0,0.15);color:var(--orange);border:1px solid rgba(255,122,0,0.25);}
.comic-info{padding:9px 10px 10px;flex:1;display:flex;flex-direction:column;gap:3px;}
.comic-title{font-size:12px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.comic-meta{font-size:9px;color:var(--text-dim);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.comic-stars{font-size:10px;color:var(--text-muted);font-weight:700;display:flex;align-items:center;gap:3px;}
/* Quick actions on hover */
.card-actions{position:absolute;inset:0;background:rgba(0,0,0,.78);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;opacity:0;transition:.18s;backdrop-filter:blur(4px);}
.comic-card:hover .card-actions{opacity:1;}
.ca-btn{padding:8px 18px;border-radius:9px;font-size:11px;font-weight:900;cursor:pointer;border:none;transition:.12s;min-width:110px;text-align:center;letter-spacing:.3px;font-family:'Inter',sans-serif;}
.ca-btn:hover{filter:brightness(1.12);transform:translateY(-1px);}
.ca-open{background:var(--orange);color:#000;}
.ca-edit{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.ca-read{background:var(--teal);color:#000;}
.ca-del{background:transparent;color:var(--danger);border:1px solid rgba(255,59,48,.3);font-size:10px;padding:5px 14px;}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.empty-icon{font-size:52px;opacity:.25;}
.empty-title{font-size:15px;font-weight:900;color:var(--text-muted);}
.empty-sub{font-size:12px;color:var(--text-dim);line-height:1.6;max-width:260px;}
.empty .tb{margin-top:8px;padding:10px 22px;font-size:12px;}

/* ── Stats bar (published) ── */
.stats-bar{display:flex;gap:16px;align-items:center;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;}
.stat-item{display:flex;flex-direction:column;gap:1px;}
.stat-val{font-size:18px;font-weight:900;color:var(--text);line-height:1;}
.stat-lbl{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}

/* ── New comic modal ── */
.overlay{position:fixed;inset:0;background:rgba(10,10,12,0.88);z-index:5000;display:none;align-items:flex-end;justify-content:center;padding-bottom:0;backdrop-filter:blur(20px);}
.bottom-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--border);padding:24px 20px 36px;width:100%;max-width:500px;position:relative;}
.sheet-handle{width:36px;height:4px;background:var(--card2);border-radius:2px;margin:0 auto 20px;}
.sheet-title{font-size:16px;font-weight:900;margin-bottom:6px;letter-spacing:.5px;color:var(--text);}
.sheet-sub{font-size:12px;color:var(--text-muted);margin-bottom:20px;line-height:1.5;}
.ratio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.ratio-opt{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.ratio-opt:hover{border-color:rgba(255,255,255,0.15);background:var(--card2);}
.ratio-opt.sel{border-color:var(--orange);background:rgba(255,122,0,0.08);}
.ratio-preview{background:var(--card2);border-radius:4px;border:1px solid var(--border);}
.ratio-opt.sel .ratio-preview{border-color:rgba(255,122,0,0.3);}
.ratio-name{font-size:10px;font-weight:900;color:var(--text-muted);letter-spacing:.3px;}
.ratio-dims{font-size:8px;color:var(--text-dim);font-weight:700;}

/* ── Confirm delete sheet ── */
.del-sheet{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--border);padding:24px 20px 36px;width:100%;max-width:500px;}

/* ── Toast ── */
.toast-el{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:11px;font-weight:900;font-size:12px;z-index:9999;pointer-events:none;white-space:nowrap;transition:opacity .4s;}

/* ── Rename input ── */
.rename-input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;width:100%;margin-bottom:10px;transition:.15s;}
.rename-input:focus{border-color:rgba(255,122,0,0.5);box-shadow:0 0 0 3px rgba(255,122,0,0.08);}
</style>
</head>
<body>

<!-- New comic sheet -->
<div id="new-sheet" class="overlay" onclick="if(event.target===this)closeNew()">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📖 New Comic</div>
    <div class="sheet-sub">Pick the panel shape for your comic. This sets the canvas ratio and can't be changed after creation.</div>
    <div class="ratio-grid" id="ratio-grid"></div>
    <button class="tb accent" style="width:100%;padding:13px;font-size:13px;border-radius:11px;" onclick="startNewComic()">START CREATING →</button>
  </div>
</div>

<!-- Rename draft sheet -->
<div id="rename-sheet" class="overlay" onclick="if(event.target===this)closeRename()">
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">✏️ Rename Draft</div>
    <input class="rename-input" id="rename-inp" placeholder="Comic title...">
    <div style="display:flex;gap:8px;">
      <button class="tb" style="flex:1;padding:11px;" onclick="closeRename()">Cancel</button>
      <button class="tb accent" style="flex:1;padding:11px;" onclick="confirmRename()">Rename</button>
    </div>
  </div>
</div>

<!-- Delete confirm sheet -->
<div id="del-sheet" class="overlay" onclick="if(event.target===this)closeDel()">
  <div class="del-sheet">
    <div class="sheet-handle"></div>
    <div id="del-title" style="font-size:14px;font-weight:900;margin-bottom:6px;color:var(--danger)">🗑 Delete Comic?</div>
    <div id="del-sub" style="font-size:12px;color:var(--text-muted);margin-bottom:20px;line-height:1.5;"></div>
    <div style="display:flex;gap:8px;">
      <button class="tb" style="flex:1;padding:11px;" onclick="closeDel()">Cancel</button>
      <button class="tb" style="flex:1;padding:11px;border-color:var(--danger);color:var(--danger);" onclick="confirmDelete()">DELETE</button>
    </div>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <button class="tb" onclick="location.href='index.html'">← Home</button>
  <div>
    <div class="topbar-title">My Comics</div>
    <div class="topbar-sub" id="topbar-sub">Loading...</div>
  </div>
  <button class="tb accent" onclick="openNew()">+ New Comic</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-drafts" onclick="switchTab('drafts')">
    Drafts <span class="tab-count" id="drafts-count">0</span>
  </button>
  <button class="tab" id="tab-published" onclick="switchTab('published')">
    Published <span class="tab-count" id="pub-count">0</span>
  </button>
</div>

<!-- Content -->
<div class="content">
  <!-- Drafts toolbar -->
  <div class="toolbar" id="drafts-toolbar">
    <input class="search-box" id="draft-search" placeholder="🔍 Search drafts..." oninput="renderDrafts()">
    <select class="tb" id="draft-sort" onchange="renderDrafts()">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alpha">A→Z</option>
      <option value="pages">Most pages</option>
    </select>
    <button class="tb" onclick="location.href='offlines.html'" title="Manage storage & offline vault" id="vault-btn">🗄 Vault</button>
  </div>
  <!-- Storage mini-bar -->
  <div id="storage-mini" style="margin:0 16px 8px;display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-size:10px;font-weight:800;color:var(--text-dim);letter-spacing:.5px;">VAULT CAPACITY</span>
      <span style="font-size:10px;font-weight:900;color:var(--text-muted);" id="storage-mini-pct">0%</span>
    </div>
    <div style="width:100%;height:4px;background:var(--card2);border-radius:4px;overflow:hidden;">
      <div id="storage-mini-fill" style="height:100%;background:var(--teal);border-radius:4px;transition:.8s;"></div>
    </div>
    <div id="storage-mini-warn" style="display:none;margin-top:5px;font-size:10px;font-weight:800;color:var(--danger);">
      <img src="https://mmycqeejhguzhtzkyjaj.supabase.co/storage/v1/object/public/comiccore-assets/toast/storagefull.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;margin-right:5px;image-rendering:pixelated;"> Storage nearly full — <a href="offlines.html" style="color:var(--danger);">open vault to free space</a>
    </div>
  </div>

  <!-- Published toolbar -->
  <div class="toolbar" id="pub-toolbar" style="display:none;">
    <input class="search-box" id="pub-search" placeholder="🔍 Search published..." oninput="renderPublished()">
    <select class="tb" id="pub-sort" onchange="renderPublished()">
      <option value="newest">Newest</option>
      <option value="stars">Most Starred</option>
      <option value="alpha">A→Z</option>
    </select>
  </div>

  <!-- Drafts stats -->
  <div id="draft-stats" class="stats-bar" style="display:none;"></div>

  <!-- Published stats -->
  <div id="pub-stats" class="stats-bar" style="display:none;"></div>

  <!-- Grid container -->
  <div id="grid-container"></div>
</div>

<script>
const _sb = supabase.createClient('https://mmycqeejhguzhtzkyjaj.supabase.co','sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE', { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } });

// ── State ──────────────────────────────────────────────────
let currentTab = 'drafts';
let drafts = [];
let published = [];
let myHandle = null, myName = null;
let pendingDeleteId = null, pendingDeleteType = null;
let renameTargetId = null;
let selectedRatio = { w: 9, h: 13, label: 'Comic', dims: '9:13' };

const RATIOS = [
  { w:9,  h:13, label:'Comic',     dims:'9:13',   icon:{ w:38, h:54 } },
  { w:1,  h:1,  label:'Square',    dims:'1:1',    icon:{ w:46, h:46 } },
  { w:9,  h:16, label:'Vertical',  dims:'9:16',   icon:{ w:36, h:62 } },
  { w:16, h:9,  label:'Wide',      dims:'16:9',   icon:{ w:64, h:36 } },
  { w:4,  h:3,  label:'Classic',   dims:'4:3',    icon:{ w:54, h:40 } },
  { w:3,  h:4,  label:'Portrait',  dims:'3:4',    icon:{ w:42, h:56 } },
];

// ── Init ───────────────────────────────────────────────────
window.onload = async () => {
  const profile = JSON.parse(localStorage.getItem('user_profile') || '{}');
  myHandle = profile.handle || null;
  myName = profile.name || 'Creator';

  await loadDrafts();
  await loadPublished();
  renderStats();
  renderDrafts();
  buildRatioGrid();
};

// ── Load data ─────────────────────────────────────────────
async function loadDrafts() {
  // Load from Supabase if logged in
  if (myHandle) {
    try {
      const { data: sbDrafts } = await _sb.from('drafts')
        .select('id, title, data, canvas_ratio, updated_at, created_at')
        .eq('owner_handle', myHandle)
        .order('updated_at', { ascending: false });
      if (sbDrafts) {
        // Also merge any remaining localStorage drafts (offline/legacy)
        const lsDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
        // Normalize Supabase drafts to match localStorage shape
        const normalized = sbDrafts.map(d => ({
          id: d.id,
          title: d.title || 'Untitled',
          data: d.data,
          ratio: d.canvas_ratio || { w:1, h:1 },
          lastModified: d.updated_at ? new Date(d.updated_at).toLocaleString() : '',
          _source: 'supabase'
        }));
        // Merge: prefer Supabase, append localStorage-only drafts
        const sbIds = new Set(sbDrafts.map(d => String(d.id)));
        const lsOnly = lsDrafts.filter(d => !sbIds.has(String(d.id)));
        drafts = [...normalized, ...lsOnly];
        document.getElementById('drafts-count').innerText = drafts.length;
        return;
      }
    } catch(e) { console.warn('Could not load Supabase drafts', e); }
  }
  // Fallback: localStorage only
  drafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
  document.getElementById('drafts-count').innerText = drafts.length;
}

async function loadPublished() {
  if (!myHandle) { published = []; document.getElementById('pub-count').innerText = 0; return; }
  const { data, error } = await _sb.from('comics').select('id,title,description,cover,tags,stars,data,canvas_ratio,created_at,owner_handle').eq('owner_handle', myHandle).order('id', { ascending: false });
  published = data || [];
  document.getElementById('pub-count').innerText = published.length;
  document.getElementById('topbar-sub').innerText = `${drafts.length} draft${drafts.length!==1?'s':''} · ${published.length} published`;
  updateStorageMini();
}

// ── Stats ─────────────────────────────────────────────────
function renderStats() {
  // Draft stats
  const totalPages = drafts.reduce((a, d) => a + (d.data?.length || 0), 0);
  const draftEl = document.getElementById('draft-stats');
  if (drafts.length) {
    draftEl.style.display = 'flex';
    draftEl.innerHTML = [
      { v: drafts.length, l: 'Drafts' },
      { v: totalPages,    l: 'Total Pages' },
      { v: drafts.reduce((a,d) => Math.max(a, d.data?.length||0), 0), l: 'Longest' },
    ].map(s => `<div class="stat-item"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');
  } else { draftEl.style.display = 'none'; }

  // Published stats
  const totalStars = published.reduce((a, c) => a + (c.stars || 0), 0);
  const pubEl = document.getElementById('pub-stats');
  if (published.length) {
    pubEl.style.display = 'flex';
    pubEl.innerHTML = [
      { v: published.length, l: 'Published' },
      { v: totalStars, l: 'Total Stars' },
      { v: Math.max(...published.map(c => c.stars||0), 0), l: 'Top Stars' },
    ].map(s => `<div class="stat-item"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');
  } else { pubEl.style.display = 'none'; }
}

// ── Tab switching ─────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-drafts').classList.toggle('active', tab === 'drafts');
  document.getElementById('tab-published').classList.toggle('active', tab === 'published');
  document.getElementById('drafts-toolbar').style.display = tab === 'drafts' ? 'flex' : 'none';
  document.getElementById('pub-toolbar').style.display = tab === 'published' ? 'flex' : 'none';
  document.getElementById('draft-stats').style.display = (tab==='drafts'&&drafts.length) ? 'flex' : 'none';
  document.getElementById('pub-stats').style.display = (tab==='published'&&published.length) ? 'flex' : 'none';
  tab === 'drafts' ? renderDrafts() : renderPublished();
}

// ── Render drafts ─────────────────────────────────────────
function renderDrafts() {
  const q = document.getElementById('draft-search').value.toLowerCase();
  const sort = document.getElementById('draft-sort').value;
  let list = drafts.filter(d => !q || d.title?.toLowerCase().includes(q));

  if (sort === 'newest') list = [...list].reverse();
  else if (sort === 'oldest') {} // already chronological
  else if (sort === 'alpha') list = [...list].sort((a,b) => (a.title||'').localeCompare(b.title||''));
  else if (sort === 'pages') list = [...list].sort((a,b) => (b.data?.length||0) - (a.data?.length||0));

  const grid = document.getElementById('grid-container');
  if (!list.length) {
    grid.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = `
      <div class="empty-icon">✏️</div>
      <div class="empty-title">${q ? 'No drafts found' : 'No drafts yet'}</div>
      <div class="empty-sub">${q ? 'Try a different search.' : 'Start building your first comic. Saved drafts appear here so you can come back and finish anytime.'}</div>
      ${!q ? `<button class="tb accent" onclick="openNew()">+ Create Your First Comic</button>` : ''}
    `;
    grid.appendChild(empty);
    return;
  }

  grid.innerHTML = '';
  const dg = document.createElement('div');
  dg.className = 'comics-grid';
  list.forEach(d => dg.appendChild(makeDraftCard(d)));
  grid.appendChild(dg);
}

function makeDraftCard(d) {
  const card = document.createElement('div');
  card.className = 'comic-card draft-card';

  const pageCount = d.data?.length || 0;
  const firstFrame = d.data?.[0];
  const thumbHtml = makeDraftThumb(firstFrame, d.ratio);

  card.innerHTML = `
    <div class="comic-thumb">
      ${thumbHtml}
      <div class="status-badge badge-draft">Draft</div>
      <div class="page-badge">${pageCount} page${pageCount!==1?'s':''}</div>
    </div>
    <div class="comic-info">
      <div class="comic-title">${escHtml(d.title || 'Untitled')}</div>
      <div class="comic-meta">Edited ${d.lastModified || 'recently'}</div>
    </div>
    <div class="card-actions">
      <button class="ca-btn ca-open" onclick="event.stopPropagation();resumeDraft(${d.id})">✏️ Resume</button>
      <button class="ca-btn ca-edit" onclick="event.stopPropagation();openRename(${d.id},'${escAttr(d.title||'Untitled')}')">Rename</button>
      <button class="ca-btn ca-del" onclick="event.stopPropagation();askDelete(${d.id},'draft','${escAttr(d.title||'Untitled')}')">Delete Draft</button>
    </div>
  `;
  card.onclick = () => resumeDraft(d.id);
  return card;
}

function makeDraftThumb(frame, ratio) {
  if (!frame) return `<div class="thumb-placeholder">📄</div>`;
  const bg = frame.background || '#fff';
  const hasImage = frame.layers?.some(l => l.type === 'img' && l.src);
  if (hasImage) {
    const imgLayer = frame.layers.find(l => l.type === 'img' && l.src);
    return `<img src="${imgLayer.src}" style="object-fit:cover;" onerror="this.parentNode.innerHTML='<div class=\\'thumb-placeholder\\'>📄</div>'">`;
  }
  const isGradient = typeof bg === 'string' && bg.includes('gradient');
  const isUrl = typeof bg === 'string' && (bg.startsWith('http') || bg.startsWith('data:'));
  let bgCss;
  if (isUrl) bgCss = `background:url('${bg}') center/cover`;
  else if (isGradient) bgCss = `background:${bg}`;
  else bgCss = `background:${bg}`;
  const textLayers = frame.layers?.filter(l => ['text','bubble','thinking','subtitle'].includes(l.type)) || [];
  const textPreview = textLayers.length ? `<div style="position:absolute;bottom:6px;left:6px;right:6px;font-size:7px;font-weight:700;color:rgba(0,0,0,.7);background:rgba(255,255,255,.8);padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(textLayers[0].content?.slice(0,30)||'')}</div>` : '';
  return `<div style="width:100%;height:100%;${bgCss};">${textPreview}</div>`;
}

// ── Render published ──────────────────────────────────────
function renderPublished() {
  const q = document.getElementById('pub-search').value.toLowerCase();
  const sort = document.getElementById('pub-sort').value;
  let list = published.filter(c => !q || c.title?.toLowerCase().includes(q) || c.description?.toLowerCase().includes(q));

  if (sort === 'newest') {} // already sorted desc
  else if (sort === 'stars') list = [...list].sort((a,b) => (b.stars||0) - (a.stars||0));
  else if (sort === 'alpha') list = [...list].sort((a,b) => (a.title||'').localeCompare(b.title||''));

  const grid = document.getElementById('grid-container');
  if (!list.length) {
    grid.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = `
      <div class="empty-icon">🌍</div>
      <div class="empty-title">${q ? 'No matches' : 'Nothing published yet'}</div>
      <div class="empty-sub">${q ? 'Try different search terms.' : 'When you publish a comic from the editor it appears here. Your fans can discover and star your work.'}</div>
      ${!q ? `<button class="tb accent" onclick="openNew()">Create & Publish</button>` : ''}
    `;
    grid.appendChild(empty);
    return;
  }

  grid.innerHTML = '';
  const dg = document.createElement('div');
  dg.className = 'comics-grid';
  list.forEach(c => dg.appendChild(makePublishedCard(c)));
  grid.appendChild(dg);
}

function makePublishedCard(c) {
  const card = document.createElement('div');
  card.className = 'comic-card pub-card';
  const pageCount = c.data?.length || 0;
  const stars = c.stars || 0;
  const thumbHtml = c.cover
    ? `<img src="${c.cover}" onerror="this.src='';this.parentNode.innerHTML='<div class=\\'thumb-placeholder\\'>📖</div>'">`
    : `<div class="thumb-placeholder">📖</div>`;

  card.innerHTML = `
    <div class="comic-thumb">
      ${thumbHtml}
      <div class="status-badge badge-pub">Live</div>
      <div class="page-badge">${pageCount}p</div>
    </div>
    <div class="comic-info">
      <div class="comic-title">${escHtml(c.title || 'Untitled')}</div>
      <div class="comic-stars">⭐ ${stars} star${stars!==1?'s':''}</div>
      ${c.description ? `<div class="comic-meta">${escHtml(c.description.slice(0,50))}${c.description.length>50?'…':''}</div>` : ''}
    </div>
    <div class="card-actions">
      <button class="ca-btn ca-read" onclick="event.stopPropagation();readComic('${c.id}')">📖 Read</button>
      <button class="ca-btn ca-edit" onclick="event.stopPropagation();editPublished('${c.id}')">✏️ Edit</button>
      <button class="ca-btn ca-del" onclick="event.stopPropagation();askDelete('${c.id}','published','${escAttr(c.title||'Untitled')}')">Delete</button>
    </div>
  `;
  card.onclick = () => readComic(c.id);
  return card;
}

// ── Actions ───────────────────────────────────────────────
function resumeDraft(id) {
  localStorage.removeItem('edit_comic_id');
  localStorage.setItem('active_draft_id', id);
  location.href = 'create.html';
}

function editPublished(id) {
  localStorage.removeItem('active_draft_id');
  localStorage.setItem('edit_comic_id', id);
  location.href = 'create.html';
}

function readComic(id) {
  location.href = `reader.html?id=${id}`;
}

// ── Delete flow ───────────────────────────────────────────
function askDelete(id, type, title) {
  pendingDeleteId = id;
  pendingDeleteType = type;
  document.getElementById('del-sub').innerText = `"${title}" will be permanently deleted${type==='published'?' and removed from the discover feed':' from your device'}. This can't be undone.`;
  document.getElementById('del-sheet').style.display = 'flex';
}
function closeDel() { document.getElementById('del-sheet').style.display = 'none'; pendingDeleteId = null; }
async function confirmDelete() {
  // Capture before closeDel() nulls them
  const deleteId = pendingDeleteId;
  const deleteType = pendingDeleteType;
  closeDel();
  if (deleteType === 'draft') {
    const draftToDelete = drafts.find(d => String(d.id) === String(deleteId));
    if (draftToDelete?._source === 'supabase' || String(deleteId).includes('-')) {
      await _sb.from('drafts').delete().eq('id', deleteId);
    } else {
      const lsDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
      localStorage.setItem('comic_drafts', JSON.stringify(lsDrafts.filter(d => String(d.id) !== String(deleteId))));
      if (localStorage.getItem('active_draft_id') == deleteId) localStorage.removeItem('active_draft_id');
    }
    drafts = drafts.filter(d => String(d.id) !== String(deleteId));
    document.getElementById('drafts-count').innerText = drafts.length;
    renderStats(); renderDrafts();
    toast('🗑 Draft deleted');
  } else {
    const { error } = await _sb.from('comics').delete().eq('id', deleteId);
    if (error) { toast('⚠ Could not delete: ' + error.message, 'var(--danger)'); return; }
    published = published.filter(c => String(c.id) !== String(deleteId));
    document.getElementById('pub-count').innerText = published.length;
    renderStats(); renderPublished();
    toast('🗑 Comic unpublished & deleted');
  }
}

// ── Rename flow ───────────────────────────────────────────
function openRename(id, currentTitle) {
  renameTargetId = id;
  document.getElementById('rename-inp').value = currentTitle;
  document.getElementById('rename-sheet').style.display = 'flex';
  setTimeout(() => document.getElementById('rename-inp').focus(), 100);
}
function closeRename() { document.getElementById('rename-sheet').style.display = 'none'; }
async function confirmRename() {
  const newTitle = document.getElementById('rename-inp').value.trim();
  if (!newTitle) return;
  closeRename();
  const idx = drafts.findIndex(d => d.id == renameTargetId);
  if (idx >= 0) {
    drafts[idx].title = newTitle;
    if (drafts[idx]._source === 'supabase' || String(renameTargetId).includes('-')) {
      await _sb.from('drafts').update({ title: newTitle }).eq('id', renameTargetId);
    } else {
      const lsDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
      const lsIdx = lsDrafts.findIndex(d => d.id == renameTargetId);
      if (lsIdx >= 0) { lsDrafts[lsIdx].title = newTitle; localStorage.setItem('comic_drafts', JSON.stringify(lsDrafts)); }
    }
    renderDrafts();
    toast('✅ Renamed!');
  }
}

// ── New comic flow ─────────────────────────────────────────
function updateStorageMini() {
  try {
    const LIMIT = 5242880;
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      total += ((localStorage.getItem(localStorage.key(i)) || '').length * 2);
    }
    const pct = Math.min(Math.round((total / LIMIT) * 100), 100);
    const mini = document.getElementById('storage-mini');
    const fill = document.getElementById('storage-mini-fill');
    const pctEl = document.getElementById('storage-mini-pct');
    const warn = document.getElementById('storage-mini-warn');
    if (!mini) return;
    mini.style.display = 'block';
    fill.style.width = pct + '%';
    fill.style.background = pct > 80 ? 'var(--danger)' : pct > 60 ? '#ff9800' : 'var(--teal)';
    pctEl.innerText = pct + '%';
    pctEl.style.color = pct > 80 ? 'var(--danger)' : pct > 60 ? '#ff9800' : 'var(--text-muted)';
    warn.style.display = pct > 80 ? 'block' : 'none';
  } catch(e) {}
}

function openNew() {
  document.getElementById('new-sheet').style.display = 'flex';
}
function closeNew() { document.getElementById('new-sheet').style.display = 'none'; }

function buildRatioGrid() {
  const grid = document.getElementById('ratio-grid');
  grid.innerHTML = '';
  RATIOS.forEach((r, i) => {
    const opt = document.createElement('div');
    opt.className = 'ratio-opt' + (i === 0 ? ' sel' : '');
    opt.innerHTML = `
      <div class="ratio-preview" style="width:${r.icon.w}px;height:${r.icon.h}px;"></div>
      <div class="ratio-name">${r.label}</div>
      <div class="ratio-dims">${r.dims}</div>
    `;
    opt.onclick = () => {
      document.querySelectorAll('.ratio-opt').forEach(o => o.classList.remove('sel'));
      opt.classList.add('sel');
      selectedRatio = r;
    };
    grid.appendChild(opt);
  });
  selectedRatio = RATIOS[0];
}

function startNewComic() {
  closeNew();
  localStorage.removeItem('active_draft_id');
  localStorage.removeItem('edit_comic_id');
  localStorage.removeItem('cc-pending-frames');
  localStorage.setItem('cc-new-comic-ratio', JSON.stringify({ w: selectedRatio.w, h: selectedRatio.h }));
  location.href = 'create.html';
}

// ── Helpers ───────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function toast(msg, col = 'var(--green)') {
  const t = document.createElement('div');
  t.className = 'toast-el';
  t.style.background = col; t.style.color = '#000';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; }, 2000);
  setTimeout(() => t.remove(), 2500);
}
</script>
