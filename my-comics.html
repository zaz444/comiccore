<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ComicCore — My Comics</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/regular/straight.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
:root{
  --orange:#ff7a00;
  --orange-light:#ff9a3c;
  --orange-glow:rgba(255,122,0,0.22);
  --bg:#0f0f11;
  --bg2:#18181b;
  --card:#1e1e22;
  --card2:#26262c;
  --border:rgba(255,255,255,0.08);
  --text:#f4f4f6;
  --text-muted:#888896;
  --text-dim:#55555f;
  --teal:#00c9b1;
  --teal-glow:rgba(0,201,177,0.18);
  --accent:#ff7a00;
  --danger:#ff3b30;
  --green:#32d74b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-100px;left:-80px;width:480px;height:480px;background:radial-gradient(circle,rgba(255,122,0,0.09) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-80px;right:-60px;width:380px;height:380px;background:radial-gradient(circle,rgba(0,201,177,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:100;height:56px;background:rgba(15,15,17,0.88);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;backdrop-filter:blur(20px);}
.back-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:16px;cursor:pointer;flex-shrink:0;text-decoration:none;transition:.15s;}
.back-btn:hover{background:#303038;color:var(--text);}
.topbar-center{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.topbar-title{font-size:15px;font-weight:900;letter-spacing:.3px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-sub{font-size:10px;color:var(--text-dim);font-weight:700;}
.new-btn{height:36px;padding:0 14px;background:var(--orange);color:#000;border:none;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap;letter-spacing:.3px;transition:.15s;}
.new-btn:hover{background:var(--orange-light);}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(15,15,17,0.85);position:sticky;top:56px;z-index:90;backdrop-filter:blur(8px);}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.8px;color:var(--text-dim);cursor:pointer;border:none;background:none;text-transform:uppercase;border-bottom:2.5px solid transparent;transition:.12s;font-family:'Inter',sans-serif;}
.tab:hover{color:var(--text-muted);}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:var(--card2);color:var(--text-dim);border-radius:10px;padding:1px 7px;font-size:9px;margin-left:5px;font-weight:900;min-width:18px;}
.tab.active .tab-count{background:rgba(255,122,0,.18);color:var(--orange);}

/* ── Content ── */
.content{flex:1;padding:14px 14px 0;position:relative;z-index:1;}

/* ── Search + sort bar ── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.search-box{flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--text);padding:10px 14px;border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:.15s;}
.search-box:focus{border-color:rgba(255,122,0,0.5);box-shadow:0 0 0 3px rgba(255,122,0,0.08);}
.search-box::placeholder{color:var(--text-dim);}
.sort-select{appearance:none;background:var(--card2);border:1px solid var(--border);color:var(--text-muted);padding:10px 12px;border-radius:12px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;outline:none;cursor:pointer;}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:20px;padding:10px 2px 14px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-val{font-size:22px;font-weight:900;line-height:1;color:var(--text);}
.stat-lbl{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}

/* ── Comics grid (2-col, matches Discover card style) ── */
.comics-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

/* ── Comic card (mirrors discover .comic-card) ── */
.comic-card{cursor:pointer;transition:transform .2s,border-color .18s,box-shadow .18s;position:relative;background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.3);display:flex;flex-direction:column;}
.comic-card:hover{transform:translateY(-3px);border-color:rgba(255,215,0,0.35);box-shadow:0 8px 28px rgba(255,215,0,0.1);background:var(--card2);}
.comic-card:active{transform:scale(.97);}

/* Cover image area — square 1:1, matches discover's grid card size */
.comic-card-cover{width:100%;aspect-ratio:1/1;overflow:hidden;background:#111;position:relative;}
.comic-card-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.comic-card-cover .no-cover{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,#0f0f11,#1a1a2e);}

/* Cloud-saved indicator, sits under the card title (not on the cover) */
.comic-card-cloud{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:800;color:#00d2ff;margin:1px 0 2px;}
.comic-card-cloud i{font-size:10px;line-height:1;}

/* Status pill on cover top-left */
.cover-status-pill{position:absolute;top:6px;left:6px;font-size:8px;font-weight:900;padding:2px 7px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase;}
.cover-status-draft{background:rgba(0,201,177,0.85);color:#000;}
.cover-status-pub{background:rgba(255,122,0,0.9);color:#000;}

/* Card info footer */
.comic-card-info{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column;gap:2px;}
.comic-card-title{font-size:12px;font-weight:800;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;line-height:1.28;min-height:2.56em;}
.comic-card-sub{font-size:10px;color:var(--text-dim);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Popup (exact discover.html style) ── */
.popup-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;}
.popup-overlay.open{display:flex;}
.popup-sheet{background:#141416;border-radius:20px 20px 0 0;border-top:1px solid #222;width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;position:relative;animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
.popup-sheet::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.popup-cover{width:100%;aspect-ratio:1.6;object-fit:cover;display:block;background:#0a0a0a;border-radius:20px 20px 0 0;}
.popup-cover-placeholder{width:100%;aspect-ratio:1.6;background:linear-gradient(135deg,#111,#1a1a2e);display:flex;align-items:center;justify-content:center;font-size:52px;border-radius:20px 20px 0 0;}
.popup-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.7);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);z-index:2;}
.popup-body{padding:16px 18px 28px;}
.popup-title{font-size:20px;font-weight:900;margin:0 0 4px;letter-spacing:-.3px;color:#f5f5f7;}
.popup-creator{font-size:12px;color:#555;margin-bottom:12px;font-weight:700;}
.popup-meta-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.popup-meta-chip{background:#1e1e20;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:#888;}
.popup-meta-chip.teal{color:var(--teal);background:rgba(0,201,177,0.12);border:1px solid rgba(0,201,177,0.2);}
.popup-meta-chip.orange{color:var(--orange);background:rgba(255,122,0,0.12);border:1px solid rgba(255,122,0,0.2);}
.popup-meta-chip.blue{color:#00d2ff;background:rgba(0,210,255,0.12);border:1px solid rgba(0,210,255,0.2);display:flex;align-items:center;gap:5px;}
.popup-desc{font-size:13px;line-height:1.6;color:#aaa;margin-bottom:14px;}
.popup-btns{display:flex;gap:8px;flex-wrap:wrap;}
.read-btn{flex:1;background:white;color:#000;border:none;padding:13px;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer;transition:.15s;letter-spacing:.3px;min-width:120px;font-family:'Inter',sans-serif;}
.read-btn:hover{background:#e8e8e8;}
.popup-edit-btn{background:#1e1e20;border:1.5px solid #00d2ff;color:#00d2ff;padding:13px 16px;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:.15s;}
.popup-edit-btn:hover{background:rgba(0,210,255,0.08);}
.popup-rename-btn{background:#1e1e20;border:1.5px solid #2a2a2c;color:#888;padding:13px 16px;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:.15s;}
.popup-rename-btn:hover{background:#2a2a2c;}
.popup-delete-btn{background:#1e1e20;border:1.5px solid var(--danger);color:var(--danger);padding:13px 16px;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;transition:.15s;}
.popup-delete-btn:hover{background:rgba(255,59,48,0.1);}

/* ── Empty state ── */
.empty{text-align:center;padding:64px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.empty-icon{font-size:56px;opacity:.25;}
.empty-title{font-size:16px;font-weight:900;color:var(--text-muted);}
.empty-sub{font-size:13px;color:var(--text-dim);line-height:1.6;max-width:260px;}
.empty-cta{margin-top:4px;padding:13px 28px;background:var(--orange);color:#000;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.3px;}



/* ── Bottom Sheet Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(10,10,12,0.88);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(20px);}
.overlay.open{display:flex;}
.sheet{background:var(--bg2);border-radius:22px 22px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:500px;padding:0 0 max(env(safe-area-inset-bottom),20px);}
.sheet-handle{width:38px;height:4px;background:var(--card2);border-radius:2px;margin:14px auto 4px;}
.sheet-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.sheet-header-title{font-size:14px;font-weight:900;color:var(--text);letter-spacing:.3px;}
.sheet-header-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}

/* Sheet action rows */
.sheet-action{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:.12s;border-bottom:1px solid var(--border);}
.sheet-action:last-child{border-bottom:none;}
.sheet-action:active{background:var(--card2);}
.sheet-action-icon{font-size:20px;width:36px;text-align:center;flex-shrink:0;}
.sheet-action-label{font-size:14px;font-weight:700;flex:1;color:var(--text);}
.sheet-action-label.danger{color:var(--danger);}
.sheet-action-label.accent{color:var(--orange);}
.sheet-action-label.teal{color:var(--teal);}

/* ── New comic sheet ── */
.ratio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 20px 20px;}
.ratio-opt{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.ratio-opt:active{background:var(--card2);}
.ratio-opt.sel{border-color:var(--orange);background:rgba(255,122,0,0.08);}
.ratio-preview{background:var(--card2);border-radius:4px;border:1px solid var(--border);}
.ratio-opt.sel .ratio-preview{border-color:rgba(255,122,0,0.3);}
.ratio-name{font-size:10px;font-weight:900;color:var(--text-muted);letter-spacing:.3px;}
.ratio-dims{font-size:8px;color:var(--text-dim);font-weight:700;}
.sheet-cta{margin:0 20px 4px;padding:15px;background:var(--orange);color:#000;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;width:calc(100% - 40px);font-family:'Inter',sans-serif;letter-spacing:.3px;}

/* ── Rename input ── */
.rename-wrap{padding:14px 20px 20px;}
.rename-input{background:var(--card);border:1.5px solid var(--border);color:var(--text);padding:13px 14px;border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;outline:none;width:100%;margin-bottom:12px;transition:.15s;}
.rename-input:focus{border-color:rgba(255,122,0,0.5);box-shadow:0 0 0 3px rgba(255,122,0,0.08);}
.rename-row{display:flex;gap:10px;}
.rename-cancel{flex:1;padding:13px;background:var(--card2);border:1px solid var(--border);color:var(--text-muted);border-radius:12px;font-weight:900;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
.rename-ok{flex:1;padding:13px;background:var(--orange);border:none;color:#000;border-radius:12px;font-weight:900;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── Delete confirm sheet ── */
.del-wrap{padding:14px 20px 20px;}
.del-title{font-size:15px;font-weight:900;color:var(--danger);margin-bottom:6px;}
.del-sub{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:20px;}
.del-confirm{width:100%;padding:15px;background:var(--danger);color:white;border:none;border-radius:14px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:10px;}
.del-cancel{width:100%;padding:14px;background:var(--card2);border:1px solid var(--border);color:var(--text-muted);border-radius:14px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;}

/* ── Toast ── */
.toast-el{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:14px;font-weight:900;font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap;transition:opacity .4s;}

/* ── Draft select mode ── */
.select-dot-draft{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid var(--text-dim);display:none;align-items:center;justify-content:center;color:transparent;font-size:12px;z-index:2;}
.comic-card.select-mode .select-dot-draft{display:flex;}
.comic-card.selected .select-dot-draft{background:var(--teal);border-color:var(--teal);color:#000;}
.comic-card.select-mode{cursor:default;}
.comic-card.selected{border-color:var(--teal);background:rgba(0,201,177,0.08);}

/* ── Draft select bar (bottom) ── */
.draft-select-bar{position:fixed;left:0;right:0;bottom:-100px;z-index:300;background:#161618;border-top:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;transition:bottom .25s ease;max-width:100%;}
.draft-select-bar.open{bottom:0;}
.draft-select-bar .dsel-count{font-size:12px;font-weight:800;color:var(--text-muted);flex-shrink:0;}
.draft-select-bar .dsel-spacer{flex:1;}
.dsel-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.dsel-btn.danger{color:var(--danger);border-color:rgba(255,59,48,0.35);background:rgba(255,59,48,0.08);}

/* ── Select toggle btn in topbar ── */
.select-toggle-btn{height:36px;padding:0 14px;background:var(--card2);border:1px solid var(--border);color:var(--text-muted);border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:.15s;display:none;}
.select-toggle-btn.visible{display:block;}
.select-toggle-btn.active{background:var(--orange);color:#000;border-color:var(--orange);}
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7a00">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="dexie.min.js"></script>
  <script src="idb.js"></script>
  <script src="install-prompt.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a href="index.html" class="back-btn">←</a>
  <div class="topbar-center">
    <div class="topbar-title">My Comics</div>
    <div class="topbar-sub" id="topbar-sub">Loading…</div>
  </div>
  <button class="select-toggle-btn" id="select-toggle-btn" onclick="toggleDraftSelectMode()">Select</button>
  <button class="new-btn" onclick="openNewSheet()">+ New</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-drafts" onclick="switchTab('drafts')">
    Drafts <span class="tab-count" id="drafts-count">0</span>
  </button>
  <button class="tab" id="tab-published" onclick="switchTab('published')">
    Published <span class="tab-count" id="pub-count">0</span>
  </button>
  <button class="tab" id="tab-collab" onclick="switchTab('collab')">
    <svg width="13" height="13" viewBox="0 0 26 26" style="display:inline-block;vertical-align:-2px;margin-right:2px;"><rect x="0.5" y="0.5" width="25" height="25" rx="7" fill="#ff7a00"/><text x="13" y="17.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" fill="#000">Co</text></svg> Collab <span class="tab-count" id="collab-count" style="display:none;"></span>
  </button>
</div>

<!-- Content -->
<div class="content">
  <!-- Drafts toolbar -->
  <div class="toolbar" id="drafts-toolbar">
    <input class="search-box" id="draft-search" placeholder="Search drafts…" oninput="renderDrafts()">
    <select class="sort-select" id="draft-sort" onchange="renderDrafts()">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="alpha">A→Z</option>
      <option value="pages">Pages</option>
    </select>
  </div>

  <!-- Published toolbar -->
  <div class="toolbar" id="pub-toolbar" style="display:none;">
    <input class="search-box" id="pub-search" placeholder="Search published…" oninput="renderPublished()">
    <select class="sort-select" id="pub-sort" onchange="renderPublished()">
      <option value="newest">Newest</option>
      <option value="stars">⭐ Stars</option>
      <option value="alpha">A→Z</option>
    </select>
  </div>

  <!-- Stats bars -->
  <div id="draft-stats" class="stats-bar" style="display:none;"></div>
  <div id="pub-stats" class="stats-bar" style="display:none;"></div>

  <!-- List container -->
  <div id="list-container"></div>

  <!-- Collab container -->
  <div id="collab-container" style="display:none; padding: 12px;"></div>
</div>

<!-- Bottom Nav -->

<!-- ── Draft Select Bar ── -->
<div class="draft-select-bar" id="draft-select-bar">
  <div class="dsel-count" id="draft-select-count">0 selected</div>
  <div class="dsel-spacer"></div>
  <button class="dsel-btn" onclick="selectAllDrafts()">Select All</button>
  <button class="dsel-btn danger" onclick="bulkDeleteDrafts()">🗑 Delete</button>
</div>

<!-- ── Detail Popup (same structure as discover.html) ── -->
<div class="popup-overlay" id="popup-overlay" onclick="if(event.target===this)closePopup()">
  <div class="popup-sheet" id="popup-sheet">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div id="popup-cover-wrap"></div>
    <div class="popup-body">
      <div class="popup-title"    id="popup-title"></div>
      <div class="popup-creator"  id="popup-creator"></div>
      <div class="popup-meta-row" id="popup-meta"></div>
      <div class="popup-desc"     id="popup-desc" style="display:none;"></div>
      <div class="popup-btns"     id="popup-btns"></div>
    </div>
  </div>
</div>

<!-- ── Action Sheet (draft) ── -->
<div id="action-sheet" class="overlay" onclick="if(event.target===this)closeActionSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-header-title" id="action-sheet-title">Comic</div>
      <div class="sheet-header-sub" id="action-sheet-sub"></div>
    </div>

<script>
const _sb = supabase.createClient('https://mmycqeejhguzhtzkyjaj.supabase.co','sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE', { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } });

// Same trash icon discover.html uses for delete actions — keeps iconography consistent, no emoji.

// ── Draft Save/Load helpers (SQL-first, Storage bucket fallback) ──────────────
const DRAFT_BUCKET  = 'comiccore-assets';
const DRAFT_PREFIX  = 'drafts/';
const INLINE_LIMIT  = 900_000;

async function saveDraft(draftId, title, framesData, canvasRatio) {
  if (!myHandle) throw new Error('Not logged in');
  const payload = JSON.stringify(framesData);
  let rowData;
  if (payload.length > INLINE_LIMIT) {
    const path = `${DRAFT_PREFIX}${draftId}.json`;
    const { error: upErr } = await _sb.storage
      .from(DRAFT_BUCKET)
      .upload(path, new Blob([payload], { type: 'application/json' }), { upsert: true });
    if (upErr) throw upErr;
    rowData = { storage_path: path };
  } else {
    rowData = { data: framesData, storage_path: null };
  }
  const row = {
    id: draftId, owner_handle: myHandle, title,
    canvas_ratio: canvasRatio,
    updated_at: new Date().toISOString(),
    ...rowData
  };
  const { error } = await _sb.from('drafts').upsert(row, { onConflict: 'id' });
  if (error) throw error;
  return draftId;
}

async function loadDraftData(d) {
  if (d.storage_path) {
    const { data, error } = await _sb.storage.from(DRAFT_BUCKET).download(d.storage_path);
    if (error) throw error;
    return JSON.parse(await data.text());
  }
  return d.data;
}

// ── State ──────────────────────────────────────────────────
let currentTab = 'drafts';

let startFromCollabTab = false;

// Draft select mode

// "Co" badge — same rounded-square style as Discover's orange "E" episode badge,

const CO_BADGE_XS = '<svg width="12" height="12" viewBox="0 0 26 26" style="display:inline-block;vertical-align:-2px;"><rect x="0.5" y="0.5" width="25" height="25" rx="7" fill="#ff7a00"/><text x="13" y="17.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" fill="#000">Co</text></svg>';

// ── Load data ─────────────────────────────────────────────
async function loadDrafts() {
  // Load ONLY from Supabase (no localStorage fallback)
  if (!myHandle) {
    drafts = [];
    document.getElementById('drafts-count').innerText = 0;
    return;
  }

  try {
    const { data: sbDrafts, error } = await _sb.from('drafts')
      .select('id, title, data, storage_path, canvas_ratio, owner_handles, updated_at, created_at')
      .contains('owner_handles', [myHandle])
      .order('updated_at', { ascending: false });
    
    if (error) throw error;

    if (window.CCOffline) CCOffline.cacheMyDrafts(myHandle, sbDrafts || []);

    drafts = (sbDrafts || []).map(d => ({
      id: d.id, title: d.title || 'Untitled', data: d.data,
      storage_path: d.storage_path || null,
      ratio: d.canvas_ratio || { w:1, h:1 },
      ownerHandles: d.owner_handles || [],
      lastModified: d.updated_at ? new Date(d.updated_at).toLocaleString() : '',
      _source: 'supabase'
    }));
    document.getElementById('drafts-count').innerText = drafts.length;
  } catch(e) {
    console.error('Failed to load drafts:', e);

    // OFFLINE FALLBACK — show whatever drafts were cached locally last time
    const cached = window.CCOffline ? await CCOffline.getCachedMyDrafts(myHandle) : [];
    if (cached.length) {
      drafts = cached.map(d => ({
        id: d.id, title: d.title || 'Untitled', data: d.data,
        storage_path: d.storage_path || null,
        ratio: d.canvas_ratio || { w:1, h:1 },
        lastModified: d.updated_at ? new Date(d.updated_at).toLocaleString() : '',
        _source: 'cache'
      }));
      document.getElementById('drafts-count').innerText = drafts.length;
      return;
    }

    drafts = [];
    document.getElementById('drafts-count').innerText = 0;
  }
}

async function loadPublished() {
  if (!myHandle) { published = []; document.getElementById('pub-count').innerText = 0; return; }

  let data, error;
  try {
    ({ data, error } = await _sb.from('comics')
      .select('id,title,description,cover,tags,stars,data,storage_path,canvas_ratio,created_at,owner_handle,owner_handles')
      .contains('owner_handles', [myHandle])
      .order('id', { ascending: false }));
  } catch (e) {
    error = e;
  }

  if (error) {
    console.error('Failed to load published:', error);
    published = window.CCOffline ? await CCOffline.getCachedMyComics(myHandle) : [];
  } else {
    published = data || [];

function renderCollab() {

  const collabComics = published.filter(c => Array.isArray(c.owner_handles) && c.owner_handles.length > 1);

  let html = `

  if (collabDrafts.length || collabComics.length) {
    html += `<div style="font-size:10px;font-weight:900;color:#666;text-transform:uppercase;letter-spacing:.8px;margin:${pendingInvites.length?'18px':'0'} 0 10px;">Your Collab Comics</div>`;

  } else if (!pendingInvites.length) {
    html += `
      <div style="text-align:center;padding:40px 20px;">
        <div style="margin-bottom:14px;display:flex;justify-content:center;">${CO_BADGE_LG}</div>
        <div style="font-size:16px;font-weight:800;color:#f5f5f7;margin-bottom:6px;">No collab comics yet</div>
        <div style="font-size:12px;color:#444;font-weight:700;max-width:240px;margin:0 auto;">Start one above, or accept an invite from a squad member to co-create.</div>

  }

  if (historyInvites.length) {
    html += `<div style="font-size:10px;font-weight:900;color:#666;text-transform:uppercase;letter-spacing:.8px;margin:18px 0 8px;">Past Invites</div>`;
    html += historyInvites.map(renderInviteCard).join('');

  el.innerHTML = html;

  if (collabDrafts.length || collabComics.length) {

}

function renderInviteCard(inv) {
  const statusColor = { accepted: '#32d74b', declined: '#555', pending: '#ff7a00' };
  const statusLabel = {
    accepted: '<i class="fi fi-rs-check"></i> Accepted',
    declined: '<i class="fi fi-rs-ban"></i> Declined',

  const draftTag = inv.is_draft ? ' <span style="font-size:9px;font-weight:900;color:var(--teal);background:rgba(0,201,177,.15);border-radius:5px;padding:1px 6px;margin-left:4px;vertical-align:middle;">DRAFT</span>' : '';
  return `
    <div style="background:#1c1c1e;border-radius:14px;padding:14px;margin-bottom:12px;opacity:${inv.status==='declined'?0.45:1};">
      <div style="font-size:14px;font-weight:900;color:#f5f5f7;margin-bottom:3px;">📖 ${escHtml(inv.comic_title || 'Untitled Comic')}${draftTag}</div>
      <div style="font-size:11px;color:#444;font-weight:700;margin-bottom:6px;">Invited by @${escHtml(inv.inviter_handle)}</div>
      <div style="font-size:12px;font-weight:800;color:${statusColor[inv.status]||'#555'};margin-bottom:${inv.status==='pending'?'10px':'0'};">${statusLabel[inv.status]||inv.status}</div>
      ${inv.status === 'pending' ? `
        <div style="display:flex;gap:8px;">
          <button onclick="acceptCollabInvite('${inv.id}','${inv.comic_id}',${inv.is_draft?'true':'false'})"
            style="flex:1;background:#ff7a00;border:none;color:#000;font-weight:900;font-size:13px;border-radius:10px;padding:10px;cursor:pointer;font-family:inherit;">
            <i class="fi fi-rs-check"></i> Accept &amp; Co-create
          </button>
          <button onclick="declineCollabInvite('${inv.id}')"
            style="background:#111;border:1px solid #2a2a2a;color:#555;font-weight:700;font-size:12px;border-radius:10px;padding:10px 14px;cursor:pointer;font-family:inherit;">
            Decline
          </button>
        </div>` : inv.status === 'accepted' ? `
        <div style="display:flex;gap:8px;">
          <button onclick="${inv.is_draft ? `openCollabDraft('${inv.comic_id}')` : `openCollabComic('${inv.comic_id}')`}"

async function acceptCollabInvite(inviteId, comicId, isDraft) {
  await _sb.from('comic_collaborators').update({ status: 'accepted' }).eq('id', inviteId);
  const inv = collabInvites.find(i => i.id === inviteId);
  if (inv) inv.status = 'accepted';
  if (isDraft) {
    await grantDraftCoOwnership(comicId, myHandle);
    await loadDrafts();
    renderCollab();
    openCollabDraft(comicId);
  } else {
    await grantCoOwnership(comicId, myHandle);
    renderCollab();
    openCollabComic(comicId);
  }
}

// Comics have no single "owner" once a collab is accepted — everyone in
// owner_handles is an equal co-owner with identical edit/delete rights.
async function grantCoOwnership(comicId, handle) {
  const { data: comic } = await _sb.from('comics').select('owner_handle, owner_handles').eq('id', comicId).maybeSingle();
  if (!comic) return;
  const current = (comic.owner_handles && comic.owner_handles.length) ? [...comic.owner_handles] : (comic.owner_handle ? [comic.owner_handle] : []);
  if (!current.includes(handle)) {
    current.push(handle);
    await _sb.from('comics').update({ owner_handles: current }).eq('id', comicId);
  }
}

// Same idea as grantCoOwnership, but for a still-unpublished draft.
async function grantDraftCoOwnership(draftId, handle) {
  const { data: draft } = await _sb.from('drafts').select('owner_handle, owner_handles').eq('id', draftId).maybeSingle();
  if (!draft) return;
  const current = (draft.owner_handles && draft.owner_handles.length) ? [...draft.owner_handles] : (draft.owner_handle ? [draft.owner_handle] : []);
  if (!current.includes(handle)) {
    current.push(handle);
    await _sb.from('drafts').update({ owner_handles: current }).eq('id', draftId);
  }
}

async function declineCollabInvite(inviteId) {
  await _sb.from('comic_collaborators').update({ status: 'declined' }).eq('id', inviteId);
  const inv = collabInvites.find(i => i.id === inviteId);
  if (inv) inv.status = 'declined';
  renderCollab();
}

function openCollabComic(comicId) {
  localStorage.setItem('edit_comic_id', comicId);
  location.href = 'create-mobile.html';
}

function openCollabDraft(draftId) {
  localStorage.setItem('edit_draft_id', draftId);
  location.href = 'create-mobile.html';
}

// ── Render drafts ─────────────────────────────────────────
function renderDrafts() {
  const q = document.getElementById('draft-search').value.toLowerCase();
  const sort = document.getElementById('draft-sort').value;
  let list = drafts.filter(d => !q || d.title?.toLowerCase().includes(q));
  if (sort === 'newest')   list = [...list].reverse();
  else if (sort === 'alpha') list = [...list].sort((a,b) => (a.title||'').localeCompare(b.title||''));
  else if (sort === 'pages') list = [...list].sort((a,b) => (b.data?.length||0)-(a.data?.length||0));

  const container = document.getElementById('list-container');
  if (!list.length) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">✏️</div>
      <div class="empty-title">${q ? 'No drafts found' : 'No drafts yet'}</div>
      <div class="empty-sub">${q ? 'Try a different search.' : 'Start a comic and save it as a draft — it will appear here.'}</div>
      ${!q ? `<button class="empty-cta" onclick="openNewSheet()">+ Create Your First Comic</button>` : ''}
    </div>`;
    return;
  }
  const listEl = document.createElement('div');
  listEl.className = 'comics-list';
  list.forEach(d => listEl.appendChild(makeDraftRow(d)));
  container.innerHTML = '';
  container.appendChild(listEl);
}

function makeDraftRow(d) {
  const card = document.createElement('div');
  const isSelected = selectedDraftIds.has(String(d.id));
  card.className = 'comic-card'
    + (draftSelectMode ? ' select-mode' : '')
    + (isSelected ? ' selected' : '');
  card.dataset.id = d.id;
  card.dataset.type = 'draft';
  const pages = d.data?.length || 0;
  const isCloud = d._source === 'supabase';
  const isCollab = Array.isArray(d.ownerHandles) && d.ownerHandles.length > 1;
  const thumbInner = makeDraftThumb(d.data?.[0], d.ratio);

  card.innerHTML = `
    <div class="comic-card-cover">
      <div style="width:100%;height:100%;position:relative;">
        ${thumbInner}
        <div class="cover-status-pill cover-status-draft">Draft</div>
        <div class="select-dot-draft">✓</div>
      </div>
    </div>
    <div class="comic-card-info">
      <div class="comic-card-title">${escHtml(d.title || 'Untitled')}</div>
      ${isCloud ? '<div class="comic-card-cloud"><i class="fi fi-rs-cloud"></i> Cloud saved</div>' : ''}
      <div class="comic-card-sub">${pages} page${pages!==1?'s':''} · ${d.lastModified ? 'Edited ' + d.lastModified : 'Draft'}${isCollab ? ' · ' + CO_BADGE_XS + ' Co-created' : ''}</div>
    </div>
  `;
  card.onclick = () => {
    if (draftSelectMode) {
      toggleDraftSelect(String(d.id), card);
    } else {
      openDraftPopup(d);
    }
  };
  return card;
}

function makeDraftThumb(frame, ratio) {
  if (!frame) return `<div class="no-cover">📖</div>`;
  const imgLayer = frame.layers?.find(l => l.type==='img' && l.src);
  if (imgLayer) return `<img src="${imgLayer.src}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentNode.innerHTML='<div class=no-cover>📖</div>'">`;
  const bg = frame.background || '#111';
  const isUrl = typeof bg==='string' && (bg.startsWith('http')||bg.startsWith('data:'));
  const style = isUrl ? `background:url('${bg}') center/cover` : `background:${bg}`;
  return `<div style="width:100%;height:100%;${style};"></div>`;
}

// ── Render published ──────────────────────────────────────
function renderPublished() {
  const q = document.getElementById('pub-search').value.toLowerCase();
  const sort = document.getElementById('pub-sort').value;
  let list = published.filter(c => !q || c.title?.toLowerCase().includes(q) || c.description?.toLowerCase().includes(q));
  if (sort === 'stars') list = [...list].sort((a,b) => (b.stars||0)-(a.stars||0));
  else if (sort === 'alpha') list = [...list].sort((a,b) => (a.title||'').localeCompare(b.title||''));

  const container = document.getElementById('list-container');
  if (!list.length) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon"><i class="fi fi-rs-globe"></i></div>
      <div class="empty-title">${q ? 'No matches' : 'Nothing published yet'}</div>
      <div class="empty-sub">${q ? 'Try different search terms.' : 'Comics you publish appear here. Fans can discover and star your work.'}</div>
      ${!q ? `<button class="empty-cta" onclick="openNewSheet()">Create & Publish</button>` : ''}
    </div>`;
    return;
  }
  const listEl = document.createElement('div');
  listEl.className = 'comics-list';
  list.forEach(c => listEl.appendChild(makePublishedRow(c)));
  container.innerHTML = '';
  container.appendChild(listEl);
}

function makePublishedRow(c) {
  const card = document.createElement('div');
  card.className = 'comic-card';
  card.dataset.id = c.id;
  card.dataset.type = 'published';
  const stars = c.stars || 0;
  const pages = c.data?.length || 0;
  const coverHtml = c.cover
    ? `<img src="${c.cover}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentNode.innerHTML='<div class=no-cover>📖</div>'">`
    : `<div class="no-cover">📖</div>`;

  const isCollab = Array.isArray(c.owner_handles) && c.owner_handles.length > 1;

  card.innerHTML = `
    <div class="comic-card-cover">
      <div style="width:100%;height:100%;position:relative;">
        ${coverHtml}
        <div class="cover-status-pill cover-status-pub">Live</div>
      </div>
    </div>
    <div class="comic-card-info">
      <div class="comic-card-title">${escHtml(c.title || 'Untitled')}</div>
      <div class="comic-card-sub">⭐ ${stars} · ${pages} page${pages!==1?'s':''}${isCollab ? ' · ' + CO_BADGE_XS + ' Co-created' : ''}</div>
    </div>
  `;
  card.onclick = () => openPublishedPopup(c);
  return card;
}

// ── Popup (discover-style) ─────────────────────────────────
function openDraftPopup(d) {
  const pages = d.data?.length || 0;
  const isCloud = d._source === 'supabase';

  // Cover
  const coverWrap = document.getElementById('popup-cover-wrap');
  const thumbFrame = d.data?.[0];
  const imgLayer = thumbFrame?.layers?.find(l => l.type==='img' && l.src);
  if (imgLayer) {
    coverWrap.innerHTML = `<img class="popup-cover" src="${imgLayer.src}" onerror="this.parentNode.innerHTML='<div class=popup-cover-placeholder>📖</div>'">`;
  } else if (thumbFrame?.background) {
    const bg = thumbFrame.background;
    const isUrl = typeof bg==='string' && (bg.startsWith('http')||bg.startsWith('data:'));
    coverWrap.innerHTML = `<div class="popup-cover-placeholder" style="${isUrl?`background:url('${bg}') center/cover`:`background:${bg}`};font-size:0;"></div>`;
  } else {
    coverWrap.innerHTML = `<div class="popup-cover-placeholder">📖</div>`;
  }

  document.getElementById('popup-title').innerText = d.title || 'Untitled';
  document.getElementById('popup-creator').innerText = `Draft · last edited ${d.lastModified || 'recently'}`;

  document.getElementById('popup-meta').innerHTML = `
    <span class="popup-meta-chip teal">Draft</span>
    <span class="popup-meta-chip">${pages} page${pages!==1?'s':''}</span>
    ${isCloud ? '<span class="popup-meta-chip blue"><i class="fi fi-rs-cloud"></i> Cloud saved</span>' : ''}
  `;

  // Drafts have no description — keep the desc block hidden
  const draftDescEl = document.getElementById('popup-desc');
  draftDescEl.innerText = '';
  draftDescEl.style.display = 'none';

  const btns = document.getElementById('popup-btns');
  btns.innerHTML = '';

  const resumeBtn = document.createElement('button');
  resumeBtn.className = 'read-btn';
  resumeBtn.innerHTML = 'Resume Editing';
  resumeBtn.onclick = () => { closePopup(); resumeDraft(d.id); };
  btns.appendChild(resumeBtn);

  const renameBtn = document.createElement('button');
  renameBtn.className = 'popup-rename-btn';
  renameBtn.innerHTML = 'Rename';
  renameBtn.onclick = () => { closePopup(); openRenameSheet(d.id, d.title || 'Untitled'); };
  btns.appendChild(renameBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'popup-delete-btn';
  delBtn.innerHTML = ICON_TRASH + 'Delete';
  delBtn.onclick = () => { closePopup(); askDelete(d.id, 'draft', d.title || 'Untitled'); };
  btns.appendChild(delBtn);

  document.getElementById('popup-overlay').classList.add('open');
}

function openPublishedPopup(c) {
  const stars = c.stars || 0;
  const pages = c.data?.length || 0;

  // Cover
  const coverWrap = document.getElementById('popup-cover-wrap');
  coverWrap.innerHTML = c.cover
    ? `<img class="popup-cover" src="${c.cover}" onerror="this.parentNode.innerHTML='<div class=popup-cover-placeholder>📖</div>'">`
    : `<div class="popup-cover-placeholder">📖</div>`;

  document.getElementById('popup-title').innerText = c.title || 'Untitled';
  document.getElementById('popup-creator').innerHTML = `Published · Live on Discover`;

  document.getElementById('popup-meta').innerHTML = `
    <span class="popup-meta-chip orange">Live</span>
    <span class="popup-meta-chip">⭐ ${stars} star${stars!==1?'s':''}</span>
    <span class="popup-meta-chip">${pages} page${pages!==1?'s':''}</span>
  `;

  const pubDescEl = document.getElementById('popup-desc');
  pubDescEl.innerText = c.description || '';
  pubDescEl.style.display = c.description ? 'block' : 'none';

  const btns = document.getElementById('popup-btns');
  btns.innerHTML = '';

  const readBtn = document.createElement('button');
  readBtn.className = 'read-btn';
  readBtn.innerHTML = '▶ Read Now';
  readBtn.onclick = () => { closePopup(); readComic(c.id); };
  btns.appendChild(readBtn);

  const editBtn = document.createElement('button');
  editBtn.className = 'popup-edit-btn';
  editBtn.innerHTML = '✏️ Edit';
  editBtn.onclick = () => { closePopup(); editPublished(c.id); };
  btns.appendChild(editBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'popup-delete-btn';
  delBtn.innerHTML = ICON_TRASH + 'Unpublish';
  delBtn.onclick = () => { closePopup(); askDelete(c.id, 'published', c.title || 'Untitled'); };
  btns.appendChild(delBtn);

  document.getElementById('popup-overlay').classList.add('open');
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
}

// ── Action Sheets (kept for delete confirm / rename, triggered from popup) ────
function closeActionSheet() {
  document.getElementById('action-sheet').classList.remove('open');
}

// ── Actions ───────────────────────────────────────────────
function resumeDraft(id) {
  const draft = drafts.find(d => String(d.id) === String(id));
  localStorage.removeItem('edit_comic_id');
  localStorage.setItem('active_draft_id', String(id));
  if (draft?.storage_path) localStorage.setItem('active_draft_storage_path', draft.storage_path);
  else localStorage.removeItem('active_draft_storage_path');
  location.href = 'create-mobile.html';
}

async function editPublished(id) {
  const comic = published.find(c => String(c.id) === String(id));
  if (!comic) return;
  toast('⏳ Pulling into draft…');
  try {
    const draftId = crypto.randomUUID();
    // BUGFIX: `comic.data` is null whenever this comic's frames were spilled
    // to Storage for size (see loadDraftData). Falling back straight to `[]`
    // silently created an empty draft, and republishing it then overwrote the
    // real published comic with nothing — this is what was wiping people's comics.
    const framesData = await loadDraftData(comic);
    // SAFETY NET: loadDraftData() throws on an actual fetch/download error, but a
    // corrupted or unexpectedly-empty row wouldn't throw — it would just come back
    // empty, and the old `|| []` fallback would then quietly save a blank draft.
    // Treat "loaded successfully but empty" the same as a failure: stop and tell the
    // person, rather than letting them start editing a comic that looks wiped.
    if (!framesData || !framesData.length) {
      throw new Error("This comic's saved data came back empty — refusing to open a blank draft. Nothing has been changed.");
    }
    await saveDraft(draftId, (comic.title || 'Untitled') + ' (edit)', framesData, comic.canvas_ratio || { w:1, h:1 });
    localStorage.setItem('edit_source_comic_id', String(id));
    localStorage.setItem('active_draft_id', draftId);
    localStorage.removeItem('active_draft_storage_path');
    localStorage.removeItem('edit_comic_id');
    location.href = 'create-mobile.html';
  } catch(e) {
    toast('⚠ Could not create draft: ' + e.message, 'var(--danger)');
  }
}

function readComic(id) {
  location.href = `reader.html?id=${id}`;
}

// ── Draft Select Mode ─────────────────────────────────────
function toggleDraftSelectMode() {
  if (draftSelectMode) {
    exitDraftSelectMode();
  } else {
    draftSelectMode = true;
    selectedDraftIds.clear();
    document.getElementById('select-toggle-btn').classList.add('active');
    renderDrafts();
    updateDraftSelectBar();
  }
}

function exitDraftSelectMode() {
  draftSelectMode = false;
  selectedDraftIds.clear();
  document.getElementById('select-toggle-btn').classList.remove('active');
  document.getElementById('draft-select-bar').classList.remove('open');
  renderDrafts();
}

function toggleDraftSelect(id, cardEl) {
  if (selectedDraftIds.has(id)) selectedDraftIds.delete(id);
  else selectedDraftIds.add(id);
  cardEl.classList.toggle('selected', selectedDraftIds.has(id));
  updateDraftSelectBar();
}

function updateDraftSelectBar() {
  const bar = document.getElementById('draft-select-bar');
  document.getElementById('draft-select-count').textContent = selectedDraftIds.size + ' selected';
  bar.classList.toggle('open', selectedDraftIds.size > 0);
}

function selectAllDrafts() {
  const q = document.getElementById('draft-search').value.toLowerCase();
  const sort = document.getElementById('draft-sort').value;
  let list = drafts.filter(d => !q || d.title?.toLowerCase().includes(q));
  list.forEach(d => selectedDraftIds.add(String(d.id)));
  updateDraftSelectBar();
  renderDrafts();
}

async function bulkDeleteDrafts() {
  if (!selectedDraftIds.size) return;
  const count = selectedDraftIds.size;
  if (!confirm(`Delete ${count} draft${count !== 1 ? 's' : ''}? This cannot be undone.`)) return;

  const ids = [...selectedDraftIds];
  const toDelete = drafts.filter(d => ids.includes(String(d.id)));

  // Delete from DB
  const { error } = await _sb.from('drafts').delete().in('id', ids);
  if (error) { toast('⚠ Delete failed: ' + error.message, 'var(--danger)'); return; }

  // Remove any storage files
  const storagePaths = toDelete.map(d => d.storage_path).filter(Boolean);
  if (storagePaths.length) {
    await _sb.storage.from('comiccore-assets').remove(storagePaths).catch(() => {});
  }

  drafts = drafts.filter(d => !ids.includes(String(d.id)));
  document.getElementById('drafts-count').innerText = drafts.length;
  document.getElementById('topbar-sub').innerText = `${drafts.length} draft${drafts.length!==1?'s':''} · ${published.length} published`;
  renderStats();
  exitDraftSelectMode();
  toast(`${count} draft${count !== 1 ? 's' : ''} deleted`);
}

// ── Delete ────────────────────────────────────────────────
function askDelete(id, type, title) {
  pendingDeleteId = id;
  pendingDeleteType = type;
  document.getElementById('del-title').innerHTML = ICON_TRASH + (type === 'draft' ? 'Delete Draft?' : 'Unpublish & Delete?');
  document.getElementById('del-sub').innerText = `"${title}" will be permanently deleted${type==='published'?' and removed from the Discover feed':' from your device'}. This can't be undone.`;
  document.getElementById('del-sheet').classList.add('open');
}

function closeDelSheet() {
  document.getElementById('del-sheet').classList.remove('open');
  pendingDeleteId = null;
}

async function confirmDelete() {
  const deleteId = pendingDeleteId;
  const deleteType = pendingDeleteType;
  closeDelSheet();
  if (deleteType === 'draft') {
    const draftToDelete = drafts.find(d => String(d.id) === String(deleteId));
    const { error: delErr } = await _sb.from('drafts').delete().eq('id', deleteId);
    if (delErr) { toast('⚠ Could not delete: ' + delErr.message, 'var(--danger)'); return; }
    if (draftToDelete?.storage_path) {
      await _sb.storage.from('comiccore-assets').remove([draftToDelete.storage_path]).catch(() => {});
    }
    drafts = drafts.filter(d => String(d.id) !== String(deleteId));
    document.getElementById('drafts-count').innerText = drafts.length;
    document.getElementById('topbar-sub').innerText = `${drafts.length} draft${drafts.length!==1?'s':''} · ${published.length} published`;
    renderStats(); renderDrafts();
    toast('Draft deleted');
  } else {
    const { error } = await _sb.from('comics').delete().eq('id', deleteId);
    if (error) { toast('⚠ Could not delete: ' + error.message, 'var(--danger)'); return; }
    published = published.filter(c => String(c.id) !== String(deleteId));
    document.getElementById('pub-count').innerText = published.length;
    document.getElementById('topbar-sub').innerText = `${drafts.length} draft${drafts.length!==1?'s':''} · ${published.length} published`;
    renderStats(); renderPublished();
    toast('Comic removed from Discover');
  }
}

// ── Rename ────────────────────────────────────────────────
function openRenameSheet(id, currentTitle) {
  renameTargetId = id;
  document.getElementById('rename-inp').value = currentTitle || '';
  document.getElementById('rename-sheet').classList.add('open');
  setTimeout(() => document.getElementById('rename-inp').focus(), 150);
}
function closeRenameSheet() { document.getElementById('rename-sheet').classList.remove('open'); }
async function confirmRename() {
  const newTitle = document.getElementById('rename-inp').value.trim();
  if (!newTitle) return;
  closeRenameSheet();
  const idx = drafts.findIndex(d => d.id == renameTargetId);
  if (idx >= 0) {
    drafts[idx].title = newTitle;
    const { error } = await _sb.from('drafts').update({ title: newTitle }).eq('id', renameTargetId);
    if (error) { toast('⚠ Rename failed: ' + error.message, 'var(--danger)'); return; }
    renderDrafts();
    toast('✅ Renamed!');
  }
}

// ── New Comic ─────────────────────────────────────────────

function openNewSheet(fromCollab = false) {
  startFromCollabTab = fromCollab;
  document.getElementById('new-sheet').classList.add('open');
}
function closeNewSheet() { document.getElementById('new-sheet').classList.remove('open'); }

function buildRatioGrid() {
  const grid = document.getElementById('ratio-grid');
  RATIOS.forEach((r, i) => {
    const opt = document.createElement('div');
    opt.className = 'ratio-opt' + (i===0?' sel':'');
    opt.innerHTML = `
      <div class="ratio-preview" style="width:${r.icon.w}px;height:${r.icon.h}px;"></div>
      <div class="ratio-name">${r.label}</div>
      <div class="ratio-dims">${r.dims}</div>
    `;
    opt.onclick = () => {
      document.querySelectorAll('.ratio-opt').forEach(o => o.classList.remove('sel'));
      opt.classList.add('sel');
      selectedRatio = r;
    };
    grid.appendChild(opt);
  });
  selectedRatio = RATIOS[0];
}

function startNewComic() {
  closeNewSheet();
  localStorage.removeItem('active_draft_id');
  localStorage.removeItem('edit_comic_id');
  localStorage.removeItem('edit_draft_id');
  localStorage.removeItem('cc-pending-frames');
  localStorage.setItem('cc-new-comic-ratio', JSON.stringify({ w: selectedRatio.w, h: selectedRatio.h }));
  if (startFromCollabTab) {
    localStorage.setItem('cc_auto_open_collab', '1');
    startFromCollabTab = false;
  }
  location.href = 'create-mobile.html';
}

// ── Helpers ───────────────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function toast(msg, col='var(--green)') {
  const t = document.createElement('div');
  t.className = 'toast-el';
  t.style.background = col; t.style.color = col==='var(--green)' ? '#000' : 'white';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; }, 2000);
  setTimeout(() => t.remove(), 2500);
}
</script>
