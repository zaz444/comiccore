<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicCore | Offlines</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        /* colors now in theme.css */

        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            padding-bottom: 120px;
            user-select: none;
        }

        /* --- HEADER --- */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header h1 { margin: 0; font-size: 18px; font-weight: 900; letter-spacing: 1px; }
        .header h1 span { color: var(--accent); }

        /* --- STORAGE TRACKER --- */
        .storage-bar {
            padding: 15px 20px;
            background: #080808;
            border-bottom: 1px solid var(--border);
        }
        .meter-label { font-size: 10px; font-weight: 800; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 8px; }
        .meter-track { width: 100%; height: 6px; background: #222; border-radius: 10px; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: var(--accent); transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #storage-breakdown { margin-top: 12px; }
        .breakdown-row { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: var(--text-dim); padding: 3px 0; }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        .draft-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            transition: transform 0.2s ease, border-color 0.2s;
            cursor: pointer;
        }
        .draft-card:hover { border-color: #ff7a00; transform: translateY(-2px); }
        .draft-card:active { transform: scale(0.96); }

        .preview {
            width: 100%;
            height: 140px;
            background: #0a0a0a;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1a1a1a;
            position: relative;
        }

        .card-info { padding: 12px 12px 14px; }
        .draft-name {
            font-weight: 800; font-size: 13px; margin-bottom: 4px;
            display: block; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; color: #f5f5f7;
        }
        .draft-date { font-size: 9px; color: #555; font-weight: 700; display: block; margin-bottom: 10px; }

        .card-btns { display: flex; gap: 6px; }
        .btn {
            flex: 1; padding: 9px 6px; border: none; border-radius: 8px;
            font-size: 10px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; font-family: inherit; transition: .15s;
        }
        .btn-open { background: #ff7a00; color: #000; }
        .btn-open:hover { opacity: .88; }
        .btn-del { background: #1a1a1a; color: #ff453a; border: 1px solid #2a1a1a; }
        .btn-del:hover { background: #2a1010; }

        /* --- EMPTY STATE --- */
        #empty-view { text-align: center; padding: 80px 40px; }
        #empty-view .icon { font-size: 40px; margin-bottom: 15px; opacity: 0.2; display: block; }
        #empty-view p { color: var(--text-dim); font-size: 14px; font-weight: 600; line-height: 1.5; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        .btn-new {
            background: #fff;
            color: #000;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 14px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-new:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <h1>OFFLINE<span>S</span></h1>
        <button onclick="location.href='create.html'" style="background:rgba(255,255,255,0.1); border:none; color:white; width:35px; height:35px; border-radius:50%; font-weight:bold; cursor:pointer;">✕</button>
    </div>

    <div class="storage-bar">
        <div class="meter-label">
            <span>VAULT CAPACITY</span>
            <span id="usage-percent">0%</span>
        </div>
        <div class="meter-track">
            <div id="meter-fill"></div>
        </div>
        <div id="storage-breakdown"></div>
    </div>

    <div id="empty-view" style="display: none;">
        <span class="icon">📁</span>
        <p>No drafts found.<br>Cloud drafts from ComicCore appear here.</p>
    </div>

    <div id="draft-grid" class="grid"></div>

    <div class="bottom-nav">
        <button class="btn-new" onclick="createNew()">+ CREATE NEW</button>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _sb = supabase.createClient(
        'https://mmycqeejhguzhtzkyjaj.supabase.co',
        'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE'
    );

    async function loadOfflines() {
        const grid  = document.getElementById('draft-grid');
        const empty = document.getElementById('empty-view');
        updateStorageMeter();

        // Load from Supabase + localStorage
        let allDrafts = [];
        const profile = JSON.parse(localStorage.getItem('user_profile') || '{}');
        const handle  = profile.handle;

        if (handle) {
            try {
                const { data: sbDrafts } = await _sb.from('drafts')
                    .select('id, title, data, canvas_ratio, updated_at')
                    .eq('owner_handle', handle)
                    .order('updated_at', { ascending: false });
                if (sbDrafts) {
                    const normalized = sbDrafts.map(d => ({
                        id: d.id, title: d.title || 'Untitled', data: d.data,
                        lastModified: d.updated_at ? new Date(d.updated_at).toLocaleString() : '',
                        _source: 'supabase'
                    }));
                    const lsDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
                    const sbIds    = new Set(sbDrafts.map(d => String(d.id)));
                    const lsOnly   = lsDrafts.filter(d => !sbIds.has(String(d.id)));
                    allDrafts = [...normalized, ...lsOnly];
                }
            } catch(e) {
                allDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
            }
        } else {
            allDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
        }

        if (!allDrafts.length) {
            grid.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        grid.style.display = 'grid';
        empty.style.display = 'none';
        grid.innerHTML = '';

        allDrafts.forEach(d => {
            const card = document.createElement('div');
            card.className = 'draft-card';
            const firstFrame = (d.data && d.data[0]) ? d.data[0] : null;
            const bg = firstFrame ? (firstFrame.background || '#111') : '#111';
            const isColor = bg.startsWith('#') || bg.startsWith('rgb');
            const isCloud = d._source === 'supabase';

            const frameCount = (d.data || []).length;
            card.innerHTML = `
                <div class="preview" style="${isColor ? 'background-color:'+bg : 'background-image:url('+bg+');background-size:cover;background-position:center;'}">
                    ${!firstFrame ? '<span style="opacity:0.15;font-size:32px;">📝</span>' : ''}
                    ${isCloud ? '<span style="position:absolute;top:7px;right:7px;font-size:9px;background:rgba(0,210,255,.18);color:#00d2ff;padding:2px 8px;border-radius:8px;font-weight:900;letter-spacing:.3px;border:1px solid rgba(0,210,255,.2);">☁ Cloud</span>' : ''}
                    <span style="position:absolute;bottom:7px;left:7px;font-size:9px;background:rgba(0,0,0,.7);color:#aaa;padding:2px 8px;border-radius:8px;font-weight:800;">${frameCount} frame${frameCount!==1?'s':''}</span>
                </div>
                <div class="card-info">
                    <span class="draft-name">${d.title || 'Untitled Comic'}</span>
                    <span class="draft-date">${d.lastModified || 'Unknown date'}</span>
                    <div class="card-btns">
                        <button class="btn btn-open" onclick="event.stopPropagation();openDraft('${d.id}')">▶ Resume</button>
                        <button class="btn btn-del" onclick="event.stopPropagation();deleteDraft('${d.id}', ${isCloud})">🗑</button>
                    </div>
                </div>
            `;
            card.onclick = () => openDraft(d.id);
            grid.appendChild(card);
        });
    }

    function getKeySize(key) {
        try { return ((localStorage.getItem(key) || '').length * 2); } catch(e) { return 0; }
    }

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
        return (bytes/1048576).toFixed(2) + ' MB';
    }

    function updateStorageMeter() {
        try {
            const LIMIT = 5242880; // 5MB standard limit
            let totalSize = 0, draftSize = 0, spriteSize = 0, otherSize = 0;

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const sz = getKeySize(key);
                totalSize += sz;
                if (key === 'comic_drafts') draftSize += sz;
                else if (key.startsWith('sb-full-') || key.startsWith('sb-meta') || key.startsWith('cc_sprites')) spriteSize += sz;
                else otherSize += sz;
            }

            const percent = Math.min(Math.round((totalSize / LIMIT) * 100), 100);
            const fill = document.getElementById('meter-fill');
            fill.style.width = percent + '%';
            document.getElementById('usage-percent').innerText = percent + '%';
            fill.style.background = percent > 80 ? '#ff4444' : percent > 60 ? '#ff9800' : 'var(--accent)';

            // Show breakdown
            const breakdown = document.getElementById('storage-breakdown');
            if (breakdown) {
                const draftPct  = Math.round((draftSize  / LIMIT) * 100);
                const spritePct = Math.round((spriteSize / LIMIT) * 100);
                const otherPct  = Math.round((otherSize  / LIMIT) * 100);
                breakdown.innerHTML = `
                    <div class="breakdown-row"><span>📝 Drafts</span><span>${formatBytes(draftSize)} (${draftPct}%)</span></div>
                    <div class="breakdown-row"><span>🎮 Sprite cache</span><span>${formatBytes(spriteSize)} (${spritePct}%)</span></div>
                    <div class="breakdown-row"><span>⚙️ App data</span><span>${formatBytes(otherSize)} (${otherPct}%)</span></div>
                    <div class="breakdown-row" style="border-top:1px solid #222;margin-top:6px;padding-top:6px;">
                        <span style="color:var(--text-main);font-weight:900;">Total used</span>
                        <span style="color:var(--accent);font-weight:900;">${formatBytes(totalSize)} / 5 MB</span>
                    </div>
                    ${spritePct > 5 ? '<button onclick="clearSpriteCache()" style="margin-top:10px;width:100%;padding:8px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#ff9800;font-size:11px;font-weight:800;cursor:pointer;">🧹 Clear Sprite Cache (free ' + formatBytes(spriteSize) + ')</button>' : ''}
                `;
            }
        } catch(e) {
            console.error("Storage calculation failed", e);
        }
    }

    function clearSpriteCache() {
        if (!confirm('Clear sprite cache? Images will reload on next use.')) return;
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('sb-full-') || key.startsWith('sb-meta') || key.startsWith('cc_sprites')) toRemove.push(key);
        }
        toRemove.forEach(k => localStorage.removeItem(k));
        updateStorageMeter();
    }

    function openDraft(id) {
        localStorage.setItem('active_draft_id', id);
        location.href = 'create.html';
    }

    function createNew() {
        localStorage.removeItem('active_draft_id'); 
        location.href = 'create.html';
    }

    async function deleteDraft(id, isCloud = false) {
        if (!confirm("Delete this draft permanently?")) return;

        if (isCloud || String(id).includes('-')) {
            await _sb.from('drafts').delete().eq('id', id);
        } else {
            let lsDrafts = JSON.parse(localStorage.getItem('comic_drafts') || '[]');
            lsDrafts = lsDrafts.filter(d => d.id != id);
            localStorage.setItem('comic_drafts', JSON.stringify(lsDrafts));
        }
        if (localStorage.getItem('active_draft_id') == id) {
            localStorage.removeItem('active_draft_id');
        }
        loadOfflines();
    }

    // Refresh on focus (in case user saved in another tab)
    window.onfocus = loadOfflines;
    window.onload = loadOfflines;
    // Also update storage meter on focus since cloud drafts don't affect it
    window.onfocus = () => { loadOfflines(); updateStorageMeter(); };
</script>
</body>
</html>
