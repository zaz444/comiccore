<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComicCore | Connecting…</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f11;
      color: #f4f4f6;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }
    .logo {
      width: 52px; height: 52px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 2px rgba(255,122,0,0.4), 0 8px 24px rgba(255,122,0,0.2);
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    h2 { font-size: 17px; font-weight: 800; }
    p  { font-size: 13px; color: #888896; font-weight: 500; text-align: center; max-width: 260px; line-height: 1.5; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,122,0,0.2);
      border-top-color: #ff7a00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #f87171; font-size: 13px; font-weight: 600; text-align: center; display: none; }
  </style>
</head>
<body>

  <div class="logo">
    <img src="https://mmycqeejhguzhtzkyjaj.supabase.co/storage/v1/object/public/avatars/logo/IMG_1612%20(2).webp" alt="ComicCore">
  </div>
  <h2>Connecting…</h2>
  <div class="spinner" id="spin"></div>
  <p id="msg">Finishing up with your account. This window will close automatically.</p>
  <p class="err" id="err"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _sb = supabase.createClient(
      'https://mmycqeejhguzhtzkyjaj.supabase.co',
      'sb_publishable_8Du2GAcH5oBeiHWe-1e0Fg_XtSub2QE',
      { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cc-auth' } }
    );

    const params   = new URLSearchParams(window.location.search);
    const provider = params.get('provider') || 'google';
    const mode     = params.get('mode')     || 'login';

    // If there's a hash/token in the URL, Supabase has redirected back here —
    // exchange it, then notify the opener and close.
    async function handleCallback() {
      const hash = window.location.hash;
      if (hash && (hash.includes('access_token') || hash.includes('code'))) {
        const { data: { session }, error } = await _sb.auth.getSession();
        if (error || !session) {
          showErr('Authentication failed. Please close this window and try again.');
          return;
        }
        // Notify parent window
        if (window.opener) {
          window.opener.postMessage({ type: 'cc_oauth_done' }, window.location.origin);
        }
        window.close();
        return;
      }

      // No token yet — start the OAuth flow
      const redirectUrl = window.location.href.split('?')[0]; // this same page, no query
      const { error } = await _sb.auth.signInWithOAuth({
        provider,
        options: {
          redirectTo: redirectUrl,
          scopes: provider === 'discord' ? 'identify email guilds' : undefined
        }
      });

      if (error) showErr(error.message);
    }

    function showErr(msg) {
      document.getElementById('spin').style.display = 'none';
      document.getElementById('msg').style.display  = 'none';
      document.getElementById('err').textContent = msg;
      document.getElementById('err').style.display = 'block';
    }

    handleCallback();
  </script>
</body>
</html>
